<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Refer Payment – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .hidden { display:none!important; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; font-size:.82rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; }
    td { padding:7px 8px; border-bottom:1px solid #eee; }
    .r { text-align:right; }
    tfoot td { font-weight:700; background:#f9f9f9; }
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end; }
    .form-row > * { flex:1; min-width:160px; }
    .patient-row { background:#f8f9ff; border:1px solid #c7d2fe; border-radius:8px;
                   padding:.65rem 1rem; margin-bottom:.5rem; }
    .patient-row .pname { font-weight:600; color:#1e1b4b; }
    .patient-row .pmeta { font-size:.8rem; color:#6b7280; margin-top:2px; }
    .pay-form-box { background:#f0fdf4; border:1px solid #86efac; border-radius:10px;
                    padding:1rem 1.1rem; margin-top:.75rem; }
    .pay-form-box h3 { font-size:.92rem; color:#14532d; margin:0 0 .75rem; font-weight:700; }
    .section-title { font-size:.9rem; font-weight:700; color:#312e81;
                     margin:1.25rem 0 .5rem; padding-bottom:.3rem; border-bottom:1px solid #e0e7ff; }
    .badge-paid { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7;
                  padding:2px 8px; border-radius:12px; font-size:.75rem; font-weight:700; }
    .badge-pend { background:#fef3c7; color:#92400e; border:1px solid #fcd34d;
                  padding:2px 8px; border-radius:12px; font-size:.75rem; font-weight:700; }
    .mode-chips { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.35rem; }
    .mode-chip { border:2px solid #c7d2fe; border-radius:8px; padding:.3rem .85rem;
                 cursor:pointer; font-size:.85rem; font-weight:600; color:#4338ca;
                 background:#fff; transition:all .18s; }
    .mode-chip.active { background:#6366f1; color:#fff; border-color:#6366f1; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>🤝 Refer Payment – IPD</h1>

  <!-- CASES WITH REFER -->
  <div class="page-card">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 Cases with Refer – Filter by Admission Date</h2>
    <div class="form-row" style="margin-bottom:1rem">
      <div><label>From</label><input id="caseFrom" type="date"/></div>
      <div><label>To</label><input id="caseTo" type="date"/></div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn-primary" style="width:auto" onclick="loadReferCases()">Show</button>
      </div>
    </div>
    <div id="referCaseList" style="font-size:.85rem;color:#555">Select date range and click Show.</div>
  </div>

  <!-- PAYMENT FORM (shown when row action clicked) -->
  <div class="page-card hidden" id="payFormCard">
    <div class="pay-form-box">
      <h3 id="payFormLabel">Add Refer Payment</h3>
      <div class="form-row">
        <div><label>Payment Date <span style="color:red">*</span></label><input id="rpDate" type="date" required/></div>
        <div><label>Voucher No. <span style="color:red">*</span></label><input id="rpVoucher" placeholder="Voucher number" required/></div>
      </div>
      <div style="margin-top:.6rem">
        <label>Mode <span style="color:red">*</span></label>
        <div class="mode-chips">
          <div class="mode-chip" onclick="selectMode(this,'Cash')">💵 Cash</div>
          <div class="mode-chip" onclick="selectMode(this,'Bank')">🏦 Bank</div>
          <div class="mode-chip" onclick="selectMode(this,'PhonePe')">📱 PhonePe</div>
        </div>
        <input type="hidden" id="rpMode"/>
      </div>
      <div class="form-row" style="margin-top:.6rem">
        <div><label>Amount (₹) <span style="color:red">*</span></label><input id="rpAmount" type="number" min="0" step="0.01" placeholder="0.00" required/></div>
        <div><label>Remark (optional)</label><input id="rpRemark" placeholder="Optional…"/></div>
      </div>
      <div style="margin-top:.85rem;display:flex;gap:.5rem">
        <button class="btn-primary" style="width:auto" onclick="saveReferPayment()">💾 Save Payment</button>
        <button class="btn-primary" style="width:auto;background:#6b7280" onclick="closePayForm()">Cancel</button>
      </div>
      <p class="err" id="rpErr" style="margin-top:.5rem"></p>
    </div>
  </div>

  <!-- PAYMENT HISTORY -->
  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📂 Refer Payment Records</h2>
    <div class="form-row" style="margin-bottom:1rem">
      <div><label>From</label><input id="histFrom" type="date"/></div>
      <div><label>To</label><input id="histTo" type="date"/></div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn-primary" style="width:auto" onclick="loadHistory()">Show</button>
      </div>
    </div>
    <div id="payHistList" style="font-size:.85rem;color:#555">Select date range and click Show.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","manager"]);
  const fmt = n => '₹' + parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});
  const today = new Date().toISOString().slice(0,10);
  const monthStart = today.slice(0,7) + '-01';
  document.getElementById('caseFrom').value  = monthStart;
  document.getElementById('caseTo').value    = today;
  document.getElementById('histFrom').value  = monthStart;
  document.getElementById('histTo').value    = today;

  let _currentCase = null;

  function selectMode(el, val) {
    document.querySelectorAll('.mode-chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('rpMode').value = val;
  }

  async function loadReferCases() {
    const from = document.getElementById('caseFrom').value;
    const to   = document.getElementById('caseTo').value;
    const div  = document.getElementById('referCaseList');
    if (!from||!to) return;
    div.textContent = 'Loading…';
    document.getElementById('spinner').classList.remove('hidden');
    try {
      const { data: adms } = await BNH_PAGE.sb.from('ipd_admissions')
        .select('id,admission_date,admission_no,patient_name,refer_name,refer_id,case_mode,case_type,is_discharged,is_cancelled')
        .gte('admission_date',from).lte('admission_date',to)
        .not('refer_name','is',null)
        .order('admission_date',{ascending:false});

      const filtered = (adms||[]).filter(r=>r.refer_name&&r.refer_name.trim()!='');
      if (filtered.length === 0) { div.textContent = 'No cases with refer in this range.'; return; }

      const admIds = filtered.map(r=>r.id);
      const { data: amtEntries } = await BNH_PAGE.sb.from('ipd_amount_entries')
        .select('admission_id,refer_amount').in('admission_id', admIds);
      const amtMap = {};
      (amtEntries||[]).forEach(a=>{ amtMap[a.admission_id]=a; });

      const referIds = filtered.filter(r=>r.refer_id).map(r=>r.refer_id);
      let paidMap = {};
      if (referIds.length > 0) {
        const { data: pays } = await BNH_PAGE.sb.from('ipd_refer_payments')
          .select('refer_id,admission_id,amount').in('refer_id', referIds);
        (pays||[]).forEach(p=>{
          paidMap[p.refer_id] = (paidMap[p.refer_id]||0) + parseFloat(p.amount||0);
        });
      }

      div.innerHTML = `<table>
        <thead><tr>
          <th>Adm Date</th><th>Adm No.</th><th>Patient</th><th>Refer Name</th>
          <th>Mode</th><th>Type</th>
          <th class="r">Refer Amt</th><th class="r">Paid</th><th class="r">Due</th>
          <th>Status</th><th>Action</th>
        </tr></thead>
        <tbody>${filtered.map(r=>{
          const amt   = amtMap[r.id];
          const refA  = parseFloat(amt?.refer_amount||0);
          const paid  = r.refer_id ? (paidMap[r.refer_id]||0) : 0;
          const due   = refA - paid;
          const status= refA===0?'N/A':paid>=refA?'Paid':'Pending';
          return `<tr>
            <td>${r.admission_date}</td>
            <td>${r.admission_no}</td>
            <td>${r.patient_name}</td>
            <td>${r.refer_name}</td>
            <td>${r.case_mode}</td>
            <td>${r.case_type}</td>
            <td class="r">${refA>0?fmt(refA):'-'}</td>
            <td class="r">${fmt(paid)}</td>
            <td class="r" style="color:${due>0?'#dc2626':'#059669'}">${refA>0?fmt(due):'-'}</td>
            <td><span class="${status==='Paid'?'badge-paid':'badge-pend'}">${status}</span></td>
            <td>
              <button class="btn-primary" style="width:auto;padding:.28rem .65rem;font-size:.78rem"
                onclick="openPayForm('${r.id}','${r.admission_no}','${r.patient_name.replace(/'/g,"\\'")}','${r.refer_name.replace(/'/g,"\\'")}','${r.refer_id||''}',${refA})">
                ➕ Pay
              </button>
            </td>
          </tr>`;
        }).join('')}</tbody></table>`;
    } catch(ex) {
      div.textContent = 'Error: ' + ex.message;
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  }

  function openPayForm(admId, admNo, patName, referName, referId, referAmt) {
    _currentCase = { admId, admNo, patName, referName, referId, referAmt };
    document.getElementById('payFormLabel').textContent =
      `💳 Add Payment — ${patName} (${admNo}) | Refer: ${referName} | Total: ${fmt(referAmt)}`;
    document.getElementById('rpDate').value = today;
    document.getElementById('rpVoucher').value = '';
    document.getElementById('rpMode').value = '';
    document.getElementById('rpAmount').value = '';
    document.getElementById('rpRemark').value = '';
    document.getElementById('rpErr').textContent = '';
    document.querySelectorAll('.mode-chip').forEach(c=>c.classList.remove('active'));
    document.getElementById('payFormCard').classList.remove('hidden');
    document.getElementById('payFormCard').scrollIntoView({behavior:'smooth'});
  }

  function closePayForm() {
    document.getElementById('payFormCard').classList.add('hidden');
    _currentCase = null;
  }

  async function saveReferPayment() {
    const err = document.getElementById('rpErr');
    err.textContent = '';
    if (!_currentCase) return;
    const date    = document.getElementById('rpDate').value;
    const voucher = document.getElementById('rpVoucher').value.trim();
    const mode    = document.getElementById('rpMode').value;
    const amount  = parseFloat(document.getElementById('rpAmount').value||0);
    const remark  = document.getElementById('rpRemark').value.trim();

    if (!date)    { err.textContent = 'Payment date is required.'; return; }
    if (!voucher) { err.textContent = 'Voucher No. is required.'; return; }
    if (!mode)    { err.textContent = 'Please select a payment mode.'; return; }
    if (amount <= 0) { err.textContent = 'Amount must be greater than 0.'; return; }

    document.getElementById('spinner').classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        admission_id:  _currentCase.admId,
        admission_no:  _currentCase.admNo,
        refer_id:      _currentCase.referId || null,
        refer_name:    _currentCase.referName,
        payment_date:  date,
        voucher_no:    voucher,
        mode,
        amount,
        remark: remark || null
      });
      const { error } = await BNH_PAGE.sb.from('ipd_refer_payments').insert(payload);
      if (error) throw error;
      closePayForm();
      loadReferCases();
      loadHistory();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  }

  async function loadHistory() {
    const from = document.getElementById('histFrom').value;
    const to   = document.getElementById('histTo').value;
    const div  = document.getElementById('payHistList');
    if (!from||!to) return;
    div.textContent = 'Loading…';
    const { data, error } = await BNH_PAGE.sb.from('ipd_refer_payments')
      .select('*').gte('payment_date',from).lte('payment_date',to)
      .order('payment_date',{ascending:false});
    if (error||!data||data.length===0){div.textContent='No refer payments in this range.';return;}
    const total = data.reduce((a,r)=>a+parseFloat(r.amount||0),0);
    div.innerHTML = `<table>
      <thead><tr>
        <th>Date</th><th>Voucher No.</th><th>Adm No.</th><th>Refer Name</th>
        <th>Mode</th><th class="r">Amount</th><th>Remark</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.payment_date}</td>
        <td>${r.voucher_no||'-'}</td>
        <td>${r.admission_no}</td>
        <td>${r.refer_name||'-'}</td>
        <td><span style="background:${r.mode==='Cash'?'#d1fae5':r.mode==='Bank'?'#dbeafe':'#fce7f3'};padding:2px 8px;border-radius:10px;font-size:.78rem;font-weight:600">${r.mode||'-'}</span></td>
        <td class="r"><strong>${fmt(r.amount)}</strong></td>
        <td>${r.remark||'-'}</td>
      </tr>`).join('')}</tbody>
      <tfoot><tr><td colspan="5">Total Paid</td>
        <td class="r">${fmt(total)}</td><td></td>
      </tr></tfoot></table>`;
  }
</script>
</body>
</html>
