<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Gramin Doctor Records – Manager View</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 0.25rem;
      border-bottom: 2px solid var(--border, #e2e8f0);
      margin-bottom: 1rem;
    }
    .tab-btn {
      padding: 0.55rem 1.1rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted, #888);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      border-radius: 6px 6px 0 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--primary, #2563eb);
      border-bottom-color: var(--primary, #2563eb);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Filters row */
    .filter-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.85rem;
      align-items: center;
    }
    .filter-row select,
    .filter-row input {
      padding: 0.45rem 0.75rem;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 8px;
      font-size: 0.86rem;
      background: var(--input-bg, #fff);
      color: var(--text, #1e293b);
      flex: 1;
      min-width: 160px;
    }
    .filter-row select { flex: 0 0 auto; min-width: 180px; }

    /* Table */
    .records-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
    }
    .records-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted, #888);
      border-bottom: 1px solid var(--border, #e2e8f0);
      white-space: nowrap;
    }
    .records-table td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border, #e2e8f0);
      vertical-align: middle;
    }
    .records-table tr:last-child td { border-bottom: none; }
    .records-table tr:hover td { background: var(--hover-bg, #f8fafc); }

    /* Duplicate group */
    .dup-group {
      background: var(--card-bg, #fff);
      border: 1.5px solid #f59e0b;
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .dup-group-header {
      background: #fffbeb;
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .dup-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: #f59e0b;
      color: #fff;
      letter-spacing: 0.06em;
    }
    .dup-mobile {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .dup-doctor {
      color: var(--text-muted, #888);
      font-size: 0.85rem;
    }
    .dup-entries {
      padding: 0 0.75rem 0.5rem;
    }

    .member-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.16rem 0.5rem;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
    }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted, #888);
      margin: 0 0 0.75rem;
    }
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted, #888);
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .records-count {
      font-size: 0.8rem;
      color: var(--text-muted, #888);
      margin-bottom: 0.5rem;
    }

    .summary-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .summary-pill {
      background: var(--card-bg, #f8fafc);
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.82rem;
    }
    .summary-pill strong { display: block; font-size: 1.1rem; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.2rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }

    @media (max-width: 600px) {
      .filter-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>📊 Gramin Doctor Records</h1>
  <p style="color:var(--text-muted,#888);font-size:0.9rem;margin-top:-0.25rem;margin-bottom:1.25rem;">
    Manager view — all team entries, duplicate detection, and filters.
  </p>

  <div class="page-card">
    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('all', this)">📋 All Records</button>
      <button class="tab-btn" onclick="switchTab('dupes', this)">⚠️ Duplicates <span id="dupCount" style="background:#f59e0b;color:#fff;font-size:0.7rem;padding:0.1rem 0.45rem;border-radius:999px;margin-left:0.25rem">0</span></button>
    </div>

    <!-- ALL RECORDS TAB -->
    <div id="tab-all" class="tab-panel active">
      <div class="summary-pills" id="summaryPills"></div>

      <div class="filter-row">
        <select id="memberFilter" onchange="applyFilters()">
          <option value="">👤 All Team Members</option>
        </select>
        <input id="searchAll" placeholder="🔍 Search name, address, mobile…" oninput="applyFilters()" />
      </div>

      <div class="records-count" id="allCount">Loading…</div>
      <div style="overflow-x:auto" id="allContainer">
        <div class="empty-state"><div class="icon">⏳</div>Loading records…</div>
      </div>
    </div>

    <!-- DUPLICATES TAB -->
    <div id="tab-dupes" class="tab-panel">
      <p style="font-size:0.85rem;color:var(--text-muted,#888);margin-bottom:1rem;">
        Doctors whose mobile number was entered by <strong>2 or more</strong> different team members.
      </p>
      <div id="dupContainer">
        <div class="empty-state"><div class="icon">⏳</div>Loading…</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>

<script>
  BNH_PAGE.requireRole(["manager", "admin"]);

  let allRecords = [];
  let dupGroups = [];

  /* ── Tab switch ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  /* ── Toast ── */
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2800);
  }

  /* ── Load all records ── */
  async function loadAll() {
    document.getElementById('spinner').classList.remove('hidden');
    const { data, error } = await BNH_PAGE.sb
      .from('gramin_doctor_visits')
      .select('*')
      .order('recorded_at', { ascending: false });

    document.getElementById('spinner').classList.add('hidden');
    if (error) { showToast(error.message, 'error'); return; }
    allRecords = data || [];

    buildMemberFilter();
    buildSummary();
    applyFilters();
    buildDuplicates();
  }

  /* ── Member filter dropdown ── */
  function buildMemberFilter() {
    const sel = document.getElementById('memberFilter');
    const members = [...new Set(allRecords.map(r => r.recorded_by_name + '|' + r.recorded_by))];
    sel.innerHTML = '<option value="">👤 All Team Members</option>' +
      members.map(m => {
        const [name, uname] = m.split('|');
        return `<option value="${esc(uname)}">${esc(name)}</option>`;
      }).join('');
  }

  /* ── Summary pills ── */
  function buildSummary() {
    const byMember = {};
    allRecords.forEach(r => {
      byMember[r.recorded_by_name || r.recorded_by] =
        (byMember[r.recorded_by_name || r.recorded_by] || 0) + 1;
    });

    const pills = document.getElementById('summaryPills');
    pills.innerHTML =
      `<div class="summary-pill"><strong>${allRecords.length}</strong> Total Entries</div>` +
      `<div class="summary-pill"><strong>${Object.keys(byMember).length}</strong> Team Members</div>` +
      Object.entries(byMember).map(([name, count]) =>
        `<div class="summary-pill"><strong>${count}</strong> ${esc(name)}</div>`
      ).join('');
  }

  /* ── Filter + render all records ── */
  function applyFilters() {
    const member = document.getElementById('memberFilter').value;
    const q = document.getElementById('searchAll').value.toLowerCase();

    let filtered = allRecords;
    if (member) filtered = filtered.filter(r => r.recorded_by === member);
    if (q) filtered = filtered.filter(r =>
      r.doctor_name?.toLowerCase().includes(q) ||
      r.address?.toLowerCase().includes(q) ||
      r.mobile?.includes(q) ||
      r.recorded_by_name?.toLowerCase().includes(q)
    );

    document.getElementById('allCount').textContent = filtered.length + ' record(s)';
    renderAllTable(filtered);
  }

  function renderAllTable(records) {
    const container = document.getElementById('allContainer');
    if (!records.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No records match.</div>';
      return;
    }
    container.innerHTML = `
      <table class="records-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Doctor Name</th>
            <th>Address</th>
            <th>Mobile</th>
            <th>Team Member</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          ${records.map((r, i) => `
            <tr>
              <td style="color:var(--text-muted,#888);font-size:0.78rem">${i+1}</td>
              <td><strong>${esc(r.doctor_name)}</strong></td>
              <td style="color:var(--text-muted,#888);font-size:0.83rem">${esc(r.address)}</td>
              <td>${esc(r.mobile)}</td>
              <td><span class="member-badge">${esc(r.recorded_by_name || r.recorded_by)}</span></td>
              <td style="font-size:0.78rem;color:var(--text-muted,#888);white-space:nowrap">${fmtDate(r.recorded_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  /* ── Duplicate detection (by mobile, 2+ different members) ── */
  function buildDuplicates() {
    // Group by mobile
    const byMobile = {};
    allRecords.forEach(r => {
      if (!r.mobile) return;
      if (!byMobile[r.mobile]) byMobile[r.mobile] = [];
      byMobile[r.mobile].push(r);
    });

    // Keep only groups where 2+ DIFFERENT recorded_by values exist
    dupGroups = Object.entries(byMobile)
      .filter(([, entries]) => {
        const members = new Set(entries.map(e => e.recorded_by));
        return members.size >= 2;
      })
      .map(([mobile, entries]) => ({ mobile, entries }));

    // Update badge
    document.getElementById('dupCount').textContent = dupGroups.length;

    renderDuplicates();
  }

  function renderDuplicates() {
    const container = document.getElementById('dupContainer');
    if (!dupGroups.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">✅</div>No duplicates found. Great teamwork!</div>';
      return;
    }

    container.innerHTML = dupGroups.map(g => {
      const docName = g.entries[0]?.doctor_name || '—';
      const members = [...new Set(g.entries.map(e => e.recorded_by_name || e.recorded_by))];
      return `
        <div class="dup-group">
          <div class="dup-group-header">
            <span class="dup-badge">⚠️ DUPLICATE</span>
            <div>
              <div class="dup-mobile">📞 ${esc(g.mobile)}</div>
              <div class="dup-doctor">${esc(docName)} — entered by ${members.map(m => `<strong>${esc(m)}</strong>`).join(', ')}</div>
            </div>
          </div>
          <div class="dup-entries">
            <table class="records-table" style="margin-top:0.4rem">
              <thead>
                <tr><th>Doctor Name</th><th>Address</th><th>Team Member</th><th>Date</th></tr>
              </thead>
              <tbody>
                ${g.entries.map(r => `
                  <tr>
                    <td><strong>${esc(r.doctor_name)}</strong></td>
                    <td style="color:var(--text-muted,#888);font-size:0.82rem">${esc(r.address)}</td>
                    <td><span class="member-badge">${esc(r.recorded_by_name || r.recorded_by)}</span></td>
                    <td style="font-size:0.78rem;color:var(--text-muted,#888)">${fmtDate(r.recorded_at)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    }).join('');
  }

  /* ── Utils ── */
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  loadAll();
</script>
</body>
</html>
