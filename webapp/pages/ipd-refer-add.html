<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Refer Add – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:200px; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; font-size:.82rem; }
    td { padding:7px 8px; border-bottom:1px solid #eee; font-size:.82rem; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>🤝 Refer Add – IPD</h1>

  <div class="page-card">
    <form id="referForm">
      <label>Recorded By</label>
      <input id="recBy" readonly/>

      <div class="form-row">
        <div>
          <label>Refer Code <span style="color:red">*</span></label>
          <input id="referCode" required placeholder="e.g. REF-001"/>
        </div>
        <div>
          <label>Refer Name <span style="color:red">*</span></label>
          <input id="referName" required placeholder="Full Name"/>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Address</label>
          <input id="address" placeholder="Optional"/>
        </div>
        <div>
          <label>Phone No.</label>
          <input id="phone" placeholder="Optional"/>
        </div>
      </div>

      <label>Marketing Head</label>
      <input id="marketingHead" placeholder="Optional"/>

      <label>Remark</label>
      <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Refer</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 All Refers</h2>
    <div id="referList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","reception","manager"]);
  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';

  async function loadRefers() {
    const div = document.getElementById('referList');
    const { data, error } = await BNH_PAGE.sb.from('ipd_refers')
      .select('*').order('recorded_at', { ascending: false });
    if (error || !data || data.length === 0) { div.textContent = 'No refers added yet.'; return; }
    div.innerHTML = `<table>
      <thead><tr>
        <th>Code</th><th>Name</th><th>Phone</th><th>Marketing Head</th><th>Remark</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.refer_code}</td>
        <td>${r.refer_name}</td>
        <td>${r.phone||'-'}</td>
        <td>${r.marketing_head||'-'}</td>
        <td>${r.remark||'-'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  loadRefers();

  document.getElementById('referForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        refer_code:     document.getElementById('referCode').value.trim(),
        refer_name:     document.getElementById('referName').value.trim(),
        address:        document.getElementById('address').value.trim() || null,
        phone:          document.getElementById('phone').value.trim() || null,
        marketing_head: document.getElementById('marketingHead').value.trim() || null,
        remark:         document.getElementById('remark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('ipd_refers').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Refer saved successfully!';
      e.target.reset();
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      loadRefers();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
