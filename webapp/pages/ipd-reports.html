<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reports – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .tab-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .tab-btn { padding:.5rem 1.1rem; border:2px solid #6366f1; border-radius:8px; background:#fff;
               color:#6366f1; font-weight:600; cursor:pointer; transition:all .2s; }
    .tab-btn.active { background:#6366f1; color:#fff; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end; }
    .form-row > * { flex:1; min-width:160px; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; font-size:.82rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; }
    td { padding:7px 8px; border-bottom:1px solid #eee; }
    .r { text-align:right; }
    tfoot td { font-weight:700; background:#f9f9f9; }
    .patient-card { background:#f8f9ff; border:1px solid #c7d2fe; border-radius:8px;
                    padding:.75rem 1rem; margin-bottom:.6rem; cursor:pointer; transition:all .2s; }
    .patient-card:hover { background:#e0e7ff; }
    .patient-card .pname { font-weight:600; color:#1e1b4b; }
    .patient-card .pmeta { font-size:.82rem; color:#6b7280; margin-top:2px; }
    .hidden { display:none!important; }
    .back-btn { background:none; border:none; color:#6366f1; font-weight:600;
                cursor:pointer; font-size:.9rem; margin-bottom:1rem; padding:0; }
    .detail-section { margin-bottom:1rem; }
    .detail-section h3 { font-size:.88rem; font-weight:700; color:#312e81;
                         margin-bottom:.4rem; padding-bottom:.2rem; border-bottom:1px solid #e0e7ff; }
    @media print { .no-print { display:none!important; } }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>📊 IPD Reports</h1>

  <div class="tab-bar no-print">
    <button class="tab-btn active" onclick="switchTab('r1',this)">Patient Wise Report</button>
    <button class="tab-btn" onclick="switchTab('r2',this)">Summary Report</button>
  </div>

  <!-- REPORT 1: PATIENT WISE -->
  <div id="r1" class="tab-panel active page-card">
    <h2 style="font-size:1rem;margin-bottom:1rem">🏥 Patient Wise Report</h2>

    <div id="r1List">
      <div class="form-row no-print" style="margin-bottom:1rem">
        <div><label>From Date</label><input id="r1From" type="date"/></div>
        <div><label>To Date</label><input id="r1To" type="date"/></div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn-primary" style="width:auto" onclick="loadPatientList()">Show</button>
        </div>
      </div>
      <div id="patientList" style="font-size:.85rem;color:#555">Select date range and click Show.</div>
    </div>

    <div id="r1Detail" class="hidden">
      <button class="back-btn no-print" onclick="backToList()">← Back to List</button>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
        <h3 id="detailPatientName" style="font-size:1rem;margin:0"></h3>
        <div class="no-print" style="display:flex;gap:.5rem">
          <button class="btn-primary" style="width:auto;background:#059669" onclick="window.print()">🖨 Print</button>
          <button class="btn-primary" style="width:auto;background:#7c3aed" onclick="downloadDetailPDF()">⬇ PDF</button>
        </div>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- REPORT 2: SUMMARY -->
  <div id="r2" class="tab-panel page-card">
    <h2 style="font-size:1rem;margin-bottom:1rem">📈 Summary Report</h2>
    <div class="form-row no-print">
      <div><label>From Date</label><input id="r2From" type="date"/></div>
      <div><label>To Date</label><input id="r2To" type="date"/></div>
      <div style="display:flex;align-items:flex-end;gap:.5rem">
        <button class="btn-primary" style="width:auto" onclick="loadSummary()">Show</button>
        <button class="btn-primary" style="width:auto;background:#059669" onclick="downloadSummaryPDF()">⬇ PDF</button>
      </div>
    </div>
    <div id="summaryOut" style="margin-top:1rem">Select date range and click Show.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","manager","viewer"]);

  const fmt = n => '₹' + parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});
  const today = new Date().toISOString().slice(0,10);
  const monthStart = today.slice(0,7) + '-01';
  document.getElementById('r1From').value = monthStart;
  document.getElementById('r1To').value   = today;
  document.getElementById('r2From').value = monthStart;
  document.getElementById('r2To').value   = today;

  function switchTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  // ─── REPORT 1: Patient List ───────────────────────────
  async function loadPatientList() {
    const from = document.getElementById('r1From').value;
    const to   = document.getElementById('r1To').value;
    const div  = document.getElementById('patientList');
    if (!from||!to) return;
    div.textContent = 'Loading…';
    const { data, error } = await BNH_PAGE.sb.from('ipd_admissions')
      .select('id,admission_date,admission_no,patient_name,case_mode,case_type,is_discharged,is_cancelled,cancel_reason,cancel_date')
      .gte('admission_date',from).lte('admission_date',to)
      .order('admission_date',{ascending:false});
    if (error||!data||data.length===0){div.textContent='No patients in this range.';return;}
    div.innerHTML = data.map(r=>`
      <div class="patient-card" onclick="loadPatientDetail('${r.id}')"
        style="${r.is_cancelled?'border:1.5px solid #fca5a5;background:#fff5f5;':''}">
        <div class="pname">${r.patient_name}
          <span style="font-weight:400;font-size:.8rem;color:${r.is_cancelled?'#dc2626':r.is_discharged?'#059669':'#d97706'}">
            &nbsp;${r.is_cancelled?'❌ Cancelled':r.is_discharged?'✅ Discharged':'🏥 Admitted'}</span>
        </div>
        <div class="pmeta">📅 ${r.admission_date} &nbsp;|&nbsp; ${r.admission_no}
          &nbsp;|&nbsp; Mode: ${r.case_mode} &nbsp;|&nbsp; Type: ${r.case_type}
          ${r.is_cancelled?`<br><span style="color:#dc2626;font-weight:600">Reason: ${r.cancel_reason||'—'}</span>`:''}
        </div>
      </div>`).join('');
  }

  async function loadPatientDetail(admId) {
    document.getElementById('spinner').classList.remove('hidden');
    try {
      // Fetch admission first so we have admission_no and refer_id for subsequent queries
      const { data: admData, error: admErr } = await BNH_PAGE.sb
        .from('ipd_admissions').select('*').eq('id', admId);
      if (admErr || !admData || admData.length === 0) throw new Error('Admission not found');
      const adm = admData[0];

      // Now fetch everything else in parallel using safe array queries (no .single())
      const [
        { data: amtArr },
        { data: otArr },
        { data: receipts },
        { data: addl },
        { data: indens },
        { data: opdBills },
        { data: referPays }
      ] = await Promise.all([
        BNH_PAGE.sb.from('ipd_amount_entries').select('*').eq('admission_id', admId),
        BNH_PAGE.sb.from('ipd_ot_entries').select('*').eq('admission_id', admId),
        BNH_PAGE.sb.from('ipd_cash_receipts').select('*').eq('admission_id', admId).order('receipt_date'),
        BNH_PAGE.sb.from('ipd_additional_charges').select('*').eq('admission_id', admId),
        BNH_PAGE.sb.from('ipd_medicine_indens').select('*').eq('admission_id', admId),
        BNH_PAGE.sb.from('opd_cases').select('*').eq('ipd_admission_id', admId),
        adm.refer_id
          ? BNH_PAGE.sb.from('ipd_refer_payments').select('*').eq('refer_id', adm.refer_id)
          : Promise.resolve({ data: [] })
      ]);

      const amtEntry = amtArr && amtArr.length > 0 ? amtArr[0] : null;
      const ot       = otArr  && otArr.length  > 0 ? otArr[0]  : null;

      const totalRcpt = (receipts||[]).reduce((a,r)=>a+parseFloat(r.amount||0),0);
      const totalDisc = (receipts||[]).reduce((a,r)=>a+parseFloat(r.discount||0),0);
      const pkgAmt    = parseFloat(amtEntry?.package_amount||amtEntry?.nh_fees||0);
      const ipdDue    = pkgAmt - totalRcpt - totalDisc;
      const indenAmt  = (indens||[]).reduce((a,r)=>a+parseFloat(r.amount||0),0);
      const totalOpd  = (opdBills||[]).reduce((a,b)=>a+parseFloat(b.bill_amount||0),0);
      const paidOpd   = (opdBills||[]).reduce((a,b)=>a+parseFloat(b.paid_amount||0)+parseFloat(b.discount||0),0);
      const opdDue    = totalOpd - paidOpd;
      const referPaid = (referPays||[]).reduce((a,r)=>a+parseFloat(r.amount||0),0);

      document.getElementById('detailPatientName').textContent = `${adm.patient_name} (${adm.admission_no})`;

      let html = `
        <div class="detail-section">
          <h3>🏥 Admission Details</h3>
          <table><tbody>
            <tr><td>Patient Name</td><td><strong>${adm.patient_name}</strong></td></tr>
            <tr><td>Address</td><td>${adm.address||'-'}</td></tr>
            <tr><td>Admission No.</td><td>${adm.admission_no}</td></tr>
            <tr><td>Admission Date</td><td>${adm.admission_date}</td></tr>
            <tr><td>Case Mode</td><td>${adm.case_mode}${adm.case_mode_other?' ('+adm.case_mode_other+')':''}</td></tr>
            <tr><td>Case Type</td><td>${adm.case_type}${adm.case_type_other?' ('+adm.case_type_other+')':''}</td></tr>
            <tr><td>Refer</td><td>${adm.refer_name||'Not Applicable'}</td></tr>
            <tr><td>Status</td><td>${adm.is_discharged?'Discharged on '+adm.discharge_date:'Active / Admitted'}</td></tr>
          </tbody></table>
        </div>`;

      if (ot) {
        html += `<div class="detail-section">
          <h3>🔬 OT Details</h3>
          <table><tbody>
            <tr><td>OT Date</td><td>${ot.ot_date}</td></tr>
            <tr><td>Case Detail</td><td>${ot.case_detail}</td></tr>
            <tr><td>Surgent</td><td>${ot.surgent_name||'-'}</td></tr>
            <tr><td>Anaesthesia</td><td>${ot.anaesthesia_name||'Not Applicable'}</td></tr>
            ${ot.remark?`<tr><td>Remark</td><td>${ot.remark}</td></tr>`:''}
          </tbody></table>
        </div>`;
      } else {
        html += `<div class="detail-section">
          <h3>🔬 OT Details</h3>
          <p style="color:#d97706;font-size:.85rem">⚠ OT Entry not done yet.</p>
        </div>`;
      }

      if (amtEntry) {
        html += `<div class="detail-section">
          <h3>💰 Fee Details</h3>
          <table><tbody>
            ${amtEntry.refer_amount!=null?`<tr><td>Refer Amount</td><td class="r">${fmt(amtEntry.refer_amount)}</td></tr>`:'<tr><td>Refer Amount</td><td>Not Applicable</td></tr>'}
            ${amtEntry.surgent_fees!=null?`<tr><td>Surgent Fees</td><td class="r">${fmt(amtEntry.surgent_fees)}</td></tr>`:''}
            ${amtEntry.anaesthesia_fees!=null?`<tr><td>Anaesthesia Fees</td><td class="r">${fmt(amtEntry.anaesthesia_fees)}</td></tr>`:''}
            ${amtEntry.package_amount!=null?`<tr><td>Package Amount</td><td class="r">${fmt(amtEntry.package_amount)}</td></tr>`:''}
            ${amtEntry.nh_fees!=null?`<tr><td>NH Fees (Doctor Case)</td><td class="r">${fmt(amtEntry.nh_fees)}</td></tr>`:''}
          </tbody></table>
        </div>`;
      } else {
        html += `<div class="detail-section">
          <h3>💰 Fee Details</h3>
          <p style="color:#d97706;font-size:.85rem">⚠ Amount entry not done yet.</p>
        </div>`;
      }

      if (receipts && receipts.length > 0) {
        html += `<div class="detail-section">
          <h3>💵 Cash Receipts</h3>
          <table><thead><tr>
            <th>Date</th><th class="r">Amount</th><th class="r">Discount</th>
            <th class="r">Cash</th><th class="r">Bank</th><th class="r">PhonePe</th>
          </tr></thead>
          <tbody>${receipts.map(r=>`<tr>
            <td>${r.receipt_date}</td><td class="r">${fmt(r.amount)}</td><td class="r">${fmt(r.discount)}</td>
            <td class="r">${fmt(r.cash_amount)}</td><td class="r">${fmt(r.bank_amount)}</td><td class="r">${fmt(r.phonepe_amount)}</td>
          </tr>`).join('')}</tbody>
          <tfoot><tr><td>Total</td><td class="r">${fmt(totalRcpt)}</td><td class="r">${fmt(totalDisc)}</td>
            <td colspan="3"></td></tr></tfoot></table>
          <p style="font-size:.82rem;margin-top:.4rem">
            IPD Balance Due: <strong style="color:${ipdDue>0?'#dc2626':'#059669'}">${fmt(ipdDue)}</strong></p>
        </div>`;
      }

      if (addl && addl.length > 0) {
        html += `<div class="detail-section">
          <h3>➕ Additional Charges</h3>
          <table><thead><tr><th>Date</th><th>Purpose</th><th class="r">Amount</th></tr></thead>
          <tbody>${addl.map(r=>`<tr>
            <td>${r.charge_date}</td><td>${r.purpose}</td><td class="r">${fmt(r.amount)}</td>
          </tr>`).join('')}</tbody>
          <tfoot><tr><td colspan="2">Total</td>
            <td class="r">${fmt(addl.reduce((a,r)=>a+parseFloat(r.amount||0),0))}</td>
          </tr></tfoot></table>
        </div>`;
      }

      if (indens && indens.length > 0) {
        html += `<div class="detail-section">
          <h3>💊 Medicine Indens</h3>
          <table><thead><tr>
            <th>Date</th><th>Inden No.</th><th>Type</th><th class="r">Amount</th><th>Remark</th>
          </tr></thead>
          <tbody>${indens.map(r=>`<tr>
            <td>${r.inden_date}</td><td>${r.inden_no}</td>
            <td>${r.remark&&r.remark.startsWith('[WARD]')?'🏥 Ward':'📦 Inden'}</td>
            <td class="r">${fmt(r.amount)}</td>
            <td>${r.remark?r.remark.replace('[WARD] ',''):'-'}</td>
          </tr>`).join('')}</tbody>
          <tfoot><tr><td colspan="3">Total Inden</td>
            <td class="r">${fmt(indenAmt)}</td><td></td>
          </tr></tfoot></table>
        </div>`;
      }

      if (opdBills && opdBills.length > 0) {
        html += `<div class="detail-section">
          <h3>📄 OPD Bills</h3>
          <table><thead><tr>
            <th>Case No.</th><th>Date</th><th>Patient</th><th class="r">Bill</th>
            <th class="r">Paid</th><th class="r">Discount</th><th class="r">Due</th>
          </tr></thead>
          <tbody>${opdBills.map(b=>{
            const d=parseFloat(b.bill_amount||0)-parseFloat(b.paid_amount||0)-parseFloat(b.discount||0);
            return `<tr><td>${b.case_no||'-'}</td><td>${b.case_date||'-'}</td><td>${b.patient_name}</td>
              <td class="r">${fmt(b.bill_amount)}</td><td class="r">${fmt(b.paid_amount)}</td>
              <td class="r">${fmt(b.discount)}</td>
              <td class="r" style="color:${d>0?'#dc2626':'#059669'}">${fmt(d)}</td></tr>`;
          }).join('')}</tbody>
          <tfoot><tr><td colspan="3">Total</td>
            <td class="r">${fmt(totalOpd)}</td><td class="r">${fmt(paidOpd)}</td>
            <td></td><td class="r">${fmt(opdDue)}</td>
          </tr></tfoot></table>
        </div>`;
      }

      if (adm.refer_id) {
        html += `<div class="detail-section">
          <h3>🤝 Refer Payment</h3>
          <p style="font-size:.85rem">
            Refer: <strong>${adm.refer_name}</strong> &nbsp;|&nbsp;
            Refer Amount: <strong>${amtEntry?.refer_amount!=null?fmt(amtEntry.refer_amount):'Not set'}</strong>
            &nbsp;|&nbsp; Paid: <strong>${fmt(referPaid)}</strong> &nbsp;|&nbsp;
            Status: <strong style="color:${referPaid>0?'#059669':'#d97706'}">${referPaid>0?'Paid':'Pending'}</strong>
          </p>
        </div>`;
      }

      document.getElementById('detailContent').innerHTML = html;
      document.getElementById('r1List').classList.add('hidden');
      document.getElementById('r1Detail').classList.remove('hidden');
    } catch(ex) {
      alert('Error loading patient: ' + ex.message);
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  }

  function backToList() {
    document.getElementById('r1Detail').classList.add('hidden');
    document.getElementById('r1List').classList.remove('hidden');
  }

  function downloadDetailPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    doc.setFontSize(14);
    doc.text('Bhagirathi Nursing Home – IPD', 15, 15);
    doc.setFontSize(10);
    doc.text(document.getElementById('detailPatientName').textContent, 15, 22);
    doc.setFontSize(8);
    doc.text('Generated: ' + new Date().toLocaleString('en-IN'), 15, 28);
    const tables = document.getElementById('detailContent').querySelectorAll('table');
    let y = 32;
    tables.forEach(tbl => {
      doc.autoTable({ html:tbl, startY:y, styles:{fontSize:7},
        headStyles:{fillColor:[99,102,241]}, margin:{left:15,right:15} });
      y = doc.lastAutoTable.finalY + 5;
    });
    doc.save('IPD_Patient_' + new Date().toISOString().slice(0,10) + '.pdf');
  }

  // ─── REPORT 2: SUMMARY ───────────────────────────────
  async function loadSummary() {
    const from = document.getElementById('r2From').value;
    const to   = document.getElementById('r2To').value;
    const out  = document.getElementById('summaryOut');
    if (!from||!to) return;
    out.textContent = 'Loading…';
    document.getElementById('spinner').classList.remove('hidden');
    try {
      const [
        {data:adms},{data:amtEntries},{data:receipts},
        {data:indens},{data:otEntries}
      ] = await Promise.all([
        BNH_PAGE.sb.from('ipd_admissions').select('id,admission_date,admission_no,patient_name,case_mode,case_type,is_discharged,is_cancelled,cancel_reason,cancel_date')
          .gte('admission_date',from).lte('admission_date',to).order('admission_date'),
        BNH_PAGE.sb.from('ipd_amount_entries').select('admission_id,package_amount,nh_fees'),
        BNH_PAGE.sb.from('ipd_cash_receipts').select('admission_id,amount,discount')
          .gte('receipt_date',from).lte('receipt_date',to),
        BNH_PAGE.sb.from('ipd_medicine_indens').select('admission_id,amount')
          .gte('inden_date',from).lte('inden_date',to),
        BNH_PAGE.sb.from('ipd_ot_entries').select('admission_id')
      ]);

      const amtMap = {};
      (amtEntries||[]).forEach(a=>{ amtMap[a.admission_id]=a; });
      const otSet = new Set((otEntries||[]).map(o=>o.admission_id));

      const rows = (adms||[]).map(adm => {
        const amt  = amtMap[adm.id]||{};
        const pkg  = parseFloat(amt.package_amount||amt.nh_fees||0);
        const rcpt = (receipts||[]).filter(r=>r.admission_id===adm.id).reduce((a,r)=>a+parseFloat(r.amount||0),0);
        const disc = (receipts||[]).filter(r=>r.admission_id===adm.id).reduce((a,r)=>a+parseFloat(r.discount||0),0);
        const inden= (indens||[]).filter(r=>r.admission_id===adm.id).reduce((a,r)=>a+parseFloat(r.amount||0),0);
        return { adm, pkg, rcpt, disc, inden, due: pkg-rcpt-disc, otDone: otSet.has(adm.id) };
      });

      const totPkg  = rows.reduce((a,r)=>a+r.pkg,0);
      const totRcpt = rows.reduce((a,r)=>a+r.rcpt,0);
      const totDisc = rows.reduce((a,r)=>a+r.disc,0);
      const totDue  = rows.reduce((a,r)=>a+r.due,0);
      const totInden= rows.reduce((a,r)=>a+r.inden,0);

      out.innerHTML = `
        <div id="summaryWrap">
          <p style="font-size:.85rem;margin-bottom:.75rem">
            Period: <strong>${from}</strong> to <strong>${to}</strong>
            &nbsp;|&nbsp; Total Patients: <strong>${rows.length}</strong>
            &nbsp;|&nbsp; Discharged: <strong>${rows.filter(r=>r.adm.is_discharged).length}</strong>
            &nbsp;|&nbsp; <span style="color:#dc2626">Cancelled: <strong>${rows.filter(r=>r.adm.is_cancelled).length}</strong></span>
          </p>
          <table id="summaryTable">
            <thead><tr>
              <th>#</th><th>Adm Date</th><th>Adm No.</th><th>Patient</th>
              <th>Mode</th><th>Type</th><th>OT</th>
              <th class="r">Package</th><th class="r">Received</th>
              <th class="r">Discount</th><th class="r">Due</th><th class="r">Inden</th>
              <th>Status</th>
            </tr></thead>
            <tbody>${rows.map((r,i)=>`<tr style="${r.adm.is_cancelled?'background:#fff5f5;color:#dc2626;':''}">
              <td>${i+1}</td>
              <td>${r.adm.admission_date}</td><td>${r.adm.admission_no}</td>
              <td>${r.adm.patient_name}${r.adm.is_cancelled?` <span style="font-size:.72rem;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;padding:.1rem .35rem;color:#dc2626;font-weight:700">CANCELLED</span>`:''}</td>
              <td>${r.adm.case_mode}</td><td>${r.adm.case_type}</td>
              <td>${r.otDone?'✅':'⚠'}</td>
              <td class="r">${fmt(r.pkg)}</td><td class="r">${fmt(r.rcpt)}</td>
              <td class="r">${fmt(r.disc)}</td>
              <td class="r" style="color:${r.adm.is_cancelled?'#dc2626':r.due>0?'#dc2626':'#059669'}">${fmt(r.due)}</td>
              <td class="r">${fmt(r.inden)}</td>
              <td style="${r.adm.is_cancelled?'color:#dc2626;font-weight:700':''}">
                ${r.adm.is_cancelled?`❌ Cancelled${r.adm.cancel_date?' ('+r.adm.cancel_date+')':''}`:r.adm.is_discharged?'Discharged':'Active'}
                ${r.adm.is_cancelled&&r.adm.cancel_reason?`<br><span style="font-size:.72rem;font-weight:400">${r.adm.cancel_reason}</span>`:''}
              </td>
            </tr>`).join('')}</tbody>
            <tfoot><tr>
              <td colspan="7">Total</td>
              <td class="r">${fmt(totPkg)}</td><td class="r">${fmt(totRcpt)}</td>
              <td class="r">${fmt(totDisc)}</td><td class="r">${fmt(totDue)}</td>
              <td class="r">${fmt(totInden)}</td><td></td>
            </tr></tfoot>
          </table>
        </div>`;
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  }

  function downloadSummaryPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
    doc.setFontSize(14);
    doc.text('Bhagirathi Nursing Home – IPD Summary Report', 15, 15);
    doc.setFontSize(8);
    doc.text('Generated: ' + new Date().toLocaleString('en-IN'), 15, 21);
    const tbl = document.getElementById('summaryTable');
    if (tbl) doc.autoTable({ html:tbl, startY:25, styles:{fontSize:7},
      headStyles:{fillColor:[99,102,241]}, margin:{left:10,right:10} });
    doc.save('IPD_Summary_' + new Date().toISOString().slice(0,10) + '.pdf');
  }
</script>
</body>
</html>
