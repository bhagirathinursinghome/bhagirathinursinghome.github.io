<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Voucher – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:180px; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>🧾 Voucher / Other Expenses</h1>

  <div class="page-card">
    <form id="voucherForm">
      <label>Recorded By</label>
      <input id="recBy" readonly />

      <div class="form-row">
        <div>
          <label>Date <span style="color:red">*</span></label>
          <input id="voucherDate" type="date" required />
        </div>
        <div>
          <label>Pay To <span style="color:red">*</span></label>
          <input id="payTo" type="text" placeholder="Name of payee" required />
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Pay For <span style="color:red">*</span></label>
          <input id="payFor" type="text" placeholder="Purpose / description" required />
        </div>
        <div>
          <label>Amount (₹) <span style="color:red">*</span></label>
          <input id="amount" type="number" min="0.01" step="0.01" required />
        </div>
      </div>

      <label>Mode of Payment <span style="color:red">*</span></label>
      <select id="mode" required>
        <option value="">-- Select Mode --</option>
        <option value="Cash">Cash</option>
        <option value="Bank">Bank</option>
        <option value="PhonePe">PhonePe</option>
      </select>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Voucher</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 Recent Vouchers</h2>
    <div id="recentList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","pharmacy","manager"]);
  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
  document.getElementById('voucherDate').value = new Date().toISOString().slice(0,10);

  async function loadRecent() {
    const { data } = await BNH_PAGE.sb.from('pharmacy_vouchers')
      .select('*').order('recorded_at', { ascending: false }).limit(10);
    const div = document.getElementById('recentList');
    if (!data || data.length === 0) { div.textContent = 'No recent vouchers.'; return; }
    div.innerHTML = `<table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f0f0f0">
        <th style="padding:6px;text-align:left">Date</th>
        <th style="padding:6px;text-align:left">Pay To</th>
        <th style="padding:6px;text-align:left">Pay For</th>
        <th style="padding:6px;text-align:right">Amount</th>
        <th style="padding:6px;text-align:left">Mode</th>
        <th style="padding:6px;text-align:left">By</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr style="border-bottom:1px solid #eee">
        <td style="padding:6px">${r.voucher_date}</td>
        <td style="padding:6px">${r.pay_to}</td>
        <td style="padding:6px">${r.pay_for}</td>
        <td style="padding:6px;text-align:right">₹${parseFloat(r.amount).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td style="padding:6px">${r.mode}</td>
        <td style="padding:6px">${r.recorded_by_name || r.recorded_by}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  loadRecent();

  document.getElementById('voucherForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        voucher_date: document.getElementById('voucherDate').value,
        pay_to: document.getElementById('payTo').value.trim(),
        pay_for: document.getElementById('payFor').value.trim(),
        amount: parseFloat(document.getElementById('amount').value),
        mode: document.getElementById('mode').value
      });
      const { error } = await BNH_PAGE.sb.from('pharmacy_vouchers').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Voucher saved successfully!';
      e.target.reset();
      document.getElementById('voucherDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      loadRecent();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
