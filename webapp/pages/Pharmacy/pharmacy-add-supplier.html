<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Add Supplier – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:180px; }
    .badge { display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600; }
    .badge-active { background:#d1fae5;color:#065f46; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>🏭 Add Supplier</h1>

  <div class="page-card">
    <form id="supplierForm">
      <label>Recorded By</label>
      <input id="recBy" readonly />

      <div class="form-row">
        <div>
          <label>Supplier Name <span style="color:red">*</span></label>
          <input id="supplierName" type="text" placeholder="e.g. Medico Pharma Ltd." required />
        </div>
        <div>
          <label>Opening Balance (₹)</label>
          <input id="openingBalance" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
      </div>

      <label>Remark</label>
      <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Supplier</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 All Suppliers</h2>
    <div id="supplierList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","pharmacy","manager"]);
  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';

  async function loadSuppliers() {
    const { data, error } = await BNH_PAGE.sb.from('pharmacy_suppliers')
      .select('*').order('supplier_name');
    const div = document.getElementById('supplierList');
    if (error || !data || data.length === 0) { div.textContent = 'No suppliers added yet.'; return; }
    div.innerHTML = `<table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f0f0f0">
        <th style="padding:6px;text-align:left">#</th>
        <th style="padding:6px;text-align:left">Supplier Name</th>
        <th style="padding:6px;text-align:right">Opening Bal.</th>
        <th style="padding:6px;text-align:left">Remark</th>
        <th style="padding:6px;text-align:left">Status</th>
        <th style="padding:6px;text-align:left">Added By</th>
      </tr></thead>
      <tbody>${data.map((r,i)=>`<tr style="border-bottom:1px solid #eee">
        <td style="padding:6px">${i+1}</td>
        <td style="padding:6px"><strong>${r.supplier_name}</strong></td>
        <td style="padding:6px;text-align:right">₹${parseFloat(r.opening_balance||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td style="padding:6px">${r.remark || '-'}</td>
        <td style="padding:6px"><span class="badge badge-active">Active</span></td>
        <td style="padding:6px">${r.recorded_by_name || r.recorded_by}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  loadSuppliers();

  document.getElementById('supplierForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        supplier_name: document.getElementById('supplierName').value.trim(),
        opening_balance: parseFloat(document.getElementById('openingBalance').value || 0),
        remark: document.getElementById('remark').value.trim() || null,
        is_active: true
      });
      const { error } = await BNH_PAGE.sb.from('pharmacy_suppliers').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Supplier added successfully!';
      e.target.reset();
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      loadSuppliers();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
