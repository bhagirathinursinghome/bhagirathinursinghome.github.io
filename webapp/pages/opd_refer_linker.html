<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OPD Refer Linker</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row > * { flex: 1; min-width: 200px; }
    .case-card { background: #f9f9f9; border: 1px solid #ddd; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .case-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .case-info { flex: 1; }
    .case-no { font-weight: bold; color: #007bff; font-size: 1.1rem; }
    .case-detail { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
    .case-tests { background: white; padding: 0.5rem; border-radius: 3px; font-size: 0.8rem; color: #555; max-height: 80px; overflow-y: auto; margin-top: 0.5rem; }
    .pay-summary { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.4rem; }
    .pay-pill { background: white; border: 1px solid #ddd; border-radius: 3px; padding: 0.2rem 0.6rem; font-size: 0.78rem; color: #444; }
    .pay-pill.paid { border-color: #28a745; color: #155724; }
    .pay-pill.due  { border-color: #dc3545; color: #721c24; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.5rem; border: 1px solid #ccc;
      border-radius: 3px; font-size: 0.9rem; box-sizing: border-box;
    }
    .quack-display { background: #fff3e0; padding: 0.75rem; border-radius: 3px; border-left: 3px solid #ff9800; font-size: 0.9rem; margin-top: 0.5rem; }
    .quack-display strong { display: block; color: #e65100; }
    .case-actions { display: flex; gap: 0.5rem; }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; }
    .btn-success { background: #28a745; }
    .btn-success:hover { background: #218838; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; border-bottom: 2px solid #e9ecef; }
    .tab-btn { padding: 0.75rem 1.5rem; background: none; border: none; cursor: pointer; border-bottom: 3px solid transparent; font-size: 0.95rem; color: #666; }
    .tab-btn.active { color: #007bff; border-bottom-color: #007bff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem; }
    .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
    .filter-group label { font-size: 0.8rem; color: #666; margin-bottom: 0.25rem; }
    .filter-group input, .filter-group select { padding: 0.45rem 0.7rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.85rem; }
    .completed-list { list-style: none; padding: 0; }
    .completed-item { background: #f0f0f0; padding: 0.75rem; border-radius: 4px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .completed-item .case-info { margin: 0; }
    .completed-item .status-badge { background: #28a745; color: white; padding: 0.25rem 0.75rem; border-radius: 3px; font-size: 0.75rem; white-space: nowrap; }
    .summary-box { background: #f8f9fa; padding: 1rem; border-radius: 4px; margin-bottom: 1rem; border-left: 4px solid #007bff; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .empty-state { text-align: center; padding: 2rem; color: #999; }
    .empty-state-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .refer-type-toggle { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .refer-type-btn { padding: 0.4rem 0.9rem; border: 1px solid #ccc; background: #f8f9fa; border-radius: 3px; cursor: pointer; font-size: 0.85rem; }
    .refer-type-btn.active { background: #007bff; color: white; border-color: #007bff; }
    .stats-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .stat-box { background: #f8f9fa; border-radius: 4px; padding: 0.65rem 1rem; flex: 1; min-width: 110px; border-left: 3px solid #007bff; }
    .stat-box .val { font-size: 1.2rem; font-weight: 700; color: #007bff; }
    .stat-box .lbl { font-size: 0.75rem; color: #666; margin-top: 2px; }
    .pagination { display: flex; gap: 0.4rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .pagination button { padding: 0.38rem 0.65rem; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 3px; font-size: 0.82rem; }
    .pagination button.active { background: #007bff; color: white; border-color: #007bff; }
    .divider { border: none; border-top: 1px solid #e9ecef; margin: 0.75rem 0; }

    /* ── Modal Popup Styles ── */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: white; padding: 1.5rem; border-radius: 6px; width: 100%; max-width: 550px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid #e9ecef; padding-bottom: 0.5rem; }
    .modal-header h3 { margin: 0; font-size: 1.2rem; color: #333; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #999; }
    .modal-close:hover { color: #333; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>🔗 OPD Refer & IPD Linker</h1>

  <div class="page-card">
    <p style="margin-bottom: 1rem; color: #555; font-size: 0.9rem;">
      Link OPD cases to referrals, IPD admissions and case type. Complete each case before moving to next.
    </p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="pending">📋 Pending <span id="pendBadge" style="background:#dc3545;color:white;padding:1px 7px;border-radius:10px;font-size:.75rem;margin-left:.3rem"></span></button>
      <button class="tab-btn" data-tab="completed">✅ Completed <span id="compBadge" style="background:#28a745;color:white;padding:1px 7px;border-radius:10px;font-size:.75rem;margin-left:.3rem"></span></button>
    </div>

    <div class="tab-content active" id="pending-tab">
      <div class="filter-bar">
        <div class="filter-group">
          <label>Search</label>
          <input id="pendSearch" placeholder="Case no / patient…" oninput="filterAndRenderPending()"/>
        </div>
        <div class="filter-group">
          <label>Date From</label>
          <input type="date" id="pendDateFrom" onchange="filterAndRenderPending()"/>
        </div>
        <div class="filter-group">
          <label>Date To</label>
          <input type="date" id="pendDateTo" onchange="filterAndRenderPending()"/>
        </div>
      </div>
      <div class="stats-row" id="pendStats"></div>
      <div id="pendingCasesContainer">
        <div class="empty-state"><div class="empty-state-icon">📭</div><p>Loading OPD cases…</p></div>
      </div>
      <div class="pagination" id="pendPager"></div>
    </div>

    <div class="tab-content" id="completed-tab">
      <div class="filter-bar">
        <div class="filter-group">
          <label>Search</label>
          <input id="compSearch" placeholder="Case no / patient / refer…" oninput="filterAndRenderCompleted()"/>
        </div>
        <div class="filter-group">
          <label>Date From</label>
          <input type="date" id="compDateFrom" onchange="filterAndRenderCompleted()"/>
        </div>
        <div class="filter-group">
          <label>Date To</label>
          <input type="date" id="compDateTo" onchange="filterAndRenderCompleted()"/>
        </div>
      </div>
      <div class="summary-box">
        <div class="summary-row"><span>Completed Cases:</span><strong id="completedCount">0</strong></div>
      </div>
      <ul class="completed-list" id="completedList">
        <li style="text-align:center;color:#999;padding:2rem;">No completed cases yet</li>
      </ul>
      <div class="pagination" id="compPager"></div>
    </div>

    <p class="err" id="err"></p>
    <p class="info" id="ok" style="display:none"></p>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="editModalTitle">✏️ Edit Linked Case</h3>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <form id="editCaseForm">
      <div class="form-group">
        <label>Refer <span style="color:red">*</span></label>
        <div class="refer-type-toggle">
          <button type="button" class="refer-type-btn modal-ref-btn" id="modal-ref-quack" data-type="quack"
            onclick="switchModalReferType('quack')">👨‍⚕️ Refer</button>
          <button type="button" class="refer-type-btn modal-ref-btn" id="modal-ref-none" data-type="none"
            onclick="switchModalReferType('none')">🚫 Not Applicable</button>
        </div>
      </div>

      <div class="form-group" id="modal-refer-quack-row">
        <label>Select Refer Doctor</label>
        <select name="quack_doctor" id="modalQuackSelect" onchange="showModalQuackInfo(this.value)">
          <option value="">Choose Refer…</option>
        </select>
        <div class="quack-display" id="modal-quack-display" style="display:none;margin-top:.5rem;"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Case Type <span style="color:red">*</span></label>
          <select name="case_type" required>
            <option value="">Choose Type…</option>
            <option value="lab_sample">Lab Sample</option>
            <option value="sport_sample">Sport Sample</option>
          </select>
        </div>

        <div class="form-group">
          <label>Linked to IPD Admission?</label>
          <select name="ipd_link_yn" onchange="toggleModalIPDRow(this.value)">
            <option value="no">No (Not Applicable)</option>
            <option value="yes">Yes (Select Patient)</option>
          </select>
        </div>
      </div>

      <div class="form-row" id="modal-ipd-patient-row" style="display:none;">
        <div class="form-group">
          <label>Select IPD Patient (Admission No)</label>
          <select name="ipd_patient_id" id="modalIpdSelect">
            <option value="">Choose IPD Patient…</option>
          </select>
        </div>
      </div>

      <div class="case-actions" style="margin-top:1.5rem; justify-content: flex-end;">
        <button type="button" class="btn-primary btn-sm" style="background:#6c757d;" onclick="closeEditModal()">Cancel</button>
        <button type="submit" class="btn-primary btn-sm btn-success">💾 Update changes</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>

<script>
  BNH_PAGE.requireRole(["manager", "admin", "accountant", "reception"]);

  /* ── access control setup ── */
  const FULL_ACCESS_ROLES    = ["admin"];
  const LIMITED_ACCESS_ROLES = ["manager", "accountant", "reception"];
  let currentUserRole        = null;

  /* ── state ── */
  let allCases      = [];   // all opd_case rows (pending = refer_enter_by IS NULL)
  let testsByCase   = {};   // case_no → [test_name,…]
  let cashByCase    = {};   // case_no → {paid, discount, due, status}
  let ipdPatients   = [];
  let quackDoctors  = [];

  // pagination
  let filteredPend = [], currentPendPage = 1;
  let filteredComp = [], currentCompPage = 1;
  const PER = 15;

  /* ── helpers ── */
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(n){ return '₹'+(Number(n||0)).toLocaleString('en-IN'); }
  function fmtD(d){ return d ? String(d).slice(0,10) : '—'; }
  function showSpinner(v){ document.getElementById('spinner').classList.toggle('hidden',!v); }
  function showOk(msg){ const o=document.getElementById('ok'); o.style.display='block'; o.textContent=msg; setTimeout(()=>o.style.display='none',3000); }
  function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; setTimeout(()=>e.textContent='',6000); }

  /* ── load quack doctors ── */
  async function loadQuackDoctors() {
    try {
      const { data, error } = await BNH_PAGE.sb.from('gramin_doctor_visits')
        .select('id,doctor_name,mobile,recorded_by_name').order('doctor_name');
      if (!error && data) {
        const seen = new Set();
        quackDoctors = data.filter(d => {
          const key = d.mobile || d.doctor_name;
          if (seen.has(key)) return false;
          seen.add(key); return true;
        });
      }
    } catch(e){ console.error('loadQuackDoctors:', e); }
  }

  /* ── load IPD patients (current + recent — not yet discharged) ── */
  async function loadIPDPatients() {
    try {
      const { data, error } = await BNH_PAGE.sb.from('ipd_admissions')
        .select('id,admission_no,patient_name').eq('is_discharged', false);
      if (!error && data) ipdPatients = data;
    } catch(e){ console.error('loadIPDPatients:', e); }
  }

  /* ── load ALL opd_case rows ── */
  async function loadCases() {
    const { data, error } = await BNH_PAGE.sb.from('opd_case')
      .select('case_no,case_date,patient_name,total_amount,refer_name,refer_enter_by,refer_enter_time,type,ipd_link')
      .order('case_date', { ascending: false });
    if (error) throw error;
    allCases = data || [];
  }

  /* ── load tests for all cases ── */
  async function loadTests() {
    const { data, error } = await BNH_PAGE.sb.from('opd_test')
      .select('case_number,test_name');
    if (error) { console.warn('opd_test load:', error.message); return; }
    testsByCase = {};
    (data||[]).forEach(r => {
      if (!testsByCase[r.case_number]) testsByCase[r.case_number] = [];
      if (r.test_name && !testsByCase[r.case_number].includes(r.test_name))
        testsByCase[r.case_number].push(r.test_name);
    });
  }

  /* ── load cash register to compute paid/due per case ── */
  async function loadCash() {
    const { data, error } = await BNH_PAGE.sb.from('opd_cash_register')
      .select('case_no,income,discount');
    if (error) { console.warn('opd_cash_register load:', error.message); return; }
    cashByCase = {};
    (data||[]).forEach(r => {
      if (!cashByCase[r.case_no]) cashByCase[r.case_no] = { paid: 0, discount: 0 };
      cashByCase[r.case_no].paid     += Number(r.income   || 0);
      cashByCase[r.case_no].discount += Number(r.discount || 0);
    });
    // compute due + status
    Object.keys(cashByCase).forEach(cn => {
      const c   = cashByCase[cn];
      const cas = allCases.find(x => x.case_no === cn);
      const bill = Number(cas?.total_amount || 0);
      c.due    = Math.max(0, bill - c.paid - c.discount);
      c.status = c.due <= 0 ? 'paid' : (c.paid > 0 || c.discount > 0) ? 'partial' : 'due';
    });
  }

  /* ── quack doctor options ── */
  function quackOptions() {
    return quackDoctors.map(d =>
      `<option value="${esc(d.doctor_name)}|${esc(d.mobile||'')}|${esc(d.recorded_by_name||'')}">`+
      `${esc(d.doctor_name)} — 📞 ${d.mobile||'—'} (${esc(d.recorded_by_name||'Unknown Team')})</option>`
    ).join('');
  }

  /* ── payment pill HTML ── */
  function payPills(caseNo, billAmt) {
    const c    = cashByCase[caseNo];
    const bill = Number(billAmt || 0);
    const paid = c ? c.paid     : 0;
    const disc = c ? c.discount : 0;
    const due  = c ? c.due      : bill;
    const cls  = due <= 0 ? 'paid' : (due < bill ? '' : 'due');
    return `<div class="pay-summary">
      <span class="pay-pill">💰 Bill: ${fmt(bill)}</span>
      <span class="pay-pill paid">✓ Paid: ${fmt(paid)}</span>
      ${disc>0?`<span class="pay-pill">🏷️ Disc: ${fmt(disc)}</span>`:''}
      <span class="pay-pill ${cls}">⏳ Due: ${fmt(due)}</span>
    </div>`;
  }

  /* ── filter helpers ── */
  function applyFilter(src, searchId, dfId, dtId) {
    const q  = (document.getElementById(searchId).value||'').toLowerCase();
    const df = document.getElementById(dfId).value;
    const dt = document.getElementById(dtId).value;
    return src.filter(x => {
      if (q && !(x.case_no||'').toLowerCase().includes(q) && !(x.patient_name||'').toLowerCase().includes(q) && !(x.refer_name||'').toLowerCase().includes(q)) return false;
      const d = String(x.case_date||'').slice(0,10);
      if (df && d < df) return false;
      if (dt && d > dt) return false;
      return true;
    });
  }

  /* ── pending filter + render ── */
  function filterAndRenderPending() {
    const pending = allCases.filter(c => !c.refer_enter_by);
    filteredPend  = applyFilter(pending, 'pendSearch', 'pendDateFrom', 'pendDateTo');
    currentPendPage = 1;
    renderPendStats(pending);
    renderPendingPage();
  }

  function renderPendStats(pending) {
    document.getElementById('pendStats').innerHTML = `
      <div class="stat-box"><div class="val" style="color:#dc3545">${pending.length}</div><div class="lbl">Total Pending</div></div>
      <div class="stat-box"><div class="val">${filteredPend.length}</div><div class="lbl">Showing (filtered)</div></div>`;
  }

  function renderPendingPage() {
    const container = document.getElementById('pendingCasesContainer');
    document.getElementById('pendBadge').textContent = allCases.filter(c=>!c.refer_enter_by).length;

    if (filteredPend.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎉</div><p>All OPD cases have been linked!</p></div>`;
      document.getElementById('pendPager').innerHTML = '';
      return;
    }

    const slice = filteredPend.slice((currentPendPage-1)*PER, currentPendPage*PER);

    container.innerHTML = slice.map(c => {
      const tests = (testsByCase[c.case_no] || []).join(', ') || '—';
      return `
      <div class="case-card" id="case-${c.case_no}">
        <div class="case-header">
          <div class="case-info">
            <div class="case-no">${esc(c.case_no)}</div>
            <div class="case-detail">📅 ${fmtD(c.case_date)} &nbsp;|&nbsp; 👤 ${esc(c.patient_name)}</div>
            ${payPills(c.case_no, c.total_amount)}
          </div>
        </div>

        <div class="case-tests">
          <strong style="display:block;margin-bottom:.25rem;">🧪 Tests:</strong>
          ${esc(tests)}
        </div>

        <hr class="divider"/>

        <form class="case-form" data-case-no="${esc(c.case_no)}" style="margin-top:.75rem;">

          <div class="form-group">
            <label>Refer <span style="color:red">*</span></label>
            <div class="refer-type-toggle">
              <button type="button" class="refer-type-btn active" data-type="quack"
                onclick="switchReferType('${esc(c.case_no)}','quack')">👨‍⚕️ Refer</button>
              <button type="button" class="refer-type-btn" data-type="none"
                onclick="switchReferType('${esc(c.case_no)}','none')">🚫 Not Applicable</button>
            </div>
          </div>

          <div class="form-group" id="refer-quack-${esc(c.case_no)}">
            <label>Select Refer Doctor</label>
            <select name="quack_doctor" onchange="showQuackInfo('${esc(c.case_no)}', this.value)">
              <option value="">Choose Refer…</option>
              ${quackOptions()}
            </select>
            <div class="quack-display" id="quack-display-${esc(c.case_no)}" style="display:none;margin-top:.5rem;"></div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Case Type <span style="color:red">*</span></label>
              <select name="case_type" required>
                <option value="">Choose Type…</option>
                <option value="lab_sample">Lab Sample</option>
                <option value="sport_sample">Sport Sample</option>
              </select>
            </div>

            <div class="form-group">
              <label>Linked to IPD Admission?</label>
              <select name="ipd_link_yn" onchange="toggleIPDRow('${esc(c.case_no)}', this.value)">
                <option value="no">No (Not Applicable)</option>
                <option value="yes">Yes (Select Patient)</option>
              </select>
            </div>
          </div>

          <div class="form-row" id="ipd-patient-row-${esc(c.case_no)}" style="display:none;">
            <div class="form-group">
              <label>Select IPD Patient (Admission No)</label>
              <select name="ipd_patient_id">
                <option value="">Choose IPD Patient…</option>
                ${ipdPatients.map(p=>`<option value="${esc(p.admission_no)}">${esc(p.patient_name)} (${esc(p.admission_no)})</option>`).join('')}
              </select>
            </div>
          </div>

          <div class="case-actions" style="margin-top:1rem;">
            <button type="submit" class="btn-primary btn-sm btn-success">✅ Save & Complete</button>
            <button type="button" class="btn-primary btn-sm" style="background:#6c757d;"
              onclick="skipCase('${esc(c.case_no)}')">⏭ Skip</button>
          </div>
        </form>
      </div>`;
    }).join('');

    renderPager('pendPager', filteredPend.length, currentPendPage, 'pend');
    attachFormListeners();
  }

  /* ── toggle IPD row ── */
  function toggleIPDRow(caseNo, val) {
    const row = document.getElementById(`ipd-patient-row-${caseNo}`);
    const sel = row?.querySelector('[name="ipd_patient_id"]');
    if (val === 'yes') { row.style.display = 'flex'; if(sel) sel.required = true; }
    else               { row.style.display = 'none';  if(sel) sel.required = false; }
  }

  /* ── refer type switch ── */
  function switchReferType(caseNo, type) {
    const form = document.querySelector(`[data-case-no="${caseNo}"]`);
    if (!form) return;
    form.querySelectorAll('.refer-type-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.type === type));
    const panel = document.getElementById(`refer-quack-${caseNo}`);
    if (panel) panel.style.display = type === 'quack' ? '' : 'none';
    const qd = document.getElementById(`quack-display-${caseNo}`);
    if (qd) qd.style.display = 'none';
  }

  /* ── show quack info card ── */
  function showQuackInfo(caseNo, val) {
    const display = document.getElementById(`quack-display-${caseNo}`);
    if (!val) { display.style.display = 'none'; return; }
    const [name, mobile, team] = val.split('|');
    display.style.display = 'block';
    display.innerHTML = `
      <strong>👨‍⚕️ Refer Doctor</strong>
      <span>Name: <b>${esc(name)}</b></span><br>
      <span>📞 Mobile: <b>${esc(mobile||'—')}</b></span><br>
      <span>🏷️ Team: <b>${esc(team||'N/A')}</b></span>`;
  }

  /* ── skip a case from the rendered list ── */
  function skipCase(caseNo) {
    document.getElementById(`case-${caseNo}`)?.remove();
  }

  /* ── attach submit listeners to rendered forms ── */
  function attachFormListeners() {
    document.querySelectorAll('.case-form').forEach(form => {
      form.addEventListener('submit', async e => {
        e.preventDefault();
        const caseNo   = form.dataset.caseNo;
        const formData = new FormData(form);
        const activeType = form.querySelector('.refer-type-btn.active')?.dataset.type || 'none';

        let referName = null;
        if (activeType === 'quack') {
          const qval = formData.get('quack_doctor') || '';
          if (qval) {
            const [name, mobile, team] = qval.split('|');
            referName = `${name} (${mobile||''}, Team: ${team||'N/A'})`;
          }
        }

        const caseType  = formData.get('case_type');
        if (!caseType) { showErr('⚠️ Please choose a Case Type.'); return; }

        const ipdLinkYN = formData.get('ipd_link_yn');
        const ipdLink   = ipdLinkYN === 'yes' ? (formData.get('ipd_patient_id') || null) : null;
        if (ipdLinkYN === 'yes' && !ipdLink) { showErr('⚠️ Please select an IPD patient.'); return; }

        const stamp = BNH_PAGE.stamp({});

        showSpinner(true);
        try {
          const payload = {
            refer_name:       referName,
            refer_enter_by:   stamp.recorded_by     || null,
            refer_enter_time: new Date().toISOString(),
            type:             caseType,
            ipd_link:         ipdLink,
            updated_at:       new Date().toISOString()
          };

          const { error } = await BNH_PAGE.sb.from('opd_case')
            .update(payload).eq('case_no', caseNo);
          if (error) throw error;

          // update local state
          const idx = allCases.findIndex(c => c.case_no === caseNo);
          if (idx >= 0) Object.assign(allCases[idx], payload);

          document.getElementById(`case-${caseNo}`)?.remove();
          filterAndRenderPending();
          filterAndRenderCompleted();
          showOk(`✅ Case ${caseNo} linked successfully!`);
        } catch(err) {
          showErr('Error: ' + err.message);
        } finally {
          showSpinner(false);
        }
      });
    });
  }

  /* ── completed tab ── */
  function filterAndRenderCompleted() {
    const completed = allCases.filter(c => !!c.refer_enter_by);
    filteredComp    = applyFilter(completed, 'compSearch', 'compDateFrom', 'compDateTo');
    currentCompPage = 1;
    document.getElementById('compBadge').textContent = completed.length;
    renderCompletedPage();
  }

  function renderCompletedPage() {
    const list = document.getElementById('completedList');
    document.getElementById('completedCount').textContent = filteredComp.length;

    if (filteredComp.length === 0) {
      list.innerHTML = '<li style="text-align:center;color:#999;padding:2rem;">No completed cases.</li>';
      document.getElementById('compPager').innerHTML = '';
      return;
    }

    const slice = filteredComp.slice((currentCompPage-1)*PER, currentCompPage*PER);
    const isFullAccess = FULL_ACCESS_ROLES.includes(currentUserRole);

    list.innerHTML = slice.map(c => {
      const tests = (testsByCase[c.case_no] || []).join(', ') || '—';
      
      const actionButtons = isFullAccess ? `
        <div style="margin-top: .6rem; display: flex; gap: .5rem;">
          <button class="btn-primary btn-sm" style="background:#007bff;" onclick="editCompletedCase('${esc(c.case_no)}')">✏️ Edit</button>
          <button class="btn-primary btn-sm" style="background:#dc3545;" onclick="deleteCompletedCase('${esc(c.case_no)}')">🗑️ Delete</button>
        </div>
      ` : '';

      return `
      <li class="completed-item" id="completed-${c.case_no}" style="flex-direction:column;align-items:flex-start;gap:.4rem;">
        <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
          <div>
            <div class="case-no">${esc(c.case_no)}</div>
            <div class="case-detail">👤 ${esc(c.patient_name)} &nbsp;|&nbsp; 📅 ${fmtD(c.case_date)}</div>
          </div>
          <span class="status-badge">✓ Done</span>
        </div>
        ${payPills(c.case_no, c.total_amount)}
        <div class="case-detail" style="margin-top:.25rem;">
          <span title="Tests">🧪 ${esc(tests.substring(0,80))}${tests.length>80?'…':''}</span>
        </div>
        <div class="case-detail">
          📌 Refer: <b>${esc(c.refer_name||'N/A')}</b>
          &nbsp;|&nbsp; 📂 Type: <b>${esc(c.type||'—')}</b>
          &nbsp;|&nbsp; 🏥 IPD: <b>${esc(c.ipd_link||'No')}</b>
        </div>
        <div class="case-detail" style="font-size:.78rem;color:#aaa;">
          Entered: ${fmtD(c.refer_enter_time)} by ${esc(c.refer_enter_by||'—')}
        </div>
        ${actionButtons}
      </li>`;
    }).join('');

    renderPager('compPager', filteredComp.length, currentCompPage, 'comp');
  }

  /* ── edit modal control helpers ── */
  function switchModalReferType(type) {
    document.querySelectorAll('.modal-ref-btn').forEach(btn => 
      btn.classList.toggle('active', btn.dataset.type === type)
    );
    const row = document.getElementById('modal-refer-quack-row');
    if (row) row.style.display = type === 'quack' ? '' : 'none';
    if (type !== 'quack') document.getElementById('modal-quack-display').style.display = 'none';
  }

  function toggleModalIPDRow(val) {
    const row = document.getElementById('modal-ipd-patient-row');
    const sel = row?.querySelector('[name="ipd_patient_id"]');
    if (val === 'yes') { row.style.display = 'flex'; if(sel) sel.required = true; }
    else               { row.style.display = 'none';  if(sel) sel.required = false; }
  }

  function showModalQuackInfo(val) {
    const display = document.getElementById('modal-quack-display');
    if (!val) { display.style.display = 'none'; return; }
    const [name, mobile, team] = val.split('|');
    display.style.display = 'block';
    display.innerHTML = `
      <strong>👨‍⚕️ Refer Doctor</strong>
      <span>Name: <b>${esc(name)}</b></span><br>
      <span>📞 Mobile: <b>${esc(mobile||'—')}</b></span><br>
      <span>🏷️ Team: <b>${esc(team||'N/A')}</b></span>`;
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
  }

  /* ── open & configure edit completed case modal ── */
  function editCompletedCase(caseNo) {
    const c = allCases.find(x => x.case_no === caseNo);
    if (!c) return;

    const modal = document.getElementById('editModal');
    const form  = document.getElementById('editCaseForm');
    form.dataset.caseNo = caseNo;
    document.getElementById('editModalTitle').textContent = `✏️ Edit Case Layout: ${caseNo}`;

    // Set configuration values
    form.elements['case_type'].value = c.type || '';

    if (c.refer_name) {
      switchModalReferType('quack');
      // Match textual refer string against doctor database to restore option state
      const matchedDoc = quackDoctors.find(d => c.refer_name.startsWith(d.doctor_name));
      if (matchedDoc) {
        const optionVal = `${matchedDoc.doctor_name}|${matchedDoc.mobile||''}|${matchedDoc.recorded_by_name||''}`;
        form.elements['quack_doctor'].value = optionVal;
        showModalQuackInfo(optionVal);
      } else {
        form.elements['quack_doctor'].value = '';
      }
    } else {
      switchModalReferType('none');
      form.elements['quack_doctor'].value = '';
    }

    if (c.ipd_link) {
      form.elements['ipd_link_yn'].value = 'yes';
      toggleModalIPDRow('yes');
      form.elements['ipd_patient_id'].value = c.ipd_link;
    } else {
      form.elements['ipd_link_yn'].value = 'no';
      toggleModalIPDRow('no');
      form.elements['ipd_patient_id'].value = '';
    }

    modal.classList.add('active');
  }

  // Setup handler for modal update submission
  document.getElementById('editCaseForm').addEventListener('submit', async e => {
    e.preventDefault();
    const form     = e.target;
    const caseNo   = form.dataset.caseNo;
    const formData = new FormData(form);
    const activeType = form.querySelector('.modal-ref-btn.active')?.dataset.type || 'none';

    let referName = null;
    if (activeType === 'quack') {
      const qval = formData.get('quack_doctor') || '';
      if (qval) {
        const [name, mobile, team] = qval.split('|');
        referName = `${name} (${mobile||''}, Team: ${team||'N/A'})`;
      }
    }

    const caseType = formData.get('case_type');
    if (!caseType) { showErr('⚠️ Please choose a Case Type.'); return; }

    const ipdLinkYN = formData.get('ipd_link_yn');
    const ipdLink   = ipdLinkYN === 'yes' ? (formData.get('ipd_patient_id') || null) : null;
    if (ipdLinkYN === 'yes' && !ipdLink) { showErr('⚠️ Please select an IPD patient.'); return; }

    showSpinner(true);
    try {
      const payload = {
        refer_name: referName,
        type:       caseType,
        ipd_link:   ipdLink,
        updated_at: new Date().toISOString()
      };

      const { error } = await BNH_PAGE.sb.from('opd_case').update(payload).eq('case_no', caseNo);
      if (error) throw error;

      // sync matching profile in memory 
      const idx = allCases.findIndex(c => c.case_no === caseNo);
      if (idx >= 0) Object.assign(allCases[idx], payload);

      closeEditModal();
      filterAndRenderPending();
      filterAndRenderCompleted();
      showOk(`✅ Case ${caseNo} updated successfully!`);
    } catch(err) {
      showErr('Error: ' + err.message);
    } finally {
      showSpinner(false);
    }
  });

  /* ── delete/reset completed case linkage (Full Access Only) ── */
  async function deleteCompletedCase(caseNo) {
    if (!confirm(`Are you sure you want to clear the linkage data for case ${caseNo}? This will move it back to Pending.`)) return;

    showSpinner(true);
    try {
      const payload = {
        refer_name: null,
        refer_enter_by: null,
        refer_enter_time: null,
        type: null,
        ipd_link: null,
        updated_at: new Date().toISOString()
      };

      const { error } = await BNH_PAGE.sb.from('opd_case').update(payload).eq('case_no', caseNo);
      if (error) throw error;

      const idx = allCases.findIndex(c => c.case_no === caseNo);
      if (idx >= 0) Object.assign(allCases[idx], payload);

      filterAndRenderPending();
      filterAndRenderCompleted();
      showOk(`🗑️ Case ${caseNo} reference reset to pending.`);
    } catch(err) {
      showErr('Error: ' + err.message);
    } finally {
      showSpinner(false);
    }
  }

  /* ── pagination ── */
  function renderPager(pagerId, total, page, key) {
    const tp = Math.ceil(total / PER);
    const p  = document.getElementById(pagerId);
    if (tp <= 1) { p.innerHTML = ''; return; }
    let h = '';
    if (page > 1) h += `<button onclick="goP('${key}',1)">«</button><button onclick="goP('${key}',${page-1})">‹</button>`;
    for (let i = Math.max(1, page-2); i <= Math.min(tp, page+2); i++)
      h += `<button ${i===page?'class="active"':''} onclick="goP('${key}',${i})">${i}</button>`;
    if (page < tp) h += `<button onclick="goP('${key}',${page+1})">›</button><button onclick="goP('${key}',${tp})">»</button>`;
    p.innerHTML = h;
  }
  function goP(key, page) {
    if (key === 'pend') { currentPendPage = page; renderPendingPage(); }
    else                { currentCompPage = page; renderCompletedPage(); }
  }

  /* ── tab switching ── */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
    });
  });

  /* ── init ── */
  async function init() {
    showSpinner(true);
    try {
      if (window.BNH_PAGE && typeof BNH_PAGE.getUserRole === 'function') {
        currentUserRole = BNH_PAGE.getUserRole();
      } else if (window.BNH_PAGE && BNH_PAGE.user) {
        currentUserRole = BNH_PAGE.user.role;
      }
      
      await loadQuackDoctors();
      await loadIPDPatients();
      
      // Inject dropdown details safely inside modal select structures
      document.getElementById('modalQuackSelect').innerHTML = '<option value="">Choose Refer…</option>' + quackOptions();
      document.getElementById('modalIpdSelect').innerHTML = '<option value="">Choose IPD Patient…</option>' + ipdPatients.map(p=>`<option value="${esc(p.admission_no)}">${esc(p.patient_name)} (${esc(p.admission_no)})</option>`).join('');

      await loadCases();
      await loadTests();
      await loadCash();
      filterAndRenderPending();
      filterAndRenderCompleted();
    } catch(e) {
      showErr('Initialization error: ' + e.message);
      console.error(e);
    } finally {
      showSpinner(false);
    }
  }

  init();
</script>
</body>
</html>
