<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Manage Suppliers – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .search-bar { display:flex; gap:.75rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
    .search-bar input { flex:1; min-width:180px; padding:.45rem .75rem; border:1.5px solid #d1d5db;
                        border-radius:8px; font-size:.9rem; outline:none; }
    .search-bar input:focus { border-color:#6366f1; }
    table { width:100%; border-collapse:collapse; }
    th { background:#f0f4ff; padding:9px 10px; text-align:left; font-size:.82rem;
         color:#4338ca; font-weight:700; border-bottom:2px solid #e0e7ff; }
    td { padding:9px 10px; border-bottom:1px solid #f0f0f0; font-size:.85rem; vertical-align:middle; }
    tr:hover td { background:#fafafe; }
    .btn-sm { padding:4px 12px; border-radius:6px; font-size:.78rem; font-weight:600;
              cursor:pointer; border:none; transition:all .15s; }
    .btn-edit   { background:#e0e7ff; color:#3730a3; }
    .btn-edit:hover { background:#c7d2fe; }
    .btn-del    { background:#fee2e2; color:#991b1b; }
    .btn-del:hover  { background:#fecaca; }
    .btn-toggle { background:#d1fae5; color:#065f46; }
    .btn-toggle.inactive { background:#fef3c7; color:#92400e; }
    .badge { display:inline-block; padding:2px 9px; border-radius:12px; font-size:.73rem; font-weight:700; }
    .badge-active   { background:#d1fae5; color:#065f46; }
    .badge-inactive { background:#fef3c7; color:#92400e; }

    /* Modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
                     z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:14px; padding:1.75rem; width:min(94vw,480px);
             box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal h2 { font-size:1.05rem; margin:0 0 1.1rem; color:#1e1b4b; }
    .modal label { display:block; font-size:.82rem; font-weight:600; color:#374151; margin:.65rem 0 .2rem; }
    .modal input, .modal textarea, .modal select {
      width:100%; padding:.45rem .7rem; border:1.5px solid #d1d5db; border-radius:8px;
      font-size:.9rem; box-sizing:border-box; outline:none; }
    .modal input:focus, .modal textarea:focus { border-color:#6366f1; }
    .modal-actions { display:flex; gap:.75rem; justify-content:flex-end; margin-top:1.25rem; }
    .btn-cancel { padding:.45rem 1.1rem; border-radius:8px; background:#f3f4f6; color:#374151;
                  font-weight:600; cursor:pointer; border:none; }
    .btn-save   { padding:.45rem 1.1rem; border-radius:8px; background:#6366f1; color:#fff;
                  font-weight:600; cursor:pointer; border:none; }
    .btn-save:hover { background:#4f46e5; }

    /* Confirm delete modal */
    .confirm-modal { background:#fff; border-radius:14px; padding:1.75rem; width:min(94vw,400px);
                     box-shadow:0 20px 60px rgba(0,0,0,.2); text-align:center; }
    .confirm-modal .icon { font-size:2.5rem; margin-bottom:.5rem; }
    .confirm-modal p { font-size:.9rem; color:#374151; margin:.5rem 0 1.2rem; }
    .btn-danger { padding:.45rem 1.2rem; border-radius:8px; background:#dc2626; color:#fff;
                  font-weight:600; cursor:pointer; border:none; }
    .btn-danger:hover { background:#b91c1c; }

    .empty-state { text-align:center; padding:2.5rem 1rem; color:#9ca3af; font-size:.9rem; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<!-- ── Edit Modal ── -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ Edit Supplier</h2>
    <label>Supplier Name <span style="color:red">*</span></label>
    <input id="editName" type="text" required />
    <label>Opening Balance (₹)</label>
    <input id="editOpBal" type="number" min="0" step="0.01" />
    <label>Remark</label>
    <textarea id="editRemark" rows="2"></textarea>
    <p class="err" id="editErr"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save"   onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<!-- ── Delete Confirm Modal ── -->
<div class="modal-overlay" id="delModal">
  <div class="confirm-modal">
    <div class="icon">🗑️</div>
    <strong id="delName" style="font-size:1rem"></strong>
    <p>This will permanently delete this supplier.<br>This action cannot be undone.</p>
    <div style="display:flex;gap:.75rem;justify-content:center">
      <button class="btn-cancel" onclick="closeDelete()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Yes, Delete</button>
    </div>
    <p class="err" id="delErr" style="margin-top:.6rem"></p>
  </div>
</div>

<div class="page">
  <h1>🏭 Manage Suppliers</h1>

  <div class="page-card">
    <div class="search-bar">
      <input id="searchBox" type="text" placeholder="🔍 Search supplier name…" oninput="renderTable()" />
      <label style="display:flex;align-items:center;gap:.4rem;font-size:.83rem;font-weight:600;cursor:pointer;user-select:none">
        <input type="checkbox" id="showInactive" onchange="renderTable()" style="width:auto" />
        Show Inactive
      </label>
      <span id="countBadge" style="font-size:.8rem;color:#6b7280"></span>
    </div>

    <div id="tableWrap">
      <div class="empty-state">Loading suppliers…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","manager","accountant"]);

  let allSuppliers = [];
  let editingId    = null;
  let deletingId   = null;

  // ── Load all suppliers ──────────────────────────────────
  async function loadSuppliers() {
    document.getElementById('spinner').classList.remove('hidden');
    const { data, error } = await BNH_PAGE.sb
      .from('pharmacy_suppliers')
      .select('*')
      .order('supplier_name');
    document.getElementById('spinner').classList.add('hidden');
    if (error) { document.getElementById('tableWrap').innerHTML = `<p class="err">${error.message}</p>`; return; }
    allSuppliers = data || [];
    renderTable();
  }

  // ── Render filtered table ───────────────────────────────
  function renderTable() {
    const q      = document.getElementById('searchBox').value.trim().toLowerCase();
    const showIn = document.getElementById('showInactive').checked;

    const filtered = allSuppliers.filter(s => {
      const matchQ    = !q || s.supplier_name.toLowerCase().includes(q);
      const matchAct  = showIn ? true : s.is_active !== false;
      return matchQ && matchAct;
    });

    document.getElementById('countBadge').textContent =
      filtered.length + ' of ' + allSuppliers.length + ' suppliers';

    if (!filtered.length) {
      document.getElementById('tableWrap').innerHTML =
        `<div class="empty-state">😶 No suppliers match your filter.</div>`;
      return;
    }

    const rows = filtered.map(s => `
      <tr>
        <td><strong>${esc(s.supplier_name)}</strong></td>
        <td style="text-align:right">₹${parseFloat(s.opening_balance||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td>${s.remark ? esc(s.remark) : '<span style="color:#ccc">—</span>'}</td>
        <td><span class="badge ${s.is_active!==false?'badge-active':'badge-inactive'}">${s.is_active!==false?'Active':'Inactive'}</span></td>
        <td>${esc(s.recorded_by_name||s.recorded_by||'—')}</td>
        <td>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap">
            <button class="btn-sm btn-edit"   onclick="openEdit('${s.id}')">✏️ Edit</button>
            <button class="btn-sm btn-toggle ${s.is_active!==false?'':'inactive'}"
                    onclick="toggleActive('${s.id}', ${s.is_active!==false})">
              ${s.is_active!==false?'🔴 Deactivate':'🟢 Activate'}
            </button>
            <button class="btn-sm btn-del" onclick="openDelete('${s.id}', '${esc(s.supplier_name)}')">🗑️ Delete</button>
          </div>
        </td>
      </tr>`).join('');

    document.getElementById('tableWrap').innerHTML = `
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Supplier Name</th>
              <th style="text-align:right">Op. Balance</th>
              <th>Remark</th>
              <th>Status</th>
              <th>Added By</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── Escape HTML helper ──────────────────────────────────
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── EDIT ────────────────────────────────────────────────
  function openEdit(id) {
    const s = allSuppliers.find(x => x.id === id);
    if (!s) return;
    editingId = id;
    document.getElementById('editName').value   = s.supplier_name;
    document.getElementById('editOpBal').value  = s.opening_balance || 0;
    document.getElementById('editRemark').value = s.remark || '';
    document.getElementById('editErr').textContent = '';
    document.getElementById('editModal').classList.add('open');
  }

  function closeEdit() {
    editingId = null;
    document.getElementById('editModal').classList.remove('open');
  }

  async function saveEdit() {
    const name = document.getElementById('editName').value.trim();
    const errEl = document.getElementById('editErr');
    errEl.textContent = '';
    if (!name) { errEl.textContent = 'Supplier name is required.'; return; }

    document.getElementById('spinner').classList.remove('hidden');
    try {
      const updates = BNH_PAGE.stamp({
        supplier_name:   name,
        opening_balance: parseFloat(document.getElementById('editOpBal').value || 0),
        remark:          document.getElementById('editRemark').value.trim() || null
      });
      // stamp adds recorded_at which we rename to updated_at for edits
      updates.updated_by      = updates.recorded_by;
      updates.updated_by_name = updates.recorded_by_name;
      updates.updated_at      = updates.recorded_at;
      delete updates.recorded_by;
      delete updates.recorded_by_name;
      delete updates.recorded_at;

      const { error } = await BNH_PAGE.sb
        .from('pharmacy_suppliers')
        .update(updates)
        .eq('id', editingId);
      if (error) throw error;

      // Reflect change locally
      const idx = allSuppliers.findIndex(x => x.id === editingId);
      if (idx > -1) Object.assign(allSuppliers[idx], { supplier_name: name,
        opening_balance: updates.opening_balance, remark: updates.remark });
      closeEdit();
      renderTable();
    } catch(ex) {
      errEl.textContent = ex.message;
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  }

  // ── TOGGLE ACTIVE ───────────────────────────────────────
  async function toggleActive(id, currentlyActive) {
    document.getElementById('spinner').classList.remove('hidden');
    try {
      const { error } = await BNH_PAGE.sb
        .from('pharmacy_suppliers')
        .update({ is_active: !currentlyActive })
        .eq('id', id);
      if (error) throw error;
      const idx = allSuppliers.findIndex(x => x.id === id);
      if (idx > -1) allSuppliers[idx].is_active = !currentlyActive;
      renderTable();
    } catch(ex) {
      alert(ex.message);
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  }

  // ── DELETE ──────────────────────────────────────────────
  function openDelete(id, name) {
    deletingId = id;
    document.getElementById('delName').textContent = name;
    document.getElementById('delErr').textContent  = '';
    document.getElementById('delModal').classList.add('open');
  }

  function closeDelete() {
    deletingId = null;
    document.getElementById('delModal').classList.remove('open');
  }

  async function confirmDelete() {
    const errEl = document.getElementById('delErr');
    errEl.textContent = '';
    document.getElementById('spinner').classList.remove('hidden');
    try {
      const { error } = await BNH_PAGE.sb
        .from('pharmacy_suppliers')
        .delete()
        .eq('id', deletingId);
      if (error) throw error;
      allSuppliers = allSuppliers.filter(x => x.id !== deletingId);
      closeDelete();
      renderTable();
    } catch(ex) {
      errEl.textContent = ex.message;
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  }

  // Close modals on overlay click
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEdit();
  });
  document.getElementById('delModal').addEventListener('click', function(e) {
    if (e.target === this) closeDelete();
  });

  // Init
  loadSuppliers();
</script>
</body>
</html>
