<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Refer Amount Entry</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .tabs{display:flex;gap:0;margin-bottom:1.2rem;border-bottom:2px solid #e9ecef;overflow-x:auto}
    .tab-btn{padding:.65rem 1.3rem;background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;font-size:.9rem;color:#666;white-space:nowrap}
    .tab-btn.active{color:#007bff;border-bottom-color:#007bff;font-weight:600}
    .tab-content{display:none}.tab-content.active{display:block}
    .filter-bar{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem}
    .filter-group{display:flex;flex-direction:column;flex:1;min-width:140px}
    .filter-group label{font-size:.8rem;color:#666;margin-bottom:.25rem}
    .filter-group input,.filter-group select{padding:.45rem .7rem;border:1px solid #ccc;border-radius:3px;font-size:.85rem}
    .stats-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}
    .stat-box{background:#f8f9fa;border-radius:4px;padding:.65rem 1rem;flex:1;min-width:110px;border-left:3px solid #007bff}
    .stat-box .val{font-size:1.2rem;font-weight:700;color:#007bff}.stat-box .lbl{font-size:.75rem;color:#666;margin-top:2px}
    .records-table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{background:#f0f0f0;padding:8px 10px;text-align:left;font-weight:500;border-bottom:2px solid #ddd;white-space:nowrap}
    td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:middle}
    tbody tr{cursor:pointer}tbody tr:hover td{background:#f5f9ff}
    .case-no{color:#007bff;font-weight:700}
    .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.75rem;font-weight:600}
    .badge-pending{background:#fff3cd;color:#856404}.badge-paid{background:#d1e7dd;color:#0a3622}
    .badge-due{background:#f8d7da;color:#721c24}.badge-partial{background:#fff3cd;color:#856404}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
    .modal-overlay.hidden{display:none!important}
    .modal-box{background:white;border-radius:8px;width:min(96vw,680px);max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
    .modal-header{padding:1.1rem 1.4rem;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;z-index:2}
    .modal-header h2{margin:0;font-size:1.05rem}
    .modal-close{font-size:1.5rem;cursor:pointer;color:#999;border:none;background:none;line-height:1}
    .modal-close:hover{color:#333}
    .modal-body{padding:1.4rem}
    .modal-footer{padding:1rem 1.4rem;border-top:1px solid #eee;display:flex;gap:.75rem;justify-content:flex-end;background:#fafafa;position:sticky;bottom:0;border-radius:0 0 8px 8px}
    .detail-section{margin-bottom:1.4rem}
    .detail-section h3{font-size:.92rem;color:#007bff;margin:0 0 .7rem 0;border-bottom:1px solid #eee;padding-bottom:.4rem}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.8rem;margin-bottom:.75rem}
    .detail-label{font-size:.73rem;color:#999;text-transform:uppercase}
    .detail-value{font-size:.9rem;color:#333;font-weight:500;margin-top:.2rem}
    .amount-summary{background:#f8f9fa;padding:1rem;border-radius:4px;border-left:4px solid #007bff;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.8rem;margin-bottom:1rem}
    .amount-label{font-size:.72rem;color:#666;text-transform:uppercase}
    .amount-value{font-size:1.05rem;font-weight:700;color:#007bff;margin-top:.2rem}
    .test-bill-table{width:100%;border-collapse:collapse;font-size:.83rem;margin-bottom:.5rem}
    .test-bill-table th{background:#f0f0f0;padding:6px 9px;text-align:left;border-bottom:1px solid #ddd}
    .test-bill-table td{padding:7px 9px;border-bottom:1px solid #f0f0f0}
    .test-bill-table tr.total-row td{border-bottom:none;font-weight:700;background:#f8f9fa}
    .entry-form{background:#e7f3ff;border:1px solid #b8daff;border-radius:6px;padding:1.2rem;margin-top:.5rem}
    .entry-form h4{margin:0 0 1rem 0;color:#004085;font-size:.95rem}
    .refer-info-box{background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.87rem}
    .refer-info-box strong{color:#856404}
    .form-row{display:flex;gap:1rem;flex-wrap:wrap}.form-row>*{flex:1;min-width:150px}
    .form-group{margin-bottom:.85rem}
    .form-group label{display:block;margin-bottom:.3rem;font-weight:500;font-size:.85rem}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:.42rem .65rem;border:1px solid #ccc;border-radius:3px;font-size:.85rem;box-sizing:border-box}
    .form-group input:focus,.form-group select:focus{border-color:#007bff;outline:none;box-shadow:0 0 0 2px rgba(0,123,255,.15)}
    .completed-box{background:#d1e7dd;border:1px solid #a3cfbb;border-radius:6px;padding:1rem}
    .completed-box h4{margin:0 0 .75rem 0;color:#0a3622;font-size:.92rem}
    .empty-state{text-align:center;padding:2.5rem;color:#aaa}
    .hidden{display:none!important}
    .pagination{display:flex;gap:.4rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
    .pagination button{padding:.38rem .65rem;border:1px solid #ccc;background:white;cursor:pointer;border-radius:3px;font-size:.82rem}
    .pagination button.active{background:#007bff;color:white;border-color:#007bff}
    .role-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600;margin-left:.5rem;vertical-align:middle}
    .role-full{background:#d1e7dd;color:#0a3622}.role-limited{background:#fff3cd;color:#856404}
    .btn-del{background:#dc3545;color:white;border:none;border-radius:3px;cursor:pointer}
    .btn-del:hover{background:#a71d2a}
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>💊 Refer Amount Entry <span id="roleBadge" class="role-badge"></span></h1>
  <div class="page-card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="pending">⏳ Pending Entry <span id="pendingCount" class="badge badge-pending" style="margin-left:.3rem"></span></button>
      <button class="tab-btn" data-tab="completed">✅ Completed</button>
    </div>

    <div class="tab-content active" id="tab-pending">
      <div class="stats-row" id="pendingStats"></div>
      <div class="filter-bar">
        <div class="filter-group"><label>Search</label><input id="pendSearch" placeholder="Case no, patient, refer…" oninput="filterPending()"/></div>
        <div class="filter-group"><label>Date From</label><input type="date" id="pendDateFrom" onchange="filterPending()"/></div>
        <div class="filter-group"><label>Date To</label><input type="date" id="pendDateTo" onchange="filterPending()"/></div>
        <div class="filter-group"><label>Refer Name</label>
          <select id="pendReferFilter" onchange="filterPending()"><option value="">All Refers</option></select>
        </div>
      </div>
      <div class="records-table-wrap"><div id="pendingTable"><div class="empty-state">Loading…</div></div></div>
      <div class="pagination" id="pendPager"></div>
    </div>

    <div class="tab-content" id="tab-completed">
      <div class="filter-bar">
        <div class="filter-group"><label>Search</label><input id="compSearch" placeholder="Case no, patient, refer…" oninput="filterCompleted()"/></div>
        <div class="filter-group"><label>Date From</label><input type="date" id="compDateFrom" onchange="filterCompleted()"/></div>
        <div class="filter-group"><label>Date To</label><input type="date" id="compDateTo" onchange="filterCompleted()"/></div>
        <div class="filter-group"><label>Refer Name</label>
          <select id="compReferFilter" onchange="filterCompleted()"><option value="">All Refers</option></select>
        </div>
      </div>
      <div class="records-table-wrap"><div id="completedTable"><div class="empty-state">Loading…</div></div></div>
      <div class="pagination" id="compPager"></div>
    </div>

    <p class="err" id="err"></p>
    <p class="info" id="ok" style="display:none"></p>
  </div>
</div>

<div class="modal-overlay hidden" id="detailModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">Case Details</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter">
      <button class="btn-primary" style="background:#6c757d;width:auto" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  const FULL_ACCESS_ROLES    = ["admin"];
  const LIMITED_ACCESS_ROLES = ["accountant","manager"];
  BNH_PAGE.requireRole([...FULL_ACCESS_ROLES,...LIMITED_ACCESS_ROLES]);

  const userRole     = BNH_PAGE.user?.role||'';
  const isFullAccess = FULL_ACCESS_ROLES.includes(userRole);

  // Role badge
  const rb = document.getElementById('roleBadge');
  rb.textContent = isFullAccess ? '🔓 Full Access' : '✍️ Entry Only';
  rb.className   = 'role-badge '+(isFullAccess?'role-full':'role-limited');

  // TABLE: opd_refer_payments
  // Existing cols : id, payment_date, opd_case_id, refer_id, refer_name, amount, mode, remark, recorded_by, recorded_at
  // Added cols    : case_no, patient_name, case_date, refer_amount, payment_status, voucher_no,
  //                 paid_date, discount, pay_mode, paid_by, paid_by_name, paid_at, recorded_by_name
  //
  // In this page:
  //   "refer_amount" = the amount to be paid to the referrer (set here)
  //   "amount"       = existing field (may store cash received, kept intact)
  //   "payment_status" = 'pending' | 'paid'  (managed by refer_paid page)

  let allCases=[], allReferPayments=[];
  let pendingCases=[], filteredPending=[], currentPendPage=1;
  let completedEntries=[], filteredCompleted=[], currentCompPage=1;
  const PER=20;

  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function fmt(n){return n!=null&&n!==''?'₹'+Number(n).toLocaleString('en-IN'):'—';}
  function fmtDate(d){return d?String(d).slice(0,10):'—';}
  function showSpinner(v){document.getElementById('spinner').classList.toggle('hidden',!v);}
  function showErr(msg){const e=document.getElementById('err');e.textContent=msg;setTimeout(()=>e.textContent='',6000);}
  function showOk(msg){const o=document.getElementById('ok');o.style.display='block';o.textContent=msg;setTimeout(()=>o.style.display='none',3000);}
  function gps(r){
    const disc=Number(r.discount||0),bill=Number(r.bill_amount||0),paid=Number(r.paid_amount||0),due=bill-disc-paid;
    if(due<=0)return{s:'paid',t:'✅ Paid',c:'badge-paid'};
    if(paid===0)return{s:'due',t:'⏳ Due',c:'badge-due'};
    return{s:'partial',t:'⚠️ Partial',c:'badge-partial'};
  }

  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    });
  });

  async function loadData(){
    showSpinner(true);
    try{
      // Load opd_cases that have a refer_name
      const{data:cases,error:ce}=await BNH_PAGE.sb
        .from('opd_cases').select('*')
        .not('refer_name','is',null)
        .order('case_date',{ascending:false});
      if(ce)throw ce;
      allCases=cases||[];

      // Load opd_refer_payments — all rows
      const{data:rp,error:re}=await BNH_PAGE.sb
        .from('opd_refer_payments').select('*')
        .order('recorded_at',{ascending:false});
      if(re)throw re;
      allReferPayments=rp||[];

      // Pending = opd_cases with refer_name but NO row yet in opd_refer_payments (matched by opd_case_id)
      const enteredIds=new Set(allReferPayments.map(x=>x.opd_case_id).filter(Boolean));
      pendingCases=allCases.filter(c=>!enteredIds.has(c.id));

      // Completed = rows in opd_refer_payments that have refer_amount set
      completedEntries=allReferPayments.filter(x=>x.refer_amount!=null && Number(x.refer_amount)>0);

      buildReferFilters();
      renderStats();
      filterPending();
      filterCompleted();
    }catch(e){showErr('Load error: '+e.message);}
    finally{showSpinner(false);}
  }

  function buildReferFilters(){
    const refers=[...new Set([
      ...allCases.map(c=>c.refer_name),
      ...allReferPayments.map(x=>x.refer_name)
    ].filter(Boolean))].sort();
    ['pendReferFilter','compReferFilter'].forEach(id=>{
      document.getElementById(id).innerHTML='<option value="">All Refers</option>'+
        refers.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join('');
    });
  }

  function renderStats(){
    const pendBill=pendingCases.reduce((s,c)=>s+Number(c.bill_amount||0),0);
    const compAmt=completedEntries.reduce((s,x)=>s+Number(x.refer_amount||0),0);
    document.getElementById('pendingStats').innerHTML=`
      <div class="stat-box"><div class="val" style="color:#dc3545">${pendingCases.length}</div><div class="lbl">Pending Entry</div></div>
      <div class="stat-box"><div class="val" style="color:#28a745">${completedEntries.length}</div><div class="lbl">Completed</div></div>
      <div class="stat-box"><div class="val">${fmt(pendBill)}</div><div class="lbl">Pending Bill Total</div></div>
      <div class="stat-box"><div class="val">${fmt(compAmt)}</div><div class="lbl">Total Refer Amt Set</div></div>`;
    document.getElementById('pendingCount').textContent=pendingCases.length;
  }

  function doFilter(src,searchId,dfId,dtId,rfId,isRpRow){
    const q=(document.getElementById(searchId).value||'').toLowerCase();
    const df=document.getElementById(dfId).value,dt=document.getElementById(dtId).value;
    const rf=document.getElementById(rfId).value;
    return src.filter(r=>{
      const cno=(isRpRow?r.case_no:r.case_no||r.case_no)||'';
      const pt=(isRpRow?r.patient_name:r.patient_name)||'';
      const rn=r.refer_name||'';
      if(q&&!cno.toLowerCase().includes(q)&&!pt.toLowerCase().includes(q)&&!rn.toLowerCase().includes(q))return false;
      const d=String(isRpRow?(r.case_date||r.recorded_at||''):(r.case_date||'')).slice(0,10);
      if(df&&d<df)return false;if(dt&&d>dt)return false;
      if(rf&&rn!==rf)return false;
      return true;
    });
  }

  function filterPending(){
    filteredPending=doFilter(pendingCases,'pendSearch','pendDateFrom','pendDateTo','pendReferFilter',false);
    currentPendPage=1;renderPendingTable();
  }
  function filterCompleted(){
    filteredCompleted=doFilter(completedEntries,'compSearch','compDateFrom','compDateTo','compReferFilter',true);
    currentCompPage=1;renderCompletedTable();
  }

  function renderPendingTable(){
    const div=document.getElementById('pendingTable');
    if(!filteredPending.length){div.innerHTML='<div class="empty-state">🎉 No pending refer amount entries.</div>';document.getElementById('pendPager').innerHTML='';return;}
    const rows=filteredPending.slice((currentPendPage-1)*PER,currentPendPage*PER);
    div.innerHTML=`<table>
      <thead><tr><th>Case No</th><th>Date</th><th>Patient</th><th>Bill</th><th>Discount</th><th>Paid</th><th>Due</th><th>Refer</th><th>Bill Status</th><th>Action</th></tr></thead>
      <tbody>${rows.map(r=>{
        const ps=gps(r),disc=Number(r.discount||0),due=Number(r.bill_amount||0)-disc-Number(r.paid_amount||0);
        return`<tr onclick="openDetail('${r.id}','pending')">
          <td class="case-no">${esc(r.case_no)}</td><td>${fmtDate(r.case_date)}</td><td>${esc(r.patient_name)}</td>
          <td>${fmt(r.bill_amount)}</td><td>${disc>0?fmt(disc):'—'}</td><td>${fmt(r.paid_amount)}</td>
          <td style="color:${due>0?'#dc3545':'#28a745'}">${fmt(due)}</td>
          <td><strong>${esc(r.refer_name)}</strong></td>
          <td><span class="badge ${ps.c}">${ps.t}</span></td>
          <td onclick="event.stopPropagation()">
            <button class="btn-primary" style="width:auto;padding:4px 10px;font-size:.78rem"
              onclick="openDetail('${r.id}','pending')">💰 Enter Amount</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
    renderPager('pendPager',filteredPending.length,currentPendPage,'pend');
  }

  function renderCompletedTable(){
    const div=document.getElementById('completedTable');
    if(!filteredCompleted.length){div.innerHTML='<div class="empty-state">No completed entries yet.</div>';document.getElementById('compPager').innerHTML='';return;}
    const rows=filteredCompleted.slice((currentCompPage-1)*PER,currentCompPage*PER);
    div.innerHTML=`<table>
      <thead><tr><th>Case No</th><th>Case Date</th><th>Patient</th><th>Refer</th><th>Refer Amount</th><th>Pay Status</th><th>Entered By</th><th>Entered On</th></tr></thead>
      <tbody>${rows.map(rp=>`<tr onclick="openDetailFromRp('${rp.id}')">
        <td class="case-no">${esc(rp.case_no||'—')}</td>
        <td>${fmtDate(rp.case_date||rp.payment_date)}</td>
        <td>${esc(rp.patient_name||'—')}</td>
        <td><strong>${esc(rp.refer_name||'—')}</strong></td>
        <td style="color:#007bff;font-weight:700">${fmt(rp.refer_amount)}</td>
        <td>${rp.payment_status==='paid'
          ?'<span class="badge badge-paid">✅ Paid</span>'
          :'<span class="badge badge-pending">⏳ Pending</span>'}</td>
        <td style="font-size:.8rem">${esc(rp.recorded_by_name||rp.recorded_by||'—')}</td>
        <td style="font-size:.8rem">${fmtDate(rp.recorded_at)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
    renderPager('compPager',filteredCompleted.length,currentCompPage,'comp');
  }

  function renderPager(pagerId,total,page,key){
    const tp=Math.ceil(total/PER),p=document.getElementById(pagerId);
    if(tp<=1){p.innerHTML='';return;}
    let h='';
    if(page>1){h+=`<button onclick="goP('${key}',1)">«</button><button onclick="goP('${key}',${page-1})">‹ Prev</button>`;}
    for(let i=Math.max(1,page-2);i<=Math.min(tp,page+2);i++)
      h+=`<button ${i===page?'class="active"':''} onclick="goP('${key}',${i})">${i}</button>`;
    if(page<tp){h+=`<button onclick="goP('${key}',${page+1})">Next ›</button><button onclick="goP('${key}',${tp})">»</button>`;}
    p.innerHTML=h;
  }
  function goP(key,page){
    if(key==='pend'){currentPendPage=page;renderPendingTable();}
    else{currentCompPage=page;renderCompletedTable();}
  }

  function openDetail(caseId,mode){
    const r=allCases.find(x=>x.id===caseId);
    if(!r)return;
    const ps=gps(r),disc=Number(r.discount||0),due=Number(r.bill_amount||0)-disc-Number(r.paid_amount||0);

    // Test-wise bill — equal split estimate
    const rawTests=r.tests?String(r.tests).split(',').map(t=>t.trim()).filter(Boolean):[];
    let testBillHTML='';
    if(rawTests.length){
      const bill=Number(r.bill_amount||0);
      const perTest=bill/rawTests.length;
      testBillHTML=`<div class="detail-section"><h3>🧪 Test-wise Bill</h3>
        <table class="test-bill-table">
          <thead><tr><th>#</th><th>Test Name</th><th>Est. Amount</th></tr></thead>
          <tbody>
            ${rawTests.map((t,i)=>`<tr><td>${i+1}</td><td>${esc(t)}</td><td>${fmt(perTest.toFixed(2))}</td></tr>`).join('')}
            <tr class="total-row"><td colspan="2"><strong>Total Bill</strong></td><td><strong>${fmt(bill)}</strong></td></tr>
          </tbody>
        </table>
        <p style="font-size:.74rem;color:#aaa;margin:.3rem 0 0">* Amounts split equally — actual prices may differ.</p>
      </div>`;
    }

    let entryHTML='';
    if(mode==='pending'){
      entryHTML=`<div class="entry-form">
        <h4>💰 Enter Refer Amount</h4>
        <div class="refer-info-box">
          <strong>Refer:</strong> ${esc(r.refer_name)}
          &nbsp;|&nbsp;<strong>Case Type:</strong> ${r.case_type==='lab_sample'?'Lab Sample':r.case_type==='sport_sample'?'Sport Sample':esc(r.case_type||'—')}
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Refer Amount (₹) <span style="color:red">*</span></label>
            <input id="ra_amount" type="number" min="0.01" step="0.01" placeholder="Enter refer amount" required/>
          </div>
          <div class="form-group">
            <label>Remarks (optional)</label>
            <input id="ra_remark" type="text" placeholder="Notes…"/>
          </div>
        </div>
        <p class="err" id="modalErr" style="margin-top:.25rem"></p>
      </div>`;
    }

    document.getElementById('modalTitle').textContent=`Case ${r.case_no} — ${r.patient_name}`;
    document.getElementById('modalBody').innerHTML=`
      <div class="detail-section"><h3>📝 Case Information</h3>
        <div class="detail-grid">
          <div><div class="detail-label">Case No</div><div class="detail-value">${esc(r.case_no)}</div></div>
          <div><div class="detail-label">Date</div><div class="detail-value">${fmtDate(r.case_date)}</div></div>
          <div><div class="detail-label">Patient</div><div class="detail-value">${esc(r.patient_name)}</div></div>
          <div><div class="detail-label">Case Type</div><div class="detail-value">${r.case_type==='lab_sample'?'Lab Sample':r.case_type==='sport_sample'?'Sport Sample':esc(r.case_type||'—')}</div></div>
          <div><div class="detail-label">Entered By</div><div class="detail-value">${esc(r.entered_by||r.recorded_by_name||'—')}</div></div>
          <div><div class="detail-label">Trans No</div><div class="detail-value">${esc(r.trans_no||'—')}</div></div>
        </div>
      </div>
      <div class="detail-section"><h3>💵 Payment Summary</h3>
        <div class="amount-summary">
          <div><div class="amount-label">Bill Amount</div><div class="amount-value">${fmt(r.bill_amount)}</div></div>
          <div><div class="amount-label">Discount</div><div class="amount-value" style="color:#6c757d">${fmt(disc)}</div></div>
          <div><div class="amount-label">Paid</div><div class="amount-value" style="color:#28a745">${fmt(r.paid_amount)}</div></div>
          <div><div class="amount-label">Due</div><div class="amount-value" style="color:${due>0?'#dc3545':'#28a745'}">${fmt(due)}</div></div>
          <div><div class="amount-label">Status</div><div class="amount-value" style="font-size:.88rem;color:${ps.s==='paid'?'#28a745':ps.s==='due'?'#dc3545':'#e67e00'}">${ps.t}</div></div>
        </div>
      </div>
      ${testBillHTML}
      ${entryHTML}`;

    const footer=document.getElementById('modalFooter');
    if(mode==='pending'){
      footer.innerHTML=`
        <button class="btn-primary" style="background:#6c757d;width:auto" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" style="width:auto" onclick="submitReferAmount('${r.id}','${esc(r.case_no)}','${esc(r.patient_name||'')}','${esc(r.refer_name||'')}','${esc(r.refer_id||'')}','${r.case_date||''}')">💾 Save Refer Amount</button>`;
    } else {
      footer.innerHTML=`<button class="btn-primary" style="background:#6c757d;width:auto" onclick="closeModal()">Close</button>`;
    }
    document.getElementById('detailModal').classList.remove('hidden');
  }

  function openDetailFromRp(rpId){
    const rp=allReferPayments.find(x=>x.id===rpId);
    if(!rp)return;
    const caseRec=allCases.find(x=>x.id===rp.opd_case_id)||{};
    document.getElementById('modalTitle').textContent=`${rp.case_no||caseRec.case_no||'—'} — ${rp.patient_name||caseRec.patient_name||''}`;

    const amountRowHTML = isFullAccess
      ? `<div><div class="amount-label">Refer Amount</div>
           <input id="rpe_amount" type="number" min="0.01" step="0.01" value="${Number(rp.refer_amount||0)}"
             style="width:100%;padding:.35rem .5rem;border:1px solid #ccc;border-radius:3px;font-size:.95rem;font-weight:700;color:#007bff"/>
         </div>`
      : `<div><div class="amount-label">Refer Amount</div><div class="amount-value">${fmt(rp.refer_amount)}</div></div>`;
    const remarkFieldHTML = isFullAccess
      ? `<div class="form-group" style="margin-top:.85rem">
           <label>Remark</label>
           <input id="rpe_remark" type="text" value="${esc(rp.remark||'')}" placeholder="Notes…"/>
         </div>`
      : '';

    document.getElementById('modalBody').innerHTML=`
      <div class="detail-section"><h3>📝 Case Summary</h3>
        <div class="detail-grid">
          <div><div class="detail-label">Case No</div><div class="detail-value">${esc(rp.case_no||caseRec.case_no||'—')}</div></div>
          <div><div class="detail-label">Case Date</div><div class="detail-value">${fmtDate(rp.case_date||caseRec.case_date)}</div></div>
          <div><div class="detail-label">Patient</div><div class="detail-value">${esc(rp.patient_name||caseRec.patient_name||'—')}</div></div>
          <div><div class="detail-label">Refer</div><div class="detail-value"><strong>${esc(rp.refer_name||'—')}</strong></div></div>
        </div>
      </div>
      <div class="detail-section"><h3>💰 Refer Amount Details</h3>
        <div class="amount-summary">
          ${amountRowHTML}
          <div><div class="amount-label">Pay Status</div>
            <div class="amount-value" style="font-size:.9rem;color:${rp.payment_status==='paid'?'#28a745':'#dc3545'}">
              ${rp.payment_status==='paid'?'✅ Paid':'⏳ Pending'}
            </div>
          </div>
          ${rp.payment_status==='paid'&&rp.voucher_no?`<div><div class="amount-label">Voucher No</div><div class="amount-value" style="font-size:.88rem">${esc(rp.voucher_no)}</div></div>`:''}
          ${rp.paid_date?`<div><div class="amount-label">Paid Date</div><div class="amount-value" style="font-size:.88rem">${fmtDate(rp.paid_date)}</div></div>`:''}
        </div>
        ${remarkFieldHTML}
      </div>
      <div style="font-size:.8rem;color:#aaa;margin-top:.5rem">
        Entered by ${esc(rp.recorded_by_name||rp.recorded_by||'—')} on ${fmtDate(rp.recorded_at)}
        ${rp.remark?`<br>Remark: ${esc(rp.remark)}`:''}
      </div>
      <p class="err" id="rpeErr" style="margin-top:.5rem"></p>`;

    const footerBtns = [`<button class="btn-primary" style="background:#6c757d;width:auto" onclick="closeModal()">Close</button>`];
    if(isFullAccess){
      footerBtns.push(`<button class="btn-del" style="padding:.5rem 1rem;font-size:.85rem" onclick="deleteReferAmount('${rp.id}')">🗑 Delete</button>`);
      footerBtns.push(`<button class="btn-primary" style="width:auto" onclick="saveReferAmountEdit('${rp.id}')">💾 Save Changes</button>`);
    }
    document.getElementById('modalFooter').innerHTML=footerBtns.join('');
    document.getElementById('detailModal').classList.remove('hidden');
  }

  async function saveReferAmountEdit(rpId){
    if(!isFullAccess)return;
    const errEl=document.getElementById('rpeErr');
    errEl.textContent='';
    const amt=parseFloat(document.getElementById('rpe_amount')?.value);
    if(!amt||amt<=0){errEl.textContent='⚠️ Please enter a valid refer amount greater than 0.';return;}
    const remark=document.getElementById('rpe_remark')?.value.trim()||null;
    showSpinner(true);
    try{
      const payload={refer_amount:amt, amount:amt, remark:remark};
      const{error}=await BNH_PAGE.sb.from('opd_refer_payments').update(payload).eq('id',rpId);
      if(error)throw error;
      showOk('✅ Refer amount updated successfully!');
      closeModal();
      await loadData();
    }catch(e){errEl.textContent='Error: '+e.message;}
    finally{showSpinner(false);}
  }

  async function deleteReferAmount(rpId){
    if(!isFullAccess)return;
    if(!confirm('⚠️ Delete this refer amount entry?\n\nThis action CANNOT be undone.'))return;
    showSpinner(true);
    try{
      const{error}=await BNH_PAGE.sb.from('opd_refer_payments').delete().eq('id',rpId);
      if(error)throw error;
      showOk('🗑 Entry deleted.');
      closeModal();
      await loadData();
    }catch(e){showErr('Delete error: '+e.message);}
    finally{showSpinner(false);}
  }

  function closeModal(){document.getElementById('detailModal').classList.add('hidden');}
  document.getElementById('detailModal').addEventListener('click',e=>{if(e.target===document.getElementById('detailModal'))closeModal();});



  async function submitReferAmount(caseId,caseNo,patientName,referName,referId,caseDate){
    const errEl=document.getElementById('modalErr');
    errEl.textContent='';
    const amt=parseFloat(document.getElementById('ra_amount')?.value);
    if(!amt||amt<=0){errEl.textContent='⚠️ Please enter a valid refer amount greater than 0.';return;}
    const remark=document.getElementById('ra_remark')?.value.trim()||null;
    showSpinner(true);
    try{
      const now=new Date().toISOString();
      const payload={
        opd_case_id:   caseId,
        case_no:       caseNo,
        patient_name:  patientName,
        refer_name:    referName,
        refer_id:      referId||null,
        case_date:     caseDate||null,
        refer_amount:  amt,
        payment_status:'pending',
        payment_date:  caseDate||now.slice(0,10),
        amount:        amt,           // keep existing 'amount' col in sync
        mode:          null,
        remark:        remark,
        recorded_by:   BNH_PAGE.user?.username||null,
        recorded_by_name: BNH_PAGE.user?.name||null,
        recorded_at:   now
      };
      const{error}=await BNH_PAGE.sb.from('opd_refer_payments').insert(payload);
      if(error)throw error;
      showOk('✅ Refer amount saved successfully!');
      closeModal();
      await loadData();
    }catch(e){errEl.textContent='Error: '+e.message;}
    finally{showSpinner(false);}
  }

  loadData();
</script>
</body>
</html>
