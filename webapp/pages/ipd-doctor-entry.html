<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Doctor Entry – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:200px; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; font-size:.82rem; }
    td { padding:7px 8px; border-bottom:1px solid #eee; font-size:.82rem; }
    .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:.75rem; font-weight:600; }
    .badge-s { background:#dbeafe; color:#1d4ed8; }
    .badge-a { background:#dcfce7; color:#15803d; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>👨‍⚕️ Doctor Entry – IPD</h1>

  <div class="page-card">
    <form id="docForm">
      <label>Recorded By</label>
      <input id="recBy" readonly/>

      <div class="form-row">
        <div>
          <label>Doctor Name <span style="color:red">*</span></label>
          <input id="docName" required placeholder="Full Name"/>
        </div>
        <div>
          <label>Mobile No.</label>
          <input id="mobile" placeholder="Optional"/>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Specialisation</label>
          <input id="spec" placeholder="e.g. General Surgery"/>
        </div>
        <div>
          <label>Type <span style="color:red">*</span></label>
          <select id="docType" required>
            <option value="">-- Select --</option>
            <option value="Surgent">Surgent</option>
            <option value="Anaesthesia">Anaesthesia</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Opening Balance (₹)</label>
          <input id="openBal" type="number" min="0" step="0.01" placeholder="0"/>
        </div>
        <div></div>
      </div>

      <label>Remark</label>
      <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Doctor</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">👨‍⚕️ All Doctors</h2>
    <div id="docList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","manager"]);
  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';

  async function loadDoctors() {
    const div = document.getElementById('docList');
    const { data, error } = await BNH_PAGE.sb.from('ipd_doctors')
      .select('*').order('doctor_name');
    if (error || !data || data.length === 0) { div.textContent = 'No doctors added yet.'; return; }
    div.innerHTML = `<table>
      <thead><tr>
        <th>Name</th><th>Type</th><th>Mobile</th><th>Specialisation</th><th>Opening Bal.</th><th>Remark</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.doctor_name}</td>
        <td><span class="badge ${r.doctor_type==='Surgent'?'badge-s':'badge-a'}">${r.doctor_type}</span></td>
        <td>${r.mobile||'-'}</td>
        <td>${r.specialisation||'-'}</td>
        <td style="text-align:right">₹${parseFloat(r.opening_balance||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td>${r.remark||'-'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  loadDoctors();

  document.getElementById('docForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        doctor_name:     document.getElementById('docName').value.trim(),
        mobile:          document.getElementById('mobile').value.trim() || null,
        specialisation:  document.getElementById('spec').value.trim() || null,
        doctor_type:     document.getElementById('docType').value,
        opening_balance: parseFloat(document.getElementById('openBal').value||0),
        remark:          document.getElementById('remark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('ipd_doctors').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Doctor saved successfully!';
      e.target.reset();
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      loadDoctors();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
