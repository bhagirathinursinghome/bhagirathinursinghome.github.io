<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Salary Sheet</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .filter-row{display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;margin-bottom:1.25rem;}
    .filter-row label{font-size:.82rem;font-weight:600;color:#374151;margin-bottom:.25rem;display:block;}
    .filter-row input,.filter-row select{padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:8px;font-size:.9rem;background:#fff;}
    .btn-sm{padding:.45rem 1rem;font-size:.85rem;border-radius:7px;border:none;cursor:pointer;background:#1a56db;color:#fff;}
    .btn-outline{background:#fff;border:1px solid #d1d5db;color:#374151;}
    .btn-green{background:#059669;color:#fff;}
    table{width:100%;border-collapse:collapse;font-size:.88rem;}
    th{background:#1e3a5f;color:#fff;padding:.6rem .75rem;text-align:left;font-size:.82rem;white-space:nowrap;cursor:pointer;user-select:none;}
    th:hover{background:#274e7a;}
    th .sort-icon{margin-left:.3rem;opacity:.6;}
    td{padding:.55rem .75rem;border-bottom:1px solid #f0f0f0;white-space:nowrap;}
    tr:hover td{background:#f0f4ff;}
    .badge{display:inline-block;padding:.15rem .65rem;border-radius:20px;font-size:.78rem;font-weight:600;}
    .badge.due{background:#fef3c7;color:#92400e;}
    .badge.paid{background:#d1fae5;color:#065f46;}
    .agg-row td{background:#f0f4ff;font-weight:700;border-top:2px solid #1e3a5f;}
    .stats-row{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem;}
    .stat-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:.7rem 1rem;flex:1;min-width:110px;text-align:center;}
    .stat-box .val{font-size:1.15rem;font-weight:700;color:#1a56db;}
    .stat-box .lbl{font-size:.75rem;color:#6b7280;margin-top:.1rem;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:#fff;border-radius:12px;padding:2rem;min-width:320px;max-width:460px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18);}
    .modal-box h3{margin:0 0 1rem;}
    .modal-actions{display:flex;gap:.75rem;margin-top:1.25rem;justify-content:flex-end;}
    .absent-input{width:60px;padding:.3rem .5rem;border:1px solid #d1d5db;border-radius:6px;text-align:center;font-size:.9rem;}
    .bonus-input{width:90px;padding:.3rem .5rem;border:1px solid #d1d5db;border-radius:6px;text-align:center;font-size:.9rem;}
    .empty{text-align:center;color:#9ca3af;padding:2rem;}
    .section-title{font-weight:700;font-size:1rem;margin-bottom:.75rem;}
    .bonus-list{display:grid;gap:.4rem;max-height:300px;overflow-y:auto;}
    .bonus-row-item{display:flex;justify-content:space-between;align-items:center;padding:.4rem .6rem;background:#f9fafb;border-radius:7px;border:1px solid #e5e7eb;}
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<!-- Bonus Modal -->
<div class="modal-overlay" id="bonusModal">
  <div class="modal-box">
    <h3>🎁 Add / Edit Bonus</h3>
    <p style="font-size:.85rem;color:#6b7280;margin-bottom:1rem;" id="bonusMonthLabel"></p>
    <div class="section-title" style="font-size:.9rem;">Enter bonus amount per employee:</div>
    <div class="bonus-list" id="bonusList"></div>
    <p class="err" id="bonusErr" style="margin:.5rem 0 0;"></p>
    <div class="modal-actions">
      <button class="btn-sm" style="background:#6b7280;" onclick="closeBonusModal()">Cancel</button>
      <button class="btn-sm btn-green" onclick="saveBonuses()">Save Bonuses</button>
    </div>
  </div>
</div>

<div class="page">
  <h1>💰 Salary Sheet</h1>

  <!-- Controls -->
  <div class="page-card" style="padding-bottom:.75rem;">
    <div class="filter-row">
      <div>
        <label>Month <span style="color:red">*</span></label>
        <select id="selMonth">
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>
      <div>
        <label>Year <span style="color:red">*</span></label>
        <input id="selYear" type="number" min="2000" max="2100" style="width:100px;"/>
      </div>
      <div style="align-self:flex-end;">
        <button class="btn-sm" onclick="loadSheet()">📊 Load Sheet</button>
      </div>
      <div style="align-self:flex-end;">
        <button class="btn-sm" style="background:#d97706;" onclick="openBonusModal()">🎁 Bonus</button>
      </div>
      <div style="align-self:flex-end;">
        <button class="btn-sm btn-outline" onclick="togglePaid()">
          <span id="togglePaidLabel">Hide Paid</span>
        </button>
      </div>
      <div>
        <label>Sort By</label>
        <select id="sortBy" onchange="renderSheet()">
          <option value="name">Name (A-Z)</option>
          <option value="desig">Designation</option>
          <option value="gross">Gross Salary ↓</option>
          <option value="due">Due ↓</option>
          <option value="net">Net Payable ↓</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Aggregates -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-box"><div class="val" id="aggGross">—</div><div class="lbl">Total Gross</div></div>
    <div class="stat-box"><div class="val" id="aggDeduct">—</div><div class="lbl">Total Deduction</div></div>
    <div class="stat-box"><div class="val" id="aggNet">—</div><div class="lbl">Total Payable</div></div>
    <div class="stat-box"><div class="val" id="aggPaid">—</div><div class="lbl">Total Paid</div></div>
    <div class="stat-box"><div class="val" id="aggDue">—</div><div class="lbl">Total Due</div></div>
    <div class="stat-box"><div class="val" id="aggBonus">—</div><div class="lbl">Total Bonus</div></div>
  </div>

  <!-- Table -->
  <div class="page-card" style="overflow-x:auto;">
    <table id="salaryTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Designation</th>
          <th>Gross Salary</th>
          <th>Absent Days</th>
          <th>Deduction</th>
          <th>Bonus</th>
          <th>Net Payable</th>
          <th>Collected</th>
          <th>Due</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="sheetTbody"><tr><td colspan="11" class="empty">Select month and year, then click Load Sheet.</td></tr></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","manager","accountant"]);

  const MONTHS=['','January','February','March','April','May','June','July','August','September','October','November','December'];
  const APPROVED_LEAVE=4;  // approved leave days per month (no deduction)
  const WORKING_DAYS=26;   // denominator for deduction formula

  let sheetData=[], hidePaid=false, bonusMap={}, absentMap={}, currentMonth=null, currentYear=null;

  // Init defaults
  const now=new Date();
  document.getElementById('selMonth').value=now.getMonth()+1;
  document.getElementById('selYear').value=now.getFullYear();

  function fmt(n){ return '₹'+(Math.round(n)||0).toLocaleString('en-IN'); }

  async function loadSheet(){
    const month=parseInt(document.getElementById('selMonth').value);
    const year=parseInt(document.getElementById('selYear').value);
    if(!month||!year){ alert('Select month and year.'); return; }
    currentMonth=month; currentYear=year;
    const spinner=document.getElementById('spinner'); spinner.classList.remove('hidden');
    try{
      // Employees active in this month
      const firstDay=`${year}-${String(month).padStart(2,'0')}-01`;
      const lastDayDate=new Date(year,month,0);
      const lastDay=`${year}-${String(month).padStart(2,'0')}-${String(lastDayDate.getDate()).padStart(2,'0')}`;

      const {data:emps} = await BNH_PAGE.sb.from('employees')
        .select('*, designations(name)')
        .lte('joining_date', lastDay)
        .or(`is_active.eq.true,inactive_date.gte.${firstDay}`)
        .order('name');

      // Salary payments for this month — sum all vouchers per employee
      const {data:payments} = await BNH_PAGE.sb.from('salary_payments')
        .select('employee_id,amount').eq('month',month).eq('year',year);
      const payMap={};
      (payments||[]).forEach(p=>{ payMap[p.employee_id]=(payMap[p.employee_id]||0)+(p.amount||0); });

      // Bonuses for this month
      const {data:bonuses} = await BNH_PAGE.sb.from('salary_bonuses')
        .select('*').eq('month',month).eq('year',year);
      bonusMap={};
      (bonuses||[]).forEach(b=>{ bonusMap[b.employee_id]=(b.amount||0); });

      // Absent records for this month
      const {data:absents} = await BNH_PAGE.sb.from('salary_absent')
        .select('*').eq('month',month).eq('year',year);
      absentMap={};
      (absents||[]).forEach(a=>{ absentMap[a.employee_id]=(a.absent_days||0); });

      sheetData=(emps||[]).map(e=>{
        const gross=e.salary||0;
        const absent=absentMap[e.id]||0;
        const deductDays=Math.max(0,absent-APPROVED_LEAVE);
        // deduction = salary/26 * deductDays, rounded to nearest 10
        const rawDeduct=(gross/WORKING_DAYS)*deductDays;
        const deduction=Math.round(rawDeduct/10)*10;
        const bonus=bonusMap[e.id]||0;
        const net=gross-deduction+bonus;
        const collected=payMap[e.id]||0;
        const due=Math.max(0,net-collected);
        const status=collected>=net?'paid':'due';
        return {
          id:e.id, name:e.name, desig:e.designations?.name||'—',
          gross, absent, deduction, bonus, net, collected, due, status
        };
      });

      document.getElementById('statsRow').style.display='flex';
      renderSheet();
    } finally{ spinner.classList.add('hidden'); }
  }

  function renderSheet(){
    let list=[...sheetData];
    if(hidePaid) list=list.filter(r=>r.status!=='paid');

    const sortBy=document.getElementById('sortBy').value;
    list.sort((a,b)=>{
      if(sortBy==='name') return a.name.localeCompare(b.name);
      if(sortBy==='desig') return a.desig.localeCompare(b.desig);
      if(sortBy==='gross') return b.gross-a.gross;
      if(sortBy==='due') return b.due-a.due;
      if(sortBy==='net') return b.net-a.net;
      return 0;
    });

    const tbody=document.getElementById('sheetTbody');
    if(!list.length){ tbody.innerHTML='<tr><td colspan="11" class="empty">No employees found.</td></tr>'; updateAgg([]); return; }

    tbody.innerHTML=list.map((r,i)=>`
      <tr>
        <td>${i+1}</td>
        <td style="font-weight:600;">${r.name}</td>
        <td>${r.desig}</td>
        <td>${fmt(r.gross)}</td>
        <td><input class="absent-input" type="number" min="0" max="31" value="${r.absent}" onchange="updateAbsent('${r.id}',this.value)" title="Edit absent days"/></td>
        <td style="color:#dc2626;">${r.deduction>0?'-'+fmt(r.deduction):'—'}</td>
        <td style="color:#059669;">${r.bonus>0?'+'+fmt(r.bonus):'—'}</td>
        <td style="font-weight:700;">${fmt(r.net)}</td>
        <td>${fmt(r.collected)}</td>
        <td style="font-weight:700;color:${r.due>0?'#dc2626':'#059669'};">${r.due>0?fmt(r.due):'—'}</td>
        <td><span class="badge ${r.status}">${r.status==='paid'?'✅ Paid':'⚠️ Due'}</span></td>
      </tr>`).join('');

    updateAgg(list);
  }

  function updateAgg(list){
    const sum=(key)=>list.reduce((s,r)=>s+(r[key]||0),0);
    document.getElementById('aggGross').textContent=fmt(sum('gross'));
    document.getElementById('aggDeduct').textContent=fmt(sum('deduction'));
    document.getElementById('aggNet').textContent=fmt(sum('net'));
    document.getElementById('aggPaid').textContent=fmt(sum('collected'));
    document.getElementById('aggDue').textContent=fmt(sum('due'));
    document.getElementById('aggBonus').textContent=fmt(sum('bonus'));
  }

  async function updateAbsent(empId, val){
    if(!currentMonth||!currentYear) return;
    const absent=parseInt(val)||0;
    absentMap[empId]=absent;
    // Upsert to DB
    await BNH_PAGE.sb.from('salary_absent').upsert(BNH_PAGE.stamp({
      employee_id:empId, month:currentMonth, year:currentYear, absent_days:absent
    }),{onConflict:'employee_id,month,year'});
    // Recalculate row
    const row=sheetData.find(r=>r.id===empId);
    if(row){
      row.absent=absent;
      const deductDays=Math.max(0,absent-APPROVED_LEAVE);
      row.deduction=Math.round((row.gross/WORKING_DAYS)*deductDays/10)*10;
      row.net=row.gross-row.deduction+row.bonus;
      row.due=Math.max(0,row.net-row.collected);
      row.status=row.collected>=row.net?'paid':'due';
    }
    renderSheet();
  }

  function togglePaid(){
    hidePaid=!hidePaid;
    document.getElementById('togglePaidLabel').textContent=hidePaid?'Show Paid':'Hide Paid';
    renderSheet();
  }

  // --- Bonus Modal ---
  function openBonusModal(){
    if(!sheetData.length){ alert('Load the sheet first.'); return; }
    document.getElementById('bonusMonthLabel').textContent=`${MONTHS[currentMonth]} ${currentYear}`;
    document.getElementById('bonusList').innerHTML=sheetData.map(r=>`
      <div class="bonus-row-item">
        <div>
          <div style="font-weight:600;font-size:.9rem;">${r.name}</div>
          <div style="font-size:.78rem;color:#6b7280;">${r.desig}</div>
        </div>
        <input class="bonus-input" type="number" min="0" step="10" value="${r.bonus||0}"
          data-id="${r.id}" placeholder="₹ 0"/>
      </div>`).join('');
    document.getElementById('bonusErr').textContent='';
    document.getElementById('bonusModal').classList.add('open');
  }
  function closeBonusModal(){ document.getElementById('bonusModal').classList.remove('open'); }

  async function saveBonuses(){
    if(!currentMonth||!currentYear) return;
    const spinner=document.getElementById('spinner'); spinner.classList.remove('hidden');
    try{
      const inputs=document.querySelectorAll('#bonusList .bonus-input');
      const upserts=[];
      inputs.forEach(inp=>{
        const empId=inp.dataset.id;
        const amount=parseFloat(inp.value)||0;
        bonusMap[empId]=amount;
        upserts.push(BNH_PAGE.stamp({employee_id:empId,month:currentMonth,year:currentYear,amount}));
      });
      const {error}=await BNH_PAGE.sb.from('salary_bonuses').upsert(upserts,{onConflict:'employee_id,month,year'});
      if(error) throw error;
      // Recalc all rows
      sheetData.forEach(row=>{
        row.bonus=bonusMap[row.id]||0;
        row.net=row.gross-row.deduction+row.bonus;
        row.due=Math.max(0,row.net-row.collected);
        row.status=row.collected>=row.net?'paid':'due';
      });
      closeBonusModal();
      renderSheet();
    } catch(err){
      document.getElementById('bonusErr').textContent=err.message;
    } finally{ spinner.classList.add('hidden'); }
  }
</script>
</body>
</html>
