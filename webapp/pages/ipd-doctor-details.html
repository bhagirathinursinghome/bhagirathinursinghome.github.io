<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Doctor Details – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .tab-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .tab-btn { padding:.5rem 1.1rem; border:2px solid #6366f1; border-radius:8px; background:#fff;
               color:#6366f1; font-weight:600; cursor:pointer; transition:all .2s; }
    .tab-btn.active { background:#6366f1; color:#fff; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end; }
    .form-row > * { flex:1; min-width:160px; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; font-size:.82rem; }
    td { padding:7px 8px; border-bottom:1px solid #eee; font-size:.82rem; }
    .r { text-align:right; }
    tfoot td { font-weight:700; background:#f9f9f9; }
    .due-pos { color:#dc2626; font-weight:700; }
    .due-neg { color:#059669; font-weight:700; }
    @media print { .tab-bar,.no-print { display:none!important; } }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>👨‍⚕️ Doctor Details – IPD</h1>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('r1',this)">Doctor Dues</button>
    <button class="tab-btn" onclick="switchTab('r2',this)">Doctor Ledger</button>
  </div>

  <!-- REPORT 1: DOCTOR DUES -->
  <div id="r1" class="tab-panel active page-card">
    <h2 style="font-size:1rem;margin-bottom:1rem">💳 Doctor Due Summary</h2>
    <div class="no-print" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
      <button class="btn-primary" style="width:auto" onclick="loadDoctorDues()">🔄 Refresh</button>
      <button class="btn-primary" style="width:auto;background:#059669" onclick="downloadPDF('duesTable','Doctor Due Report')">⬇ Download PDF</button>
    </div>
    <div id="duesOut">Click Refresh to load.</div>
  </div>

  <!-- REPORT 2: DOCTOR LEDGER -->
  <div id="r2" class="tab-panel page-card">
    <h2 style="font-size:1rem;margin-bottom:1rem">📒 Doctor Ledger</h2>
    <div class="form-row no-print">
      <div>
        <label>Doctor</label>
        <select id="ledgerDoc"><option value="">-- Select Doctor --</option></select>
      </div>
      <div>
        <label>From Date</label>
        <input id="ledgerFrom" type="date"/>
      </div>
      <div>
        <label>To Date</label>
        <input id="ledgerTo" type="date"/>
      </div>
      <div style="display:flex;align-items:flex-end;gap:.5rem">
        <button class="btn-primary" style="width:auto" onclick="loadLedger()">Show</button>
        <button class="btn-primary" style="width:auto;background:#059669" onclick="downloadPDF('ledgerWrap','Doctor Ledger')">⬇ PDF</button>
      </div>
    </div>
    <div id="ledgerOut" style="margin-top:1rem">Select doctor and date range, then click Show.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","manager","viewer"]);

  const fmt = n => '₹' + parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});

  function switchTab(id, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  const today = new Date().toISOString().slice(0,10);
  const monthStart = today.slice(0,7) + '-01';
  document.getElementById('ledgerFrom').value = monthStart;
  document.getElementById('ledgerTo').value   = today;

  // Load doctors into ledger dropdown
  async function initDropdowns() {
    const { data } = await BNH_PAGE.sb.from('ipd_doctors')
      .select('id,doctor_name,doctor_type').order('doctor_name');
    const sel = document.getElementById('ledgerDoc');
    (data||[]).forEach(d => {
      const o = document.createElement('option');
      o.value = d.id;
      o.textContent = `${d.doctor_name} (${d.doctor_type})`;
      o.dataset.type = d.doctor_type;
      sel.appendChild(o);
    });
  }
  initDropdowns();

  // ── REPORT 1: DOCTOR DUES ──────────────────────────
  async function loadDoctorDues() {
    document.getElementById('spinner').classList.remove('hidden');
    const [{ data: doctors }, { data: amtEntries }, { data: docPayments }] = await Promise.all([
      BNH_PAGE.sb.from('ipd_doctors').select('*').order('doctor_type,doctor_name'),
      BNH_PAGE.sb.from('ipd_amount_entries').select('surgent_fees,anaesthesia_fees,nh_fees,admission_id'),
      BNH_PAGE.sb.from('ipd_doctor_payments').select('doctor_id,amount')
    ]);
    // Get OT entries to map doctor → fees
    const { data: otEntries } = await BNH_PAGE.sb.from('ipd_ot_entries')
      .select('surgent_id,anaesthesia_id,admission_id');
    // Get amount entries mapped by admission
    const amtMap = {};
    (amtEntries||[]).forEach(a => { amtMap[a.admission_id] = a; });

    document.getElementById('spinner').classList.add('hidden');

    const rows = (doctors||[]).map(doc => {
      const opBal = parseFloat(doc.opening_balance||0);
      // Find all OT entries where this doctor is surgent or anaesthesia
      const myOTs = (otEntries||[]).filter(ot =>
        ot.surgent_id === doc.id || ot.anaesthesia_id === doc.id
      );
      let otFees = 0, nhAdj = 0;
      myOTs.forEach(ot => {
        const amt = amtMap[ot.admission_id];
        if (!amt) return;
        if (doc.doctor_type === 'Surgent' && ot.surgent_id === doc.id) {
          otFees += parseFloat(amt.surgent_fees||0);
          nhAdj  += parseFloat(amt.nh_fees||0); // Doctor Case NH fee adjustment
        } else if (doc.doctor_type === 'Anaesthesia' && ot.anaesthesia_id === doc.id) {
          otFees += parseFloat(amt.anaesthesia_fees||0);
        }
      });
      const paid = (docPayments||[]).filter(p=>p.doctor_id===doc.id).reduce((a,p)=>a+parseFloat(p.amount||0),0);
      // Surgent: Opening + OT Fees - NH Fees (Doctor Case) - Payments = Due
      // Anaesthesia: Opening + OT Fees - Payments = Due
      const due = doc.doctor_type === 'Surgent'
        ? opBal + otFees - nhAdj - paid
        : opBal + otFees - paid;
      return { doc, opBal, otFees, nhAdj, paid, due };
    });

    document.getElementById('duesOut').innerHTML = `
      <table id="duesTable">
        <thead><tr>
          <th>#</th><th>Doctor</th><th>Type</th>
          <th class="r">Op. Bal</th><th class="r">OT Fees</th>
          <th class="r">NH Adj.</th><th class="r">Paid</th>
          <th class="r">Due (Closing)</th>
        </tr></thead>
        <tbody>${rows.map((r,i)=>`<tr>
          <td>${i+1}</td>
          <td>${r.doc.doctor_name}</td>
          <td>${r.doc.doctor_type}</td>
          <td class="r">${fmt(r.opBal)}</td>
          <td class="r">${fmt(r.otFees)}</td>
          <td class="r">${r.doc.doctor_type==='Surgent'?fmt(r.nhAdj):'-'}</td>
          <td class="r">${fmt(r.paid)}</td>
          <td class="r ${r.due>0?'due-pos':'due-neg'}">${fmt(r.due)}</td>
        </tr>`).join('')}</tbody>
        <tfoot><tr>
          <td colspan="3">Total</td>
          <td class="r">${fmt(rows.reduce((a,r)=>a+r.opBal,0))}</td>
          <td class="r">${fmt(rows.reduce((a,r)=>a+r.otFees,0))}</td>
          <td class="r">${fmt(rows.reduce((a,r)=>a+r.nhAdj,0))}</td>
          <td class="r">${fmt(rows.reduce((a,r)=>a+r.paid,0))}</td>
          <td class="r">${fmt(rows.reduce((a,r)=>a+r.due,0))}</td>
        </tr></tfoot>
      </table>
      <p style="font-size:.78rem;color:#888;margin-top:.5rem">
        * For Surgent: Due = Opening + OT Fees − NH Fees (Doctor Cases) − Payments<br>
        * For Anaesthesia: Due = Opening + OT Fees − Payments
      </p>`;
  }

  // ── REPORT 2: DOCTOR LEDGER ──────────────────────────
  async function loadLedger() {
    const docId = document.getElementById('ledgerDoc').value;
    const from  = document.getElementById('ledgerFrom').value;
    const to    = document.getElementById('ledgerTo').value;
    const out   = document.getElementById('ledgerOut');
    if (!docId) { out.textContent = 'Please select a doctor.'; return; }

    const sel  = document.getElementById('ledgerDoc');
    const opt  = sel.options[sel.selectedIndex];
    const docType = opt.dataset.type;

    document.getElementById('spinner').classList.remove('hidden');

    const [{ data: docInfoArr }, { data: otEntries }, { data: payments }] = await Promise.all([
      BNH_PAGE.sb.from('ipd_doctors').select('*').eq('id',docId),
      BNH_PAGE.sb.from('ipd_ot_entries').select('*')
        .or(`surgent_id.eq.${docId},anaesthesia_id.eq.${docId}`)
        .gte('ot_date', from).lte('ot_date', to).order('ot_date'),
      BNH_PAGE.sb.from('ipd_doctor_payments').select('*')
        .eq('doctor_id', docId).gte('payment_date', from).lte('payment_date', to).order('payment_date')
    ]);

    const docInfo = docInfoArr && docInfoArr.length > 0 ? docInfoArr[0] : null;

    // Get amount entries for these OT cases
    const admIds = (otEntries||[]).map(r=>r.admission_id);
    let amtMap = {};
    if (admIds.length > 0) {
      const { data: amts } = await BNH_PAGE.sb.from('ipd_amount_entries')
        .select('*').in('admission_id', admIds);
      (amts||[]).forEach(a => { amtMap[a.admission_id] = a; });
    }
    document.getElementById('spinner').classList.add('hidden');

    const opBal = parseFloat(docInfo?.opening_balance||0);
    let rows = [];

    (otEntries||[]).forEach(ot => {
      const amt = amtMap[ot.admission_id] || {};
      let fees = 0, nhAdj = 0;
      if (docType === 'Surgent' && ot.surgent_id === docId) {
        fees  = parseFloat(amt.surgent_fees||0);
        nhAdj = parseFloat(amt.nh_fees||0);
      } else if (docType === 'Anaesthesia' && ot.anaesthesia_id === docId) {
        fees = parseFloat(amt.anaesthesia_fees||0);
      }
      rows.push({ date: ot.ot_date, desc: `OT – ${ot.patient_name} (${ot.admission_no})`, dr: fees, nhAdj, cr: 0 });
    });

    (payments||[]).forEach(p => {
      rows.push({ date: p.payment_date, desc: `Payment (${p.mode})`, dr: 0, nhAdj: 0, cr: parseFloat(p.amount||0) });
    });

    rows.sort((a,b) => a.date.localeCompare(b.date));

    let bal = opBal;
    let tableRows = '';
    rows.forEach((r,i) => {
      const netDr = r.dr - r.nhAdj; // Surgent: fees minus NH adj
      bal += netDr - r.cr;
      tableRows += `<tr>
        <td>${i+1}</td><td>${r.date}</td><td>${r.desc}</td>
        <td class="r">${r.dr ? fmt(r.dr) : '-'}</td>
        <td class="r">${docType==='Surgent' && r.nhAdj ? fmt(r.nhAdj) : '-'}</td>
        <td class="r">${r.cr ? fmt(r.cr) : '-'}</td>
        <td class="r" style="font-weight:600">${fmt(bal)}</td>
      </tr>`;
    });

    out.innerHTML = `<div id="ledgerWrap">
      <div style="font-size:.85rem;margin-bottom:.75rem">
        <strong>${docInfo?.doctor_name}</strong> &nbsp;|&nbsp; ${docType} &nbsp;|&nbsp;
        ${docInfo?.specialisation||''} &nbsp;|&nbsp; Mobile: ${docInfo?.mobile||'-'}<br>
        Opening Balance: <strong>${fmt(opBal)}</strong> &nbsp;|&nbsp; Period: ${from} to ${to}
      </div>
      <table id="ledgerTable">
        <thead><tr>
          <th>#</th><th>Date</th><th>Description</th>
          <th class="r">Fees (Dr)</th>
          <th class="r">NH Adj (Cr)</th>
          <th class="r">Payment (Cr)</th>
          <th class="r">Balance</th>
        </tr></thead>
        <tbody>${tableRows||'<tr><td colspan="7" style="text-align:center">No transactions in this period.</td></tr>'}</tbody>
        <tfoot><tr><td colspan="6" style="text-align:right">Closing Balance (Due)</td>
          <td class="r ${bal>0?'due-pos':'due-neg'}">${fmt(bal)}</td>
        </tr></tfoot>
      </table>
    </div>`;
  }

  function downloadPDF(elementId, title) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    doc.setFontSize(14);
    doc.text('Bhagirathi Nursing Home – IPD', 15, 15);
    doc.setFontSize(11);
    doc.text(title, 15, 22);
    doc.setFontSize(8);
    doc.text('Generated: ' + new Date().toLocaleString('en-IN'), 15, 28);
    const tables = document.getElementById(elementId)?.querySelectorAll('table');
    let y = 32;
    (tables||[]).forEach(tbl => {
      doc.autoTable({ html: tbl, startY: y, styles:{fontSize:8},
        headStyles:{fillColor:[99,102,241]}, margin:{left:15,right:15} });
      y = doc.lastAutoTable.finalY + 6;
    });
    doc.save(title.replace(/\s+/g,'_') + '_' + new Date().toISOString().slice(0,10) + '.pdf');
  }
</script>
</body>
</html>
