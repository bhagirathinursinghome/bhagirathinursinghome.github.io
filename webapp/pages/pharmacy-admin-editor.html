<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Records Editor – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* ── Tab bar ── */
    .tab-bar { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:1.25rem; }
    .tab-btn {
      padding:.42rem .95rem; border:2px solid #6366f1; border-radius:7px;
      background:#fff; color:#6366f1; font-weight:600; font-size:.8rem;
      cursor:pointer; transition:all .18s; white-space:nowrap;
    }
    .tab-btn.active { background:#6366f1; color:#fff; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── Toolbar ── */
    .toolbar { display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; margin-bottom:.85rem; }
    .toolbar input[type=text], .toolbar input[type=date], .toolbar select {
      padding:.38rem .65rem; border:1.5px solid #d1d5db; border-radius:7px;
      font-size:.82rem; outline:none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color:#6366f1; }
    .count-badge { font-size:.78rem; color:#6b7280; margin-left:auto; }

    /* ── Table ── */
    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.81rem; }
    th { background:#f0f4ff; padding:8px 9px; text-align:left; color:#3730a3;
         font-weight:700; border-bottom:2px solid #e0e7ff; white-space:nowrap; }
    td { padding:7px 9px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    tr:hover td { background:#fafafe; }
    .r { text-align:right; }
    .actions { display:flex; gap:.35rem; flex-wrap:nowrap; }
    .btn-sm { padding:3px 10px; border-radius:6px; font-size:.75rem; font-weight:600;
              cursor:pointer; border:none; white-space:nowrap; }
    .btn-edit { background:#e0e7ff; color:#3730a3; }
    .btn-edit:hover { background:#c7d2fe; }
    .btn-del  { background:#fee2e2; color:#991b1b; }
    .btn-del:hover  { background:#fecaca; }
    .empty-state { text-align:center; padding:2rem; color:#9ca3af; font-size:.87rem; }

    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.48);
                     z-index:1000; align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:14px; padding:1.6rem; width:min(96vw,520px);
             box-shadow:0 24px 64px rgba(0,0,0,.22); max-height:90vh; overflow-y:auto; }
    .modal h2 { font-size:1rem; margin:0 0 1rem; color:#1e1b4b; }
    .modal label { display:block; font-size:.79rem; font-weight:600; color:#374151; margin:.55rem 0 .18rem; }
    .modal input, .modal textarea, .modal select {
      width:100%; padding:.4rem .65rem; border:1.5px solid #d1d5db; border-radius:7px;
      font-size:.88rem; box-sizing:border-box; outline:none;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color:#6366f1; }
    .modal-row { display:flex; gap:.75rem; }
    .modal-row > * { flex:1; min-width:0; }
    .modal-actions { display:flex; gap:.6rem; justify-content:flex-end; margin-top:1.1rem; }
    .btn-cancel { padding:.4rem 1rem; border-radius:7px; background:#f3f4f6; color:#374151;
                  font-weight:600; cursor:pointer; border:none; }
    .btn-save   { padding:.4rem 1.1rem; border-radius:7px; background:#6366f1; color:#fff;
                  font-weight:600; cursor:pointer; border:none; }
    .btn-save:hover { background:#4f46e5; }

    /* Confirm modal */
    .confirm-box { background:#fff; border-radius:14px; padding:1.75rem; width:min(94vw,390px);
                   box-shadow:0 20px 60px rgba(0,0,0,.22); text-align:center; }
    .confirm-box .ci { font-size:2.4rem; }
    .confirm-box p { font-size:.88rem; color:#374151; margin:.4rem 0 1.1rem; }
    .btn-danger { padding:.42rem 1.15rem; border-radius:7px; background:#dc2626; color:#fff;
                  font-weight:600; cursor:pointer; border:none; }
    .btn-danger:hover { background:#b91c1c; }
    .modal-err { font-size:.78rem; color:#dc2626; margin-top:.4rem; min-height:1rem; }

    /* Meta chip */
    .meta { font-size:.7rem; color:#9ca3af; }
    .hidden { display:none!important; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<!-- ══ EDIT MODAL ══ -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2 id="editModalTitle">Edit Record</h2>
    <div id="editFields"></div>
    <div class="modal-err" id="editErr"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save"   onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<!-- ══ DELETE CONFIRM MODAL ══ -->
<div class="modal-overlay" id="delModal">
  <div class="confirm-box">
    <div class="ci">🗑️</div>
    <strong id="delLabel" style="font-size:.95rem"></strong>
    <p>This will permanently delete this record.<br>This <strong>cannot be undone</strong>.</p>
    <div style="display:flex;gap:.6rem;justify-content:center">
      <button class="btn-cancel" onclick="closeDel()">Cancel</button>
      <button class="btn-danger" onclick="confirmDel()">Yes, Delete</button>
    </div>
    <div class="modal-err" id="delErr"></div>
  </div>
</div>

<!-- ══ PAGE ══ -->
<div class="page">
  <h1>🔧 Admin Records Editor</h1>
  <p style="font-size:.83rem;color:#6b7280;margin-top:-.5rem;margin-bottom:1.1rem">
    Admin-only • Edit or delete any pharmacy record
  </p>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('purchases',this)">🛒 Purchases</button>
    <button class="tab-btn" onclick="switchTab('sales',this)">💊 Sales</button>
    <button class="tab-btn" onclick="switchTab('payments',this)">💳 Sup. Payments</button>
    <button class="tab-btn" onclick="switchTab('vouchers',this)">🧾 Vouchers</button>
    <button class="tab-btn" onclick="switchTab('extrapay',this)">💰 Extra Pay</button>
    <button class="tab-btn" onclick="switchTab('transfers',this)">🔄 Fund Transfers</button>
  </div>

  <!-- ══ PURCHASES ══ -->
  <div id="tab-purchases" class="tab-panel active page-card">
    <div class="toolbar">
      <input type="text" id="pur-search" placeholder="🔍 Search supplier / type…" oninput="renderPurchases()"/>
      <input type="date" id="pur-from" onchange="renderPurchases()"/>
      <input type="date" id="pur-to"   onchange="renderPurchases()"/>
      <span class="count-badge" id="pur-count"></span>
    </div>
    <div class="tbl-wrap"><div id="pur-body"><div class="empty-state">Loading…</div></div></div>
  </div>

  <!-- ══ SALES ══ -->
  <div id="tab-sales" class="tab-panel page-card">
    <div class="toolbar">
      <input type="text" id="sal-search" placeholder="🔍 Search type / adm. no…" oninput="renderSales()"/>
      <input type="date" id="sal-from" onchange="renderSales()"/>
      <input type="date" id="sal-to"   onchange="renderSales()"/>
      <span class="count-badge" id="sal-count"></span>
    </div>
    <div class="tbl-wrap"><div id="sal-body"><div class="empty-state">Loading…</div></div></div>
  </div>

  <!-- ══ SUPPLIER PAYMENTS ══ -->
  <div id="tab-payments" class="tab-panel page-card">
    <div class="toolbar">
      <input type="text" id="pay-search" placeholder="🔍 Search supplier / mode…" oninput="renderPayments()"/>
      <input type="date" id="pay-from" onchange="renderPayments()"/>
      <input type="date" id="pay-to"   onchange="renderPayments()"/>
      <span class="count-badge" id="pay-count"></span>
    </div>
    <div class="tbl-wrap"><div id="pay-body"><div class="empty-state">Loading…</div></div></div>
  </div>

  <!-- ══ VOUCHERS ══ -->
  <div id="tab-vouchers" class="tab-panel page-card">
    <div class="toolbar">
      <input type="text" id="vou-search" placeholder="🔍 Search pay to / for…" oninput="renderVouchers()"/>
      <input type="date" id="vou-from" onchange="renderVouchers()"/>
      <input type="date" id="vou-to"   onchange="renderVouchers()"/>
      <span class="count-badge" id="vou-count"></span>
    </div>
    <div class="tbl-wrap"><div id="vou-body"><div class="empty-state">Loading…</div></div></div>
  </div>

  <!-- ══ EXTRA PAY ══ -->
  <div id="tab-extrapay" class="tab-panel page-card">
    <div class="toolbar">
      <select id="ep-sub" onchange="renderExtraPay()">
        <option value="given">Amount Given</option>
        <option value="clear">Due Clear</option>
      </select>
      <input type="text" id="ep-search" placeholder="🔍 Search name…" oninput="renderExtraPay()"/>
      <input type="date" id="ep-from" onchange="renderExtraPay()"/>
      <input type="date" id="ep-to"   onchange="renderExtraPay()"/>
      <span class="count-badge" id="ep-count"></span>
    </div>
    <div class="tbl-wrap"><div id="ep-body"><div class="empty-state">Loading…</div></div></div>
  </div>

  <!-- ══ FUND TRANSFERS ══ -->
  <div id="tab-transfers" class="tab-panel page-card">
    <div class="toolbar">
      <input type="text" id="tr-search" placeholder="🔍 Search from / to…" oninput="renderTransfers()"/>
      <input type="date" id="tr-from" onchange="renderTransfers()"/>
      <input type="date" id="tr-to"   onchange="renderTransfers()"/>
      <span class="count-badge" id="tr-count"></span>
    </div>
    <div class="tbl-wrap"><div id="tr-body"><div class="empty-state">Loading…</div></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
BNH_PAGE.requireRole(["admin"]);

// ── State ────────────────────────────────────────────────
const state = {
  purchases: [], sales: [], payments: [], vouchers: [],
  epGiven: [], epClear: [], transfers: [], suppliers: []
};
let editContext = null; // { table, id, data }
let delContext  = null;
const fmt = n => '₹' + parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Tab switching ────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── Load all data ────────────────────────────────────────
async function loadAll() {
  document.getElementById('spinner').classList.remove('hidden');
  const [r1,r2,r3,r4,r5,r6,r7,r8] = await Promise.all([
    BNH_PAGE.sb.from('pharmacy_purchases').select('*').order('purchase_date', {ascending:false}),
    BNH_PAGE.sb.from('pharmacy_sales').select('*').order('sale_date', {ascending:false}),
    BNH_PAGE.sb.from('pharmacy_supplier_payments').select('*').order('pay_date', {ascending:false}),
    BNH_PAGE.sb.from('pharmacy_vouchers').select('*').order('voucher_date', {ascending:false}),
    BNH_PAGE.sb.from('pharmacy_extra_pay_given').select('*').order('given_date', {ascending:false}),
    BNH_PAGE.sb.from('pharmacy_extra_pay_clear').select('*').order('clear_date', {ascending:false}),
    BNH_PAGE.sb.from('pharmacy_fund_transfers').select('*').order('transfer_date', {ascending:false}),
    BNH_PAGE.sb.from('pharmacy_suppliers').select('supplier_name').order('supplier_name')
  ]);
  state.purchases = r1.data||[]; state.sales      = r2.data||[];
  state.payments  = r3.data||[]; state.vouchers   = r4.data||[];
  state.epGiven   = r5.data||[]; state.epClear    = r6.data||[];
  state.transfers = r7.data||[]; state.suppliers  = r8.data||[];
  document.getElementById('spinner').classList.add('hidden');
  renderPurchases(); renderSales(); renderPayments();
  renderVouchers(); renderExtraPay(); renderTransfers();
}

// ── Filtering helpers ────────────────────────────────────
function filterRows(rows, q, dateField, from, to) {
  return rows.filter(r => {
    const d = r[dateField]||'';
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    if (q) {
      const blob = JSON.stringify(Object.values(r)).toLowerCase();
      if (!blob.includes(q.toLowerCase())) return false;
    }
    return true;
  });
}

function setCount(id, n, total) {
  document.getElementById(id).textContent = n + ' record' + (n!==1?'s':'') + (n<total?' (filtered)':'');
}

// ── RENDER PURCHASES ─────────────────────────────────────
function renderPurchases() {
  const q    = document.getElementById('pur-search').value;
  const from = document.getElementById('pur-from').value;
  const to   = document.getElementById('pur-to').value;
  const rows = filterRows(state.purchases, q, 'purchase_date', from, to);
  setCount('pur-count', rows.length, state.purchases.length);
  if (!rows.length) { document.getElementById('pur-body').innerHTML='<div class="empty-state">No records found.</div>'; return; }
  document.getElementById('pur-body').innerHTML = `<table>
    <thead><tr><th>Date</th><th>Supplier</th><th>Type</th><th class="r">Amount</th><th>Remark</th><th>By</th><th>Actions</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.purchase_date}</td><td>${esc(r.supplier_name)}</td><td>${esc(r.purchase_type)}</td>
      <td class="r">${fmt(r.amount)}</td><td>${esc(r.remark||'—')}</td>
      <td class="meta">${esc(r.recorded_by_name||r.recorded_by||'')}</td>
      <td><div class="actions">
        <button class="btn-sm btn-edit" onclick='openEdit("purchases",${JSON.stringify(r)})'>✏️ Edit</button>
        <button class="btn-sm btn-del"  onclick='openDel("purchases","${r.id}","Purchase ${r.purchase_date}")'>🗑️</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ── RENDER SALES ─────────────────────────────────────────
function renderSales() {
  const q    = document.getElementById('sal-search').value;
  const from = document.getElementById('sal-from').value;
  const to   = document.getElementById('sal-to').value;
  const rows = filterRows(state.sales, q, 'sale_date', from, to);
  setCount('sal-count', rows.length, state.sales.length);
  if (!rows.length) { document.getElementById('sal-body').innerHTML='<div class="empty-state">No records found.</div>'; return; }
  document.getElementById('sal-body').innerHTML = `<table>
    <thead><tr><th>Date</th><th>Type</th><th>Adm No.</th><th class="r">Cost</th><th class="r">Sale</th><th>Mode</th><th>Remark</th><th>By</th><th>Actions</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.sale_date}</td><td>${esc(r.sale_type)}</td><td>${esc(r.admission_no||'—')}</td>
      <td class="r">${fmt(r.cost_price)}</td><td class="r">${fmt(r.sale_price)}</td>
      <td>${esc(r.mode_of_payment||'—')}</td><td>${esc(r.remark||'—')}</td>
      <td class="meta">${esc(r.recorded_by_name||r.recorded_by||'')}</td>
      <td><div class="actions">
        <button class="btn-sm btn-edit" onclick='openEdit("sales",${JSON.stringify(r)})'>✏️ Edit</button>
        <button class="btn-sm btn-del"  onclick='openDel("sales","${r.id}","Sale ${r.sale_date}")'>🗑️</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ── RENDER PAYMENTS ──────────────────────────────────────
function renderPayments() {
  const q    = document.getElementById('pay-search').value;
  const from = document.getElementById('pay-from').value;
  const to   = document.getElementById('pay-to').value;
  const rows = filterRows(state.payments, q, 'pay_date', from, to);
  setCount('pay-count', rows.length, state.payments.length);
  if (!rows.length) { document.getElementById('pay-body').innerHTML='<div class="empty-state">No records found.</div>'; return; }
  document.getElementById('pay-body').innerHTML = `<table>
    <thead><tr><th>Date</th><th>Supplier</th><th class="r">Amount</th><th>Mode</th><th>Remark</th><th>By</th><th>Actions</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.pay_date}</td><td>${esc(r.supplier_name)}</td>
      <td class="r">${fmt(r.amount)}</td><td>${esc(r.mode)}</td><td>${esc(r.remark||'—')}</td>
      <td class="meta">${esc(r.recorded_by_name||r.recorded_by||'')}</td>
      <td><div class="actions">
        <button class="btn-sm btn-edit" onclick='openEdit("payments",${JSON.stringify(r)})'>✏️ Edit</button>
        <button class="btn-sm btn-del"  onclick='openDel("payments","${r.id}","Payment ${r.pay_date}")'>🗑️</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ── RENDER VOUCHERS ──────────────────────────────────────
function renderVouchers() {
  const q    = document.getElementById('vou-search').value;
  const from = document.getElementById('vou-from').value;
  const to   = document.getElementById('vou-to').value;
  const rows = filterRows(state.vouchers, q, 'voucher_date', from, to);
  setCount('vou-count', rows.length, state.vouchers.length);
  if (!rows.length) { document.getElementById('vou-body').innerHTML='<div class="empty-state">No records found.</div>'; return; }
  document.getElementById('vou-body').innerHTML = `<table>
    <thead><tr><th>Date</th><th>Pay To</th><th>Pay For</th><th class="r">Amount</th><th>Mode</th><th>By</th><th>Actions</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.voucher_date}</td><td>${esc(r.pay_to)}</td><td>${esc(r.pay_for)}</td>
      <td class="r">${fmt(r.amount)}</td><td>${esc(r.mode)}</td>
      <td class="meta">${esc(r.recorded_by_name||r.recorded_by||'')}</td>
      <td><div class="actions">
        <button class="btn-sm btn-edit" onclick='openEdit("vouchers",${JSON.stringify(r)})'>✏️ Edit</button>
        <button class="btn-sm btn-del"  onclick='openDel("vouchers","${r.id}","Voucher ${r.voucher_date}")'>🗑️</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ── RENDER EXTRA PAY ─────────────────────────────────────
function renderExtraPay() {
  const sub  = document.getElementById('ep-sub').value;
  const q    = document.getElementById('ep-search').value;
  const from = document.getElementById('ep-from').value;
  const to   = document.getElementById('ep-to').value;
  const src  = sub === 'given' ? state.epGiven : state.epClear;
  const df   = sub === 'given' ? 'given_date' : 'clear_date';
  const rows = filterRows(src, q, df, from, to);
  setCount('ep-count', rows.length, src.length);
  const body = document.getElementById('ep-body');
  if (!rows.length) { body.innerHTML='<div class="empty-state">No records found.</div>'; return; }
  if (sub === 'given') {
    body.innerHTML = `<table>
      <thead><tr><th>Date</th><th>Pay To</th><th>Pay For</th><th class="r">Amount</th><th>Mode</th><th>By</th><th>Actions</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${r.given_date}</td><td>${esc(r.pay_to_name)}</td><td>${esc(r.pay_for)}</td>
        <td class="r">${fmt(r.amount)}</td><td>${esc(r.mode)}</td>
        <td class="meta">${esc(r.recorded_by_name||r.recorded_by||'')}</td>
        <td><div class="actions">
          <button class="btn-sm btn-edit" onclick='openEdit("epGiven",${JSON.stringify(r)})'>✏️ Edit</button>
          <button class="btn-sm btn-del"  onclick='openDel("epGiven","${r.id}","Extra Pay Given ${r.given_date}")'>🗑️</button>
        </div></td>
      </tr>`).join('')}</tbody>
    </table>`;
  } else {
    body.innerHTML = `<table>
      <thead><tr><th>Date</th><th>Name</th><th class="r">Voucher</th><th class="r">Cash Return</th><th>Remark</th><th>By</th><th>Actions</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${r.clear_date}</td><td>${esc(r.clear_name)}</td>
        <td class="r">${fmt(r.voucher_amount)}</td><td class="r">${fmt(r.cash_return)}</td>
        <td>${esc(r.remark||'—')}</td>
        <td class="meta">${esc(r.recorded_by_name||r.recorded_by||'')}</td>
        <td><div class="actions">
          <button class="btn-sm btn-edit" onclick='openEdit("epClear",${JSON.stringify(r)})'>✏️ Edit</button>
          <button class="btn-sm btn-del"  onclick='openDel("epClear","${r.id}","Due Clear ${r.clear_date}")'>🗑️</button>
        </div></td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
}

// ── RENDER TRANSFERS ─────────────────────────────────────
function renderTransfers() {
  const q    = document.getElementById('tr-search').value;
  const from = document.getElementById('tr-from').value;
  const to   = document.getElementById('tr-to').value;
  const rows = filterRows(state.transfers, q, 'transfer_date', from, to);
  setCount('tr-count', rows.length, state.transfers.length);
  if (!rows.length) { document.getElementById('tr-body').innerHTML='<div class="empty-state">No records found.</div>'; return; }
  document.getElementById('tr-body').innerHTML = `<table>
    <thead><tr><th>Date</th><th>From</th><th>To</th><th class="r">Amount</th><th>Remark</th><th>By</th><th>Actions</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.transfer_date}</td><td>${esc(r.from_account)}</td><td>${esc(r.to_account)}</td>
      <td class="r">${fmt(r.amount)}</td><td>${esc(r.remark||'—')}</td>
      <td class="meta">${esc(r.recorded_by_name||r.recorded_by||'')}</td>
      <td><div class="actions">
        <button class="btn-sm btn-edit" onclick='openEdit("transfers",${JSON.stringify(r)})'>✏️ Edit</button>
        <button class="btn-sm btn-del"  onclick='openDel("transfers","${r.id}","Transfer ${r.transfer_date}")'>🗑️</button>
      </div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ═══════════════════════════════════════════════════════
//  EDIT MODAL – build fields dynamically per table
// ═══════════════════════════════════════════════════════
const suppOpts = () => state.suppliers.map(s=>`<option value="${esc(s.supplier_name)}">${esc(s.supplier_name)}</option>`).join('');
const modeOpts = (sel='') => ['Cash','Bank','PhonePe'].map(m=>`<option value="${m}" ${sel===m?'selected':''}>${m}</option>`).join('');
const typeOpts = (sel='') => ['IPD','Dispensary'].map(t=>`<option value="${t}" ${sel===t?'selected':''}>${t}</option>`).join('');

const SCHEMAS = {
  purchases: (d) => ({
    title: '✏️ Edit Purchase',
    fields: `
      <div class="modal-row">
        <div><label>Date *</label><input id="f-purchase_date" type="date" value="${d.purchase_date||''}" required/></div>
        <div><label>Supplier *</label><select id="f-supplier_name">${suppOpts().replace(`value="${d.supplier_name}"`,`value="${d.supplier_name}" selected`)}</select></div>
      </div>
      <div class="modal-row">
        <div><label>Type *</label><select id="f-purchase_type">${typeOpts(d.purchase_type)}</select></div>
        <div><label>Amount *</label><input id="f-amount" type="number" step="0.01" value="${d.amount||0}"/></div>
      </div>
      <label>Remark</label><textarea id="f-remark" rows="2">${d.remark||''}</textarea>`,
    collect: () => ({
      purchase_date: v('purchase_date'), supplier_name: v('supplier_name'),
      purchase_type: v('purchase_type'), amount: parseFloat(v('amount')),
      remark: v('remark')||null
    }),
    dbTable: 'pharmacy_purchases', rerender: ()=>renderPurchases(), storeKey: 'purchases'
  }),

  sales: (d) => ({
    title: '✏️ Edit Sale',
    fields: `
      <div class="modal-row">
        <div><label>Date *</label><input id="f-sale_date" type="date" value="${d.sale_date||''}" required/></div>
        <div><label>Type *</label><select id="f-sale_type" onchange="toggleIpdMode()">${typeOpts(d.sale_type)}</select></div>
      </div>
      <div id="f-ipd-row" ${d.sale_type!=='IPD'?'style="display:none"':''}>
        <label>Admission No.</label><input id="f-admission_no" value="${d.admission_no||''}"/>
      </div>
      <div class="modal-row">
        <div><label>Cost Price *</label><input id="f-cost_price" type="number" step="0.01" value="${d.cost_price||0}"/></div>
        <div><label>Sale Price *</label><input id="f-sale_price" type="number" step="0.01" value="${d.sale_price||0}"/></div>
      </div>
      <div id="f-mop-row" ${d.sale_type==='IPD'?'style="display:none"':''}>
        <label>Mode of Payment</label>
        <select id="f-mode_of_payment"><option value="">—</option>${modeOpts(d.mode_of_payment)}</select>
      </div>
      <label>Remark</label><textarea id="f-remark" rows="2">${d.remark||''}</textarea>`,
    collect: () => {
      const t = v('sale_type');
      return { sale_date: v('sale_date'), sale_type: t,
        admission_no: t==='IPD' ? v('admission_no')||null : null,
        cost_price: parseFloat(v('cost_price')), sale_price: parseFloat(v('sale_price')),
        mode_of_payment: t==='IPD' ? null : v('mode_of_payment')||null,
        remark: v('remark')||null };
    },
    dbTable: 'pharmacy_sales', rerender: ()=>renderSales(), storeKey: 'sales'
  }),

  payments: (d) => ({
    title: '✏️ Edit Supplier Payment',
    fields: `
      <div class="modal-row">
        <div><label>Date *</label><input id="f-pay_date" type="date" value="${d.pay_date||''}" required/></div>
        <div><label>Supplier *</label><select id="f-supplier_name">${suppOpts().replace(`value="${d.supplier_name}"`,`value="${d.supplier_name}" selected`)}</select></div>
      </div>
      <div class="modal-row">
        <div><label>Amount *</label><input id="f-amount" type="number" step="0.01" value="${d.amount||0}"/></div>
        <div><label>Mode *</label><select id="f-mode"><option value="">—</option>${modeOpts(d.mode)}</select></div>
      </div>
      <label>Remark</label><textarea id="f-remark" rows="2">${d.remark||''}</textarea>`,
    collect: () => ({
      pay_date: v('pay_date'), supplier_name: v('supplier_name'),
      amount: parseFloat(v('amount')), mode: v('mode'), remark: v('remark')||null
    }),
    dbTable: 'pharmacy_supplier_payments', rerender: ()=>renderPayments(), storeKey: 'payments'
  }),

  vouchers: (d) => ({
    title: '✏️ Edit Voucher',
    fields: `
      <div class="modal-row">
        <div><label>Date *</label><input id="f-voucher_date" type="date" value="${d.voucher_date||''}" required/></div>
        <div><label>Pay To *</label><input id="f-pay_to" value="${esc(d.pay_to||'')}"/></div>
      </div>
      <div class="modal-row">
        <div><label>Pay For *</label><input id="f-pay_for" value="${esc(d.pay_for||'')}"/></div>
        <div><label>Amount *</label><input id="f-amount" type="number" step="0.01" value="${d.amount||0}"/></div>
      </div>
      <label>Mode *</label><select id="f-mode"><option value="">—</option>${modeOpts(d.mode)}</select>`,
    collect: () => ({
      voucher_date: v('voucher_date'), pay_to: v('pay_to'),
      pay_for: v('pay_for'), amount: parseFloat(v('amount')), mode: v('mode')
    }),
    dbTable: 'pharmacy_vouchers', rerender: ()=>renderVouchers(), storeKey: 'vouchers'
  }),

  epGiven: (d) => ({
    title: '✏️ Edit Extra Pay – Given',
    fields: `
      <div class="modal-row">
        <div><label>Date *</label><input id="f-given_date" type="date" value="${d.given_date||''}" required/></div>
        <div><label>Pay To Name *</label><input id="f-pay_to_name" value="${esc(d.pay_to_name||'')}"/></div>
      </div>
      <div class="modal-row">
        <div><label>Pay For *</label><input id="f-pay_for" value="${esc(d.pay_for||'')}"/></div>
        <div><label>Amount *</label><input id="f-amount" type="number" step="0.01" value="${d.amount||0}"/></div>
      </div>
      <label>Mode *</label><select id="f-mode"><option value="">—</option>${modeOpts(d.mode)}</select>`,
    collect: () => ({
      given_date: v('given_date'), pay_to_name: v('pay_to_name'),
      pay_for: v('pay_for'), amount: parseFloat(v('amount')), mode: v('mode')
    }),
    dbTable: 'pharmacy_extra_pay_given', rerender: ()=>renderExtraPay(), storeKey: 'epGiven'
  }),

  epClear: (d) => ({
    title: '✏️ Edit Extra Pay – Due Clear',
    fields: `
      <div class="modal-row">
        <div><label>Date *</label><input id="f-clear_date" type="date" value="${d.clear_date||''}" required/></div>
        <div><label>Name *</label><input id="f-clear_name" value="${esc(d.clear_name||'')}"/></div>
      </div>
      <div class="modal-row">
        <div><label>Voucher Amount</label><input id="f-voucher_amount" type="number" step="0.01" value="${d.voucher_amount||0}"/></div>
        <div><label>Cash Return</label><input id="f-cash_return" type="number" step="0.01" value="${d.cash_return||0}"/></div>
      </div>
      <label>Remark</label><textarea id="f-remark" rows="2">${d.remark||''}</textarea>`,
    collect: () => ({
      clear_date: v('clear_date'), clear_name: v('clear_name'),
      voucher_amount: parseFloat(v('voucher_amount')||0),
      cash_return: parseFloat(v('cash_return')||0), remark: v('remark')||null
    }),
    dbTable: 'pharmacy_extra_pay_clear', rerender: ()=>renderExtraPay(), storeKey: 'epClear'
  }),

  transfers: (d) => ({
    title: '✏️ Edit Fund Transfer',
    fields: `
      <div class="modal-row">
        <div><label>Date *</label><input id="f-transfer_date" type="date" value="${d.transfer_date||''}" required/></div>
        <div><label>Amount *</label><input id="f-amount" type="number" step="0.01" value="${d.amount||0}"/></div>
      </div>
      <div class="modal-row">
        <div><label>From *</label>
          <select id="f-from_account">
            ${['Cash','Bank','PhonePe'].map(m=>`<option value="${m}" ${d.from_account===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <div><label>To *</label>
          <select id="f-to_account">
            ${['Cash','Bank','PhonePe'].map(m=>`<option value="${m}" ${d.to_account===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
      </div>
      <label>Remark</label><textarea id="f-remark" rows="2">${d.remark||''}</textarea>`,
    collect: () => ({
      transfer_date: v('transfer_date'), from_account: v('from_account'),
      to_account: v('to_account'), amount: parseFloat(v('amount')), remark: v('remark')||null
    }),
    dbTable: 'pharmacy_fund_transfers', rerender: ()=>renderTransfers(), storeKey: 'transfers'
  })
};

function v(id) {
  const el = document.getElementById('f-'+id);
  return el ? el.value.trim() : '';
}

function toggleIpdMode() {
  const t = document.getElementById('f-sale_type')?.value;
  const ipdRow = document.getElementById('f-ipd-row');
  const mopRow = document.getElementById('f-mop-row');
  if (ipdRow) ipdRow.style.display = t==='IPD' ? '' : 'none';
  if (mopRow) mopRow.style.display = t==='IPD' ? 'none' : '';
}

function openEdit(tableKey, data) {
  const schema = SCHEMAS[tableKey](data);
  editContext = { tableKey, id: data.id, schema };
  document.getElementById('editModalTitle').textContent = schema.title;
  document.getElementById('editFields').innerHTML = schema.fields;
  document.getElementById('editErr').textContent = '';
  document.getElementById('editModal').classList.add('open');
}

function closeEdit() {
  editContext = null;
  document.getElementById('editModal').classList.remove('open');
}

async function saveEdit() {
  const errEl = document.getElementById('editErr');
  errEl.textContent = '';
  if (!editContext) return;
  const { tableKey, id, schema } = editContext;
  let updates;
  try { updates = schema.collect(); } catch(e) { errEl.textContent = e.message; return; }

  // Stamp editor info
  updates.updated_by      = BNH_PAGE.user?.username || '';
  updates.updated_by_name = BNH_PAGE.user?.name || '';
  updates.updated_at      = new Date().toISOString();

  document.getElementById('spinner').classList.remove('hidden');
  try {
    const { error } = await BNH_PAGE.sb.from(schema.dbTable).update(updates).eq('id', id);
    if (error) throw error;
    // Update local state
    const arr = state[tableKey];
    const idx = arr.findIndex(r=>r.id===id);
    if (idx>-1) Object.assign(arr[idx], updates);
    closeEdit();
    schema.rerender();
  } catch(ex) {
    errEl.textContent = ex.message;
  } finally {
    document.getElementById('spinner').classList.add('hidden');
  }
}

// ── DELETE ───────────────────────────────────────────────
const DEL_TABLE = {
  purchases:'pharmacy_purchases', sales:'pharmacy_sales',
  payments:'pharmacy_supplier_payments', vouchers:'pharmacy_vouchers',
  epGiven:'pharmacy_extra_pay_given', epClear:'pharmacy_extra_pay_clear',
  transfers:'pharmacy_fund_transfers'
};
const RERENDER = {
  purchases:renderPurchases, sales:renderSales, payments:renderPayments,
  vouchers:renderVouchers, epGiven:renderExtraPay, epClear:renderExtraPay,
  transfers:renderTransfers
};

function openDel(tableKey, id, label) {
  delContext = { tableKey, id };
  document.getElementById('delLabel').textContent = label;
  document.getElementById('delErr').textContent = '';
  document.getElementById('delModal').classList.add('open');
}
function closeDel() {
  delContext = null;
  document.getElementById('delModal').classList.remove('open');
}
async function confirmDel() {
  const errEl = document.getElementById('delErr');
  errEl.textContent = '';
  if (!delContext) return;
  const { tableKey, id } = delContext;
  document.getElementById('spinner').classList.remove('hidden');
  try {
    const { error } = await BNH_PAGE.sb.from(DEL_TABLE[tableKey]).delete().eq('id', id);
    if (error) throw error;
    state[tableKey] = state[tableKey].filter(r=>r.id!==id);
    closeDel();
    RERENDER[tableKey]();
  } catch(ex) {
    errEl.textContent = ex.message;
  } finally {
    document.getElementById('spinner').classList.add('hidden');
  }
}

// Close modals on overlay click
['editModal','delModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click', function(e){
    if(e.target===this){ id==='editModal'?closeEdit():closeDel(); }
  });
});

// Init
loadAll();
</script>
