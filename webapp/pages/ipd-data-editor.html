<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IPD Data Editor – Manager</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* ── layout ── */
    .section-picker { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.25rem; }
    .sp-btn { padding:.45rem 1rem; border:2px solid #6366f1; border-radius:8px;
              background:#fff; color:#6366f1; font-weight:600; cursor:pointer;
              font-size:.82rem; transition:all .18s; white-space:nowrap; }
    .sp-btn.active { background:#6366f1; color:#fff; }
    .sp-btn:hover:not(.active) { background:#eef2ff; }

    /* ── table ── */
    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.8rem; min-width:600px; }
    th { background:#f1f5f9; padding:7px 8px; text-align:left; font-weight:700;
         color:#334155; position:sticky; top:0; z-index:1; white-space:nowrap; }
    td { padding:6px 8px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    tr:hover td { background:#fafbff; }
    .act-btns { display:flex; gap:.35rem; }
    .btn-edit { padding:3px 10px; border-radius:6px; border:1px solid #6366f1;
                background:#eef2ff; color:#4338ca; font-size:.78rem; font-weight:600;
                cursor:pointer; }
    .btn-del  { padding:3px 10px; border-radius:6px; border:1px solid #fca5a5;
                background:#fff1f2; color:#dc2626; font-size:.78rem; font-weight:600;
                cursor:pointer; }
    .btn-edit:hover { background:#e0e7ff; }
    .btn-del:hover  { background:#ffe4e6; }

    /* ── modal ── */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45);
                display:flex; align-items:center; justify-content:center;
                z-index:1000; padding:1rem; }
    .modal-box { background:#fff; border-radius:14px; padding:1.5rem;
                 width:100%; max-width:560px; max-height:90vh; overflow-y:auto;
                 box-shadow:0 20px 60px rgba(0,0,0,.25); }
    .modal-title { font-size:1.05rem; font-weight:800; color:#1e1b4b; margin-bottom:1rem; }
    .modal-field { margin-bottom:.75rem; }
    .modal-field label { font-size:.8rem; font-weight:600; color:#374151;
                         display:block; margin-bottom:.2rem; }
    .modal-field input, .modal-field textarea, .modal-field select {
      width:100%; padding:.45rem .65rem; border:1px solid #d1d5db;
      border-radius:8px; font-size:.85rem; box-sizing:border-box; }
    .modal-field textarea { resize:vertical; min-height:60px; }
    .modal-actions { display:flex; gap:.75rem; margin-top:1.25rem; justify-content:flex-end; }
    .btn-save { background:#6366f1; color:#fff; border:none; border-radius:8px;
                padding:.55rem 1.4rem; font-weight:700; cursor:pointer; }
    .btn-cancel { background:#f1f5f9; color:#374151; border:none; border-radius:8px;
                  padding:.55rem 1.2rem; font-weight:600; cursor:pointer; }
    .btn-save:hover { background:#4f46e5; }

    /* ── misc ── */
    .filter-row { display:flex; gap:.75rem; flex-wrap:wrap; align-items:flex-end;
                  margin-bottom:.85rem; }
    .filter-row > * { flex:1; min-width:140px; }
    .badge-del  { background:#fee2e2; color:#991b1b; padding:2px 8px;
                  border-radius:10px; font-size:.72rem; font-weight:700; }
    .badge-edit { background:#dbeafe; color:#1d4ed8; padding:2px 8px;
                  border-radius:10px; font-size:.72rem; font-weight:700; }
    .warn-note  { background:#fef3c7; border:1px solid #fcd34d; border-radius:8px;
                  padding:.6rem .9rem; font-size:.82rem; color:#78350f; margin-bottom:1rem; }
    .count-badge { background:#6366f1; color:#fff; border-radius:10px;
                   padding:1px 8px; font-size:.75rem; margin-left:.4rem; }
    .hidden { display:none!important; }
    .empty-msg { color:#9ca3af; font-size:.85rem; padding:.75rem 0; }
    .search-box { padding:.4rem .7rem; border:1px solid #d1d5db; border-radius:8px;
                  font-size:.83rem; min-width:200px; }
    tfoot td { font-weight:700; background:#f8fafc; font-size:.8rem; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<!-- EDIT MODAL -->
<div id="modalBg" class="modal-bg hidden">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Edit Record</div>
    <div id="modalFields"></div>
    <p class="err" id="modalErr"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<div class="page">
  <h1>🛠 IPD Data Editor</h1>
  <div class="warn-note">
    ⚠ <strong>Manager access only.</strong> All edits and deletes are permanent.
    Use with care — this tool bypasses normal workflow guards.
  </div>

  <!-- Section picker -->
  <div class="section-picker" id="sectionPicker">
    <button class="sp-btn active"  onclick="loadSection('refers',this)">🤝 Refers</button>
    <button class="sp-btn" onclick="loadSection('admissions',this)">🏥 Admissions</button>
    <button class="sp-btn" onclick="loadSection('doctors',this)">👨‍⚕️ Doctors</button>
    <button class="sp-btn" onclick="loadSection('ot_entries',this)">🔬 OT Entries</button>
    <button class="sp-btn" onclick="loadSection('amount_entries',this)">💰 Amount Entries</button>
    <button class="sp-btn" onclick="loadSection('cash_receipts',this)">💵 Cash Receipts</button>
    <button class="sp-btn" onclick="loadSection('additional_charges',this)">➕ Addl Charges</button>
    <button class="sp-btn" onclick="loadSection('medicine_indens',this)">💊 Medicine Indens</button>
    <button class="sp-btn" onclick="loadSection('transactions',this)">🔄 Transactions</button>
    <button class="sp-btn" onclick="loadSection('doctor_payments',this)">💳 Doctor Payments</button>
    <button class="sp-btn" onclick="loadSection('refer_payments',this)">💸 Refer Payments</button>
  </div>

  <div class="page-card">
    <!-- Filter row -->
    <div class="filter-row">
      <div>
        <label style="font-size:.8rem;font-weight:600">Search</label>
        <input class="search-box" id="searchBox" placeholder="Type to filter…"
               oninput="filterTable()"/>
      </div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn-primary" style="width:auto" onclick="reloadCurrent()">🔄 Refresh</button>
      </div>
      <div style="display:flex;align-items:flex-end">
        <span id="rowCount" style="font-size:.82rem;color:#6b7280"></span>
      </div>
    </div>

    <!-- Table container -->
    <div class="tbl-wrap">
      <div id="tableArea"><p class="empty-msg">Select a section above to load data.</p></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>

// ── Helpers ────────────────────────────────────────────────
function fmtMoney(v) {
  if (v === null || v === undefined || v === '') return '-';
  return '₹' + parseFloat(v).toLocaleString('en-IN',{minimumFractionDigits:2});
}
function fmtAmt(v) {
  if (v === null || v === undefined) return 'N/A';
  return fmtMoney(v);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Load section ───────────────────────────────────────────
async function loadSection(section, btn) {
  currentSection = section;
  document.querySelectorAll('.sp-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('searchBox').value = '';
  await fetchAndRender();
}

async function reloadCurrent() {
  await fetchAndRender();
}

async function fetchAndRender() {
  const def = SECTIONS[currentSection];
  if (!def) return;
  const sp = document.getElementById('spinner');
  sp.classList.remove('hidden');
  const area = document.getElementById('tableArea');
  area.innerHTML = '<p class="empty-msg">Loading…</p>';
  try {
    const { data, error } = await BNH_PAGE.sb
      .from('ipd_' + currentSection)
      .select('*')
      .order(def.orderCol, { ascending: false })
      .limit(500);
    if (error) throw error;
    currentData = data || [];
    renderTable(currentData);
  } catch(ex) {
    area.innerHTML = `<p style="color:#dc2626">Error: ${esc(ex.message)}</p>`;
  } finally {
    sp.classList.add('hidden');
  }
}

function renderTable(rows) {
  const def  = SECTIONS[currentSection];
  const area = document.getElementById('tableArea');
  document.getElementById('rowCount').textContent = `${rows.length} record${rows.length!==1?'s':''}`;

  if (!rows.length) {
    area.innerHTML = '<p class="empty-msg">No records found.</p>';
    return;
  }

  const header = def.cols.map(c=>`<th>${esc(c.label)}</th>`).join('') + '<th>Actions</th>';
  const body = rows.map(row => {
    const cells = def.cols.map(c => {
      const raw = row[c.key];
      const val = c.fmt ? c.fmt(raw) : (raw === null || raw === undefined || raw === '' ? '-' : esc(String(raw)));
      return `<td>${val}</td>`;
    }).join('');
    const id = esc(row.id);
    return `<tr>
      ${cells}
      <td>
        <div class="act-btns">
          <button class="btn-edit" onclick="openEdit('${id}')">✏ Edit</button>
          <button class="btn-del"  onclick="confirmDelete('${id}')">🗑 Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  area.innerHTML = `<table>
    <thead><tr>${header}</tr></thead>
    <tbody>${body}</tbody>
  </table>`;
}

// ── Search / filter ────────────────────────────────────────
function filterTable() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  if (!q) { renderTable(currentData); return; }
  const filtered = currentData.filter(row =>
    Object.values(row).some(v => v && String(v).toLowerCase().includes(q))
  );
  renderTable(filtered);
}

// ── Edit modal ─────────────────────────────────────────────
function openEdit(id) {
  const row = currentData.find(r => r.id === id);
  if (!row) return;
  editingId  = id;
  editingRow = row;

  const def = SECTIONS[currentSection];
  document.getElementById('modalTitle').textContent = `✏ Edit – ${def.label}`;
  document.getElementById('modalErr').textContent   = '';

  const fields = def.editFields.map(f => {
    const val = row[f.key];
    let input = '';

    if (f.type === 'textarea') {
      input = `<textarea id="ef_${f.key}" ${f.required?'required':''}>${esc(val||'')}</textarea>`;
    } else if (f.type === 'select') {
      const opts = f.options.map(o =>
        `<option value="${esc(o)}" ${String(val)===String(o)?'selected':''}>${esc(o)}</option>`
      ).join('');
      input = `<select id="ef_${f.key}" ${f.required?'required':''}>${opts}</select>`;
    } else {
      const v = (val === null || val === undefined) ? '' : val;
      input = `<input id="ef_${f.key}" type="${f.type||'text'}"
                value="${esc(v)}" ${f.required?'required':''}/>`;
    }

    return `<div class="modal-field">
      <label>${esc(f.label)}${f.required?' <span style="color:red">*</span>':''}</label>
      ${input}
    </div>`;
  }).join('');

  document.getElementById('modalFields').innerHTML = fields;
  document.getElementById('modalBg').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalBg').classList.add('hidden');
  editingId = null; editingRow = null;
}

async function saveEdit() {
  const def = SECTIONS[currentSection];
  const err = document.getElementById('modalErr');
  err.textContent = '';

  // Build update payload from modal fields
  const payload = {};
  for (const f of def.editFields) {
    const el = document.getElementById('ef_' + f.key);
    if (!el) continue;
    let v = el.value.trim();

    if (f.required && !v) { err.textContent = `${f.label} is required.`; el.focus(); return; }

    if (f.type === 'number') {
      payload[f.key] = v === '' ? null : parseFloat(v);
    } else if (f.type === 'select' && (v === 'true' || v === 'false')) {
      payload[f.key] = v === 'true';
    } else {
      payload[f.key] = v === '' ? null : v;
    }
  }

  const sp = document.getElementById('spinner');
  sp.classList.remove('hidden');
  try {
    const { error } = await BNH_PAGE.sb
      .from('ipd_' + currentSection)
      .update(payload)
      .eq('id', editingId);
    if (error) throw error;
    closeModal();
    await fetchAndRender();
  } catch(ex) {
    err.textContent = ex.message;
  } finally {
    sp.classList.add('hidden');
  }
}

// ── Delete ─────────────────────────────────────────────────
async function confirmDelete(id) {
  const row = currentData.find(r => r.id === id);
  if (!row) return;
  const def = SECTIONS[currentSection];

  // Build a human-readable summary of the row
  const preview = def.cols.slice(0,3).map(c => {
    const v = row[c.key];
    return `${c.label}: ${c.fmt ? c.fmt(v) : (v||'-')}`;
  }).join(' | ');

  const confirmed = confirm(
    `Delete this ${def.label} record?\n\n${preview}\n\nThis cannot be undone.`
  );
  if (!confirmed) return;

  const sp = document.getElementById('spinner');
  sp.classList.remove('hidden');
  try {
    const { error } = await BNH_PAGE.sb
      .from('ipd_' + currentSection)
      .delete()
      .eq('id', id);
    if (error) throw error;
    await fetchAndRender();
  } catch(ex) {
    alert('Delete failed: ' + ex.message);
  } finally {
    sp.classList.add('hidden');
  }
}

// Close modal on background click
document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Init ───────────────────────────────────────────────────
loadSection('refers', document.querySelector('.sp-btn.active'));
</script>
