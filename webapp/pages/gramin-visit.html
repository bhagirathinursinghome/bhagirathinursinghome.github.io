<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Gramin Doctor Visit</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted, #888);
      margin: 1.8rem 0 0.8rem;
    }

    /* Records table */
    .records-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .records-table th {
      text-align: left;
      padding: 0.55rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted, #888);
      border-bottom: 1px solid var(--border, #e2e8f0);
    }
    .records-table td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border, #e2e8f0);
      vertical-align: middle;
    }
    .records-table tr:last-child td { border-bottom: none; }
    .records-table tr:hover td { background: var(--hover-bg, #f8fafc); }

    .badge-me {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      letter-spacing: 0.05em;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted, #888);
      font-size: 0.9rem;
    }
    .empty-state .icon { font-size: 2.2rem; margin-bottom: 0.5rem; }

    .records-count {
      font-size: 0.78rem;
      color: var(--text-muted, #888);
      margin-bottom: 0.5rem;
    }

    .search-bar {
      position: relative;
      margin-bottom: 0.75rem;
    }
    .search-bar input {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.2rem;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 8px;
      font-size: 0.88rem;
      background: var(--input-bg, #fff);
      color: var(--text, #1e293b);
      box-sizing: border-box;
    }
    .search-bar .search-icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.2rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #16a34a; }
    .toast.error { background: #dc2626; }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      color: #ef4444;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .delete-btn:hover { opacity: 1; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>🏥 Gramin Doctor Visit</h1>
  <p style="color:var(--text-muted,#888);font-size:0.9rem;margin-top:-0.25rem;margin-bottom:1.25rem;">
    Log rural/gramin doctors visited during your field visit.
  </p>

  <!-- Entry Form -->
  <div class="page-card">
    <div class="section-title">➕ Add Doctor Record</div>
    <form id="visitForm">
      <label>Recorded By</label>
      <input id="recBy" readonly />

      <label>Doctor Name <span style="color:#ef4444">*</span></label>
      <input id="doctorName" placeholder="Dr. Ramesh Kumar" required />

      <label>Address <span style="color:#ef4444">*</span></label>
      <input id="address" placeholder="Village, Block, District" required />

      <label>Mobile Number <span style="color:#ef4444">*</span></label>
      <input id="mobile" type="tel" placeholder="10-digit mobile number" maxlength="10" pattern="[6-9][0-9]{9}" required />
      <small style="color:var(--text-muted,#888);font-size:0.75rem;">Mobile is used to detect duplicate entries across team members.</small>

      <div style="margin-top:1rem">
        <button class="btn-primary" style="width:auto" id="submitBtn">💾 Save Record</button>
      </div>
      <p class="err" id="err"></p>
    </form>
  </div>

  <!-- My Records -->
  <div class="page-card" style="margin-top:1rem">
    <div class="section-title" style="margin-top:0">📋 My Visited Doctors</div>

    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input id="searchInput" placeholder="Search by name, address, mobile…" oninput="filterRecords()" />
    </div>

    <div class="records-count" id="countLabel">Loading…</div>

    <div id="recordsContainer">
      <div class="empty-state"><div class="icon">📭</div>No records yet.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>

<script>
  BNH_PAGE.requireRole(["marketing", "manager", "admin", "other"]);

  const user = BNH_PAGE.user;
  document.getElementById('recBy').value = user.name + ' (' + user.username + ')';

  let allRecords = [];

  /* ── Toast ── */
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 2800);
  }

  /* ── Load my records ── */
  async function loadRecords() {
    const { data, error } = await BNH_PAGE.sb
      .from('gramin_doctor_visits')
      .select('*')
      .eq('recorded_by', user.username)
      .order('recorded_at', { ascending: false });

    if (error) { showToast(error.message, 'error'); return; }
    allRecords = data || [];
    renderRecords(allRecords);
  }

  function renderRecords(records) {
    const label = document.getElementById('countLabel');
    const container = document.getElementById('recordsContainer');
    label.textContent = records.length + ' record(s)';

    if (!records.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>No records found.</div>';
      return;
    }

    container.innerHTML = `
      <div style="overflow-x:auto">
      <table class="records-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Doctor Name</th>
            <th>Address</th>
            <th>Mobile</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${records.map((r, i) => `
            <tr>
              <td style="color:var(--text-muted,#888);font-size:0.8rem">${i+1}</td>
              <td><strong>${esc(r.doctor_name)}</strong></td>
              <td style="color:var(--text-muted,#888)">${esc(r.address)}</td>
              <td>${esc(r.mobile)}</td>
              <td style="font-size:0.8rem;color:var(--text-muted,#888)">${fmtDate(r.recorded_at)}</td>
              <td><button class="delete-btn" onclick="deleteRecord('${r.id}')" title="Delete">🗑</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>`;
  }

  function filterRecords() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (!q) { renderRecords(allRecords); return; }
    renderRecords(allRecords.filter(r =>
      r.doctor_name?.toLowerCase().includes(q) ||
      r.address?.toLowerCase().includes(q) ||
      r.mobile?.includes(q)
    ));
  }

  async function deleteRecord(id) {
    if (!confirm('Delete this record?')) return;
    const { error } = await BNH_PAGE.sb.from('gramin_doctor_visits').delete().eq('id', id);
    if (error) { showToast(error.message, 'error'); return; }
    showToast('Record deleted.');
    loadRecords();
  }

  /* ── Submit ── */
  document.getElementById('visitForm').onsubmit = async (e) => {
    e.preventDefault();
    document.getElementById('err').textContent = '';
    const mobile = document.getElementById('mobile').value.trim();
    if (!/^[6-9][0-9]{9}$/.test(mobile)) {
      document.getElementById('err').textContent = 'Enter a valid 10-digit mobile number.';
      return;
    }

    const spinner = document.getElementById('spinner');
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        doctor_name: document.getElementById('doctorName').value.trim(),
        address: document.getElementById('address').value.trim(),
        mobile: mobile
      });

      const { error } = await BNH_PAGE.sb.from('gramin_doctor_visits').insert(payload);
      if (error) throw error;

      showToast('Doctor record saved! ✅');
      e.target.reset();
      document.getElementById('recBy').value = user.name + ' (' + user.username + ')';
      loadRecords();
    } catch (err) {
      document.getElementById('err').textContent = err.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };

  /* ── Utils ── */
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  loadRecords();
</script>
</body>
</html>
