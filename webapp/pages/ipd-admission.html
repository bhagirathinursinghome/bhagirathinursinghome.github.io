<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admission – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:200px; }
    .hidden { display:none!important; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; font-size:.82rem; }
    td { padding:7px 8px; border-bottom:1px solid #eee; font-size:.82rem; }
    .refer-type-toggle { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.5rem; }
    .refer-type-btn { padding:0.4rem 0.9rem; border:1px solid #ccc; background:#f8f9fa; border-radius:3px; cursor:pointer; font-size:0.85rem; }
    .refer-type-btn.active { background:#007bff; color:white; border-color:#007bff; }
    .quack-info-box { background:#fff3e0; padding:0.6rem 0.9rem; border-radius:3px; border-left:3px solid #ff9800; font-size:0.85rem; margin-top:0.5rem; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>🏥 Patient Admission – IPD</h1>

  <div class="page-card">
    <form id="admForm">
      <label>Recorded By</label>
      <input id="recBy" readonly/>

      <div class="form-row">
        <div>
          <label>Admission Date <span style="color:red">*</span></label>
          <input id="admDate" type="date" required/>
        </div>
        <div>
          <label>Admission No. <span style="color:red">*</span></label>
          <input id="admNo" required placeholder="e.g. IPD-2024-001"/>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Patient Name <span style="color:red">*</span></label>
          <input id="patientName" required placeholder="Full Name"/>
        </div>
        <div>
          <label>Address</label>
          <input id="address" placeholder="Optional"/>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Case Mode <span style="color:red">*</span></label>
          <select id="caseMode" required>
            <option value="">-- Select --</option>
            <option value="Cash">Cash</option>
            <option value="Swastha Swasthy">Swastha Swasthy</option>
            <option value="Ayusman Bharat">Ayusman Bharat</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div id="caseModeOtherWrap" class="hidden">
          <label>Case Mode – Specify <span style="color:red">*</span></label>
          <input id="caseModeOther" placeholder="Please specify…"/>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Case Type <span style="color:red">*</span></label>
          <select id="caseType" required>
            <option value="">-- Select --</option>
            <option value="NH">NH</option>
            <option value="Doctor Case">Doctor Case</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div id="caseTypeOtherWrap" class="hidden">
          <label>Case Type – Specify <span style="color:red">*</span></label>
          <input id="caseTypeOther" placeholder="Please specify…"/>
        </div>
      </div>

      <!-- Refer / Doctor Source -->
      <label style="font-weight:600; margin-bottom:0.4rem; display:block;">Refer / Doctor Source</label>
      <div class="refer-type-toggle" id="referTypeToggle">
        <button type="button" class="refer-type-btn active" data-type="quack" onclick="switchAdmReferType('quack')">👨‍⚕️ Refer</button>
        <button type="button" class="refer-type-btn" data-type="none" onclick="switchAdmReferType('none')">🚫 Not Applicable</button>
      </div>

      <!-- Quack Doctor -->
      <div id="referQuackSection">
        <label>Select Refer</label>
        <select id="quackDoctor" onchange="onQuackSelect()">
          <option value="">Loading Refer…</option>
        </select>
        <div id="quackInfoBox" class="quack-info-box" style="display:none;"></div>
      </div>

      <label style="margin-top:1rem;">Remark</label>
      <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Admission</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 Recent Admissions</h2>
    <div id="admList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","reception","manager"]);
  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
  document.getElementById('admDate').value = new Date().toISOString().slice(0,10);

  let currentReferType = 'quack';
  let quackData = [];

  // Refer type toggle
  function switchAdmReferType(type) {
    currentReferType = type;
    document.querySelectorAll('#referTypeToggle .refer-type-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.type === type);
    });
    document.getElementById('referQuackSection').style.display = type === 'quack' ? '' : 'none';
    document.getElementById('quackInfoBox').style.display = 'none';
  }
  // Case mode Other toggle
  document.getElementById('caseMode').addEventListener('change', function() {
    const w = document.getElementById('caseModeOtherWrap');
    const f = document.getElementById('caseModeOther');
    if (this.value === 'Other') { w.classList.remove('hidden'); f.required = true; }
    else { w.classList.add('hidden'); f.required = false; f.value=''; }
  });

  // Case type Other toggle
  document.getElementById('caseType').addEventListener('change', function() {
    const w = document.getElementById('caseTypeOtherWrap');
    const f = document.getElementById('caseTypeOther');
    if (this.value === 'Other') { w.classList.remove('hidden'); f.required = true; }
    else { w.classList.add('hidden'); f.required = false; f.value=''; }
  });

  // Show quack doctor info
  function onQuackSelect() {
    const sel = document.getElementById('quackDoctor');
    const val = sel.value;
    const box = document.getElementById('quackInfoBox');
    if (!val) { box.style.display = 'none'; return; }
    const parts = val.split('|');
    box.style.display = 'block';
    box.innerHTML = `<strong>👨‍⚕️ ${parts[0]}</strong><br>📞 Mobile: <b>${parts[1]}</b> | 🏷️ Team: <b>${parts[2] || 'N/A'}</b>`;
  }

  // Load quack doctors from gramin_doctor_visits
  async function loadQuackDoctors() {
    const { data } = await BNH_PAGE.sb.from('gramin_doctor_visits')
      .select('doctor_name,mobile,recorded_by_name').order('doctor_name');
    if (!data) return;
    const seen = new Set();
    quackData = data.filter(d => {
      const key = d.mobile || d.doctor_name;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
    const sel = document.getElementById('quackDoctor');
    sel.innerHTML = '<option value="">-- Select Quack Doctor --</option>' +
      quackData.map(d =>
        `<option value="${d.doctor_name}|${d.mobile}|${d.recorded_by_name||''}">${d.doctor_name} — 📞 ${d.mobile} (${d.recorded_by_name||'Unknown Team'})</option>`
      ).join('');
  }

  async function loadAdmissions() {
    const div = document.getElementById('admList');
    const { data, error } = await BNH_PAGE.sb.from('ipd_admissions')
      .select('*').order('admission_date', { ascending: false }).limit(20);
    if (error || !data || data.length === 0) { div.textContent = 'No admissions yet.'; return; }
    div.innerHTML = `<table>
      <thead><tr>
        <th>Date</th><th>Adm No.</th><th>Patient</th><th>Mode</th><th>Type</th><th>Refer / Doctor</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.admission_date}</td>
        <td>${r.admission_no}</td>
        <td>${r.patient_name}</td>
        <td>${r.case_mode}${r.case_mode==='Other'?' ('+r.case_mode_other+')':''}</td>
        <td>${r.case_type}${r.case_type==='Other'?' ('+r.case_type_other+')':''}</td>
        <td>${r.refer_name||'N/A'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  loadQuackDoctors();
  loadAdmissions();

  document.getElementById('admForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';

    const caseMode = document.getElementById('caseMode').value;
    const caseType = document.getElementById('caseType').value;
    if (caseMode === 'Other' && !document.getElementById('caseModeOther').value.trim()) {
      err.textContent = 'Please specify the Case Mode.'; return;
    }
    if (caseType === 'Other' && !document.getElementById('caseTypeOther').value.trim()) {
      err.textContent = 'Please specify the Case Type.'; return;
    }

    let referId = null;
    let referNm = null;

    if (currentReferType === 'quack') {
      const qsel = document.getElementById('quackDoctor');
      const qval = qsel.value;
      if (qval) {
        const parts = qval.split('|');
        referNm = `👨‍⚕️ ${parts[0]} (📞${parts[1]}, Team: ${parts[2] || 'N/A'})`;
      }
    }

    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        admission_date:  document.getElementById('admDate').value,
        admission_no:    document.getElementById('admNo').value.trim(),
        patient_name:    document.getElementById('patientName').value.trim(),
        address:         document.getElementById('address').value.trim() || null,
        case_mode:       caseMode,
        case_mode_other: caseMode === 'Other' ? document.getElementById('caseModeOther').value.trim() : null,
        case_type:       caseType,
        case_type_other: caseType === 'Other' ? document.getElementById('caseTypeOther').value.trim() : null,
        refer_name:      referNm,
        remark:          document.getElementById('remark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('ipd_admissions').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Admission saved successfully!';
      e.target.reset();
      document.getElementById('admDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      currentReferType = 'quack';
      switchAdmReferType('quack');
      loadAdmissions();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
