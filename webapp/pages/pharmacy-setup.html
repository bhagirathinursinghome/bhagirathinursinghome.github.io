<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Setup – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:160px; }
    .section-title { font-size:1rem; font-weight:700; margin:1.2rem 0 .6rem; color:#4338ca; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>⚙️ Pharmacy Setup</h1>

  <!-- Opening Balances -->
  <div class="page-card">
    <div class="section-title">📦 Opening Balances</div>
    <form id="setupForm">
      <label>Recorded By</label>
      <input id="recBy" readonly />

      <div class="form-row">
        <div>
          <label>Opening Stock (₹)</label>
          <input id="openingStock" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div>
          <label>Opening Cash (₹)</label>
          <input id="openingCash" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Opening Bank (₹)</label>
          <input id="openingBank" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div>
          <label>Opening PhonePe (₹)</label>
          <input id="openingPhonepe" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Opening Creditor Balance (₹)</label>
          <input id="openingCreditor" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div></div>
      </div>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Opening Balances</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <!-- Fund Transfer -->
  <div class="page-card" style="margin-top:1.5rem">
    <div class="section-title">🔄 Fund Transfer</div>
    <form id="transferForm">
      <label>Recorded By</label>
      <input id="recByT" readonly />

      <div class="form-row">
        <div>
          <label>Date <span style="color:red">*</span></label>
          <input id="transferDate" type="date" required />
        </div>
        <div>
          <label>From <span style="color:red">*</span></label>
          <select id="fromAccount" required>
            <option value="">-- From --</option>
            <option value="Cash">Cash</option>
            <option value="Bank">Bank</option>
            <option value="PhonePe">PhonePe</option>
          </select>
        </div>
        <div>
          <label>To <span style="color:red">*</span></label>
          <select id="toAccount" required>
            <option value="">-- To --</option>
            <option value="Cash">Cash</option>
            <option value="Bank">Bank</option>
            <option value="PhonePe">PhonePe</option>
          </select>
        </div>
        <div>
          <label>Amount (₹) <span style="color:red">*</span></label>
          <input id="transferAmount" type="number" min="0.01" step="0.01" required />
        </div>
      </div>

      <label>Remark</label>
      <textarea id="transferRemark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">🔄 Save Transfer</button>
      </div>
      <p class="err" id="errT"></p>
      <p class="info" id="okT" style="display:none"></p>
    </form>

    <!-- Recent transfers -->
    <div style="margin-top:1rem">
      <strong style="font-size:.85rem">Recent Transfers</strong>
      <div id="transferList" style="font-size:.82rem;color:#555;margin-top:.5rem">Loading…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","manager"]);

  document.getElementById('recBy').value  = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
  document.getElementById('recByT').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
  document.getElementById('transferDate').value = new Date().toISOString().slice(0,10);

  // Load existing setup
  async function loadSetup() {
    const { data } = await BNH_PAGE.sb.from('pharmacy_setup').select('*').single();
    if (!data) return;
    document.getElementById('openingStock').value    = data.opening_stock    || 0;
    document.getElementById('openingCash').value     = data.opening_cash     || 0;
    document.getElementById('openingBank').value     = data.opening_bank     || 0;
    document.getElementById('openingPhonepe').value  = data.opening_phonepe  || 0;
    document.getElementById('openingCreditor').value = data.opening_creditor || 0;
  }
  loadSetup();

  // Save opening balances (upsert single row with id=1)
  document.getElementById('setupForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        id: 1,
        opening_stock:    parseFloat(document.getElementById('openingStock').value    || 0),
        opening_cash:     parseFloat(document.getElementById('openingCash').value     || 0),
        opening_bank:     parseFloat(document.getElementById('openingBank').value     || 0),
        opening_phonepe:  parseFloat(document.getElementById('openingPhonepe').value  || 0),
        opening_creditor: parseFloat(document.getElementById('openingCreditor').value || 0)
      });
      const { error } = await BNH_PAGE.sb.from('pharmacy_setup').upsert(payload, { onConflict: 'id' });
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Opening balances saved!';
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };

  // Load recent transfers
  async function loadTransfers() {
    const { data } = await BNH_PAGE.sb.from('pharmacy_fund_transfers')
      .select('*').order('recorded_at', { ascending: false }).limit(10);
    const div = document.getElementById('transferList');
    if (!data || !data.length) { div.textContent = 'No transfers yet.'; return; }
    div.innerHTML = `<table style="width:100%;border-collapse:collapse;margin-top:.25rem">
      <thead><tr style="background:#f0f0f0">
        <th style="padding:5px">Date</th><th style="padding:5px">From</th><th style="padding:5px">To</th>
        <th style="padding:5px;text-align:right">Amount</th><th style="padding:5px">By</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr style="border-bottom:1px solid #eee">
        <td style="padding:5px">${r.transfer_date}</td>
        <td style="padding:5px">${r.from_account}</td>
        <td style="padding:5px">${r.to_account}</td>
        <td style="padding:5px;text-align:right">₹${parseFloat(r.amount).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td style="padding:5px">${r.recorded_by_name||r.recorded_by}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  loadTransfers();

  document.getElementById('transferForm').onsubmit = async (e) => {
    e.preventDefault();
    const errT = document.getElementById('errT');
    const okT  = document.getElementById('okT');
    errT.textContent = ''; okT.style.display = 'none';
    const from = document.getElementById('fromAccount').value;
    const to   = document.getElementById('toAccount').value;
    if (from === to) { errT.textContent = 'From and To accounts cannot be the same.'; return; }

    document.getElementById('spinner').classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        transfer_date: document.getElementById('transferDate').value,
        from_account:  from,
        to_account:    to,
        amount:        parseFloat(document.getElementById('transferAmount').value),
        remark:        document.getElementById('transferRemark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('pharmacy_fund_transfers').insert(payload);
      if (error) throw error;
      okT.style.display = 'block';
      okT.textContent = '✅ Transfer recorded!';
      document.getElementById('transferForm').reset();
      document.getElementById('transferDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('recByT').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      loadTransfers();
    } catch(ex) {
      errT.textContent = ex.message;
    } finally {
      document.getElementById('spinner').classList.add('hidden');
    }
  };
</script>
</body>
</html>
