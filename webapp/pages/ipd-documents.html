<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>IPD Documents</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .tabs{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:1.2rem}
    .tab-btn{padding:.55rem 1.3rem;border:none;background:none;cursor:pointer;font-size:.93rem;font-weight:600;color:#777;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
    .tab-btn.active{color:#1a6fc1;border-bottom-color:#1a6fc1}
    .tab-panel{display:none}.tab-panel.active{display:block}
    .count-pill{display:inline-block;border-radius:10px;padding:.05rem .5rem;font-size:.72rem;margin-left:.35rem;vertical-align:middle;font-weight:700}
    .pill-orange{background:#ff9800;color:#fff}.pill-green{background:#43a047;color:#fff}
    .patient-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.9rem}
    .patient-card{background:#fff;border:1px solid #e3e8f0;border-radius:8px;padding:.85rem 1rem;cursor:pointer;transition:box-shadow .15s,border-color .15s}
    .patient-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.11);border-color:#1a6fc1}
    .pname{font-weight:700;font-size:.95rem;color:#1a2a3a}
    .pmeta{font-size:.78rem;color:#666;margin-top:.22rem;line-height:1.6}
    .badge{display:inline-block;font-size:.7rem;padding:.18rem .55rem;border-radius:10px;margin-top:.45rem}
    .badge-pending{background:#fff3e0;color:#e65100;border:1px solid #ffcc80}
    .badge-complete{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
    .doc-tally{font-size:.74rem;color:#666;margin-top:.35rem}
    .dot-row{display:flex;gap:.3rem;align-items:center;margin-top:.4rem;flex-wrap:wrap}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dot-filled{background:#43a047}.dot-empty{background:#e0e0e0;border:1px solid #bbb}
    .dot-label{font-size:.7rem;color:#666;margin-right:.4rem}
    .search-wrap{position:relative;margin-bottom:1rem}
    .search-wrap input{width:100%;padding:.5rem .85rem .5rem 2.2rem;border:1px solid #ccc;border-radius:5px;font-size:.9rem;box-sizing:border-box}
    .search-ico{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none}

    /* ── Modal base ── */
    .ipd-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:1rem}
    .ipd-modal-overlay.open{display:flex}
    .ipd-modal{background:#fff;border-radius:14px;width:min(760px,97vw);max-height:92vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.28);display:flex;flex-direction:column}
    .ipd-modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:1.2rem 1.5rem .9rem;background:linear-gradient(135deg,#1a6fc1 0%,#1557a0 100%);border-radius:14px 14px 0 0;flex-shrink:0}
    .ipd-modal-hdr h2{margin:0;font-size:1.12rem;color:#fff;font-weight:700}
    .modal-patient-meta{font-size:.78rem;color:rgba(255,255,255,.82);margin:.3rem 0 0;display:flex;flex-wrap:wrap;gap:.5rem .9rem}
    .modal-patient-meta span{display:flex;align-items:center;gap:.25rem}
    .ipd-modal-close{background:rgba(255,255,255,.18);border:none;font-size:1.1rem;cursor:pointer;color:#fff;line-height:1;padding:.35rem .5rem;border-radius:6px;flex-shrink:0;transition:.15s}
    .ipd-modal-close:hover{background:rgba(255,255,255,.32)}
    .ipd-modal-body{padding:1.1rem 1.5rem 1.4rem;flex:1}
    .completion-strip{display:flex;gap:1.2rem;align-items:center;background:#f8f9fb;border-radius:6px;padding:.55rem .85rem;margin:.6rem 0 1rem;flex-wrap:wrap}
    .cs-item{display:flex;align-items:center;gap:.35rem;font-size:.8rem;color:#444}
    .cs-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

    /* ── Upload row boxes in patient modal ── */
    .upload-row-box{border:1px solid #e3eaf5;border-radius:7px;padding:.75rem 1rem;margin-bottom:.6rem;background:#fafcff}
    .upload-section-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem}
    .sec-label{display:flex;align-items:center;gap:.35rem;font-size:.82rem;font-weight:700;color:#2c3e50}
    .btn-open-upload{padding:.28rem .75rem;background:#1a6fc1;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.78rem;font-weight:600}
    .btn-open-upload:hover{background:#155fa0}
    .btn-open-upload:disabled{background:#bbb;cursor:not-allowed}

    /* ── Doc mini list ── */
    .doc-item{display:flex;align-items:center;gap:.4rem;padding:.42rem .3rem;border-bottom:1px solid #f2f2f2;font-size:.82rem}
    .doc-item:last-child{border-bottom:none}
    .type-pill{font-size:.68rem;padding:.14rem .42rem;border-radius:8px;white-space:nowrap;flex-shrink:0;font-weight:600}
    .tp-admission{background:#e3f2fd;color:#0d47a1}
    .tp-report{background:#f3e5f5;color:#6a1b9a}
    .tp-consent{background:#e8f5e9;color:#1b5e20}
    .doc-name-btn{flex:1;background:none;border:none;cursor:pointer;color:#1a6fc1;font-size:.82rem;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0}
    .doc-name-btn:hover{text-decoration:underline}
    .doc-by{font-size:.73rem;color:#999;white-space:nowrap}
    .doc-date{font-size:.73rem;color:#aaa;white-space:nowrap}
    .btn-dl{text-decoration:none;font-size:.78rem;padding:.18rem .5rem;background:#e8f0fe;color:#1a6fc1;border-radius:4px;white-space:nowrap}
    .btn-dl:hover{background:#c8d8fc}
    .btn-del{background:none;border:none;cursor:pointer;color:#c62828;font-size:.95rem;padding:.1rem .25rem;flex-shrink:0}
    .btn-del:hover{background:#ffebee;border-radius:4px}

    /* ── Upload popup ── */
    .upload-popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:2000;align-items:center;justify-content:center}
    .upload-popup-overlay.open{display:flex}
    .upload-popup{background:#fff;border-radius:12px;width:min(500px,96vw);box-shadow:0 14px 50px rgba(0,0,0,.3);overflow:hidden}
    .up-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.3rem;border-bottom:1px solid #eee;background:#f4f7fc}
    .up-header h3{margin:0;font-size:1rem;color:#1a2a3a}
    .up-body{padding:1.3rem 1.4rem}
    .up-field{margin-bottom:1rem}
    .up-field label{display:block;font-size:.81rem;font-weight:600;color:#444;margin-bottom:.35rem}
    .up-field input[type=file]{display:block;width:100%;box-sizing:border-box;border:2px dashed #b0c4de;border-radius:7px;padding:.6rem .8rem;background:#f8fbff;font-size:.84rem;cursor:pointer;transition:border-color .15s}
    .up-field input[type=file]:hover{border-color:#1a6fc1}
    .up-field input[type=text]{width:100%;box-sizing:border-box;padding:.42rem .7rem;border:1px solid #ccc;border-radius:5px;font-size:.86rem}
    .up-hint{font-size:.75rem;color:#888;margin-top:.3rem}
    .up-locked-note{background:#fff3e0;border:1px solid #ffcc80;border-radius:6px;padding:.55rem .8rem;font-size:.8rem;color:#e65100;margin-bottom:.8rem}
    .up-footer{display:flex;justify-content:flex-end;gap:.6rem;padding:.9rem 1.3rem;border-top:1px solid #eee;background:#fafafa}
    .btn-cancel{padding:.42rem 1rem;border:1px solid #ccc;background:#fff;border-radius:5px;cursor:pointer;font-size:.85rem;color:#555}
    .btn-cancel:hover{background:#f5f5f5}
    .btn-upload-go{padding:.42rem 1.1rem;background:#1a6fc1;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:.85rem;font-weight:600}
    .btn-upload-go:hover:not(:disabled){background:#155fa0}
    .btn-upload-go:disabled{background:#90b8e0;cursor:not-allowed}
    .prog-wrap{margin-top:.65rem}
    .prog-bar-bg{background:#e0e7f0;border-radius:4px;height:7px}
    .prog-bar-fill{background:#1a6fc1;height:7px;border-radius:4px;width:0%;transition:width .3s}
    .prog-status{font-size:.78rem;color:#555;margin-top:.35rem;padding:.3rem .6rem;background:#fffde7;border:1px solid #ffe082;border-radius:4px;display:flex;align-items:center;gap:.4rem}
    .spin-sm{display:inline-block;width:13px;height:13px;border:2px solid #ddd;border-top-color:#1a6fc1;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── View popup ── */
    .view-popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:3000;align-items:center;justify-content:center}
    .view-popup-overlay.open{display:flex}
    .view-popup{background:#fff;border-radius:12px;width:min(860px,97vw);height:min(90vh,700px);display:flex;flex-direction:column;box-shadow:0 14px 55px rgba(0,0,0,.35);overflow:hidden}
    .vp-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.1rem;border-bottom:1px solid #eee;background:#f4f7fc;flex-shrink:0;gap:.6rem}
    .vp-header h3{margin:0;font-size:.95rem;color:#1a2a3a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .vp-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .vp-dl{text-decoration:none;font-size:.8rem;padding:.28rem .75rem;background:#1a6fc1;color:#fff;border-radius:5px;white-space:nowrap}
    .vp-dl:hover{background:#155fa0}
    .vp-body{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#e8e8e8}
    .vp-body iframe{width:100%;height:100%;border:none}
    .vp-body img{max-width:100%;max-height:100%;object-fit:contain;display:block}
    .vp-fallback{text-align:center;padding:2.5rem;background:#fff;border-radius:8px}
    .vp-fallback p{color:#666;margin-bottom:1.2rem;font-size:.9rem}

    /* ── Misc ── */
    .empty-msg{text-align:center;color:#bbb;padding:2.5rem 1rem;font-size:.9rem}
    .divider{border:none;border-top:1px solid #eee;margin:1rem 0}
    .hidden{display:none!important}
    .page-loading{text-align:center;padding:3rem 1rem;color:#888;font-size:.92rem}
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<iframe id="gasFrame" name="gasFrame" style="display:none"></iframe>

<div class="page">
  <h1>📁 IPD Patient Documents</h1>
  <div class="page-card">
    <div class="tabs">
      <button class="tab-btn active" id="tabBtnPending" onclick="switchTab('pending')">
        ⏳ Pending <span class="count-pill pill-orange" id="pendingCount">…</span>
      </button>
      <button class="tab-btn" id="tabBtnComplete" onclick="switchTab('complete')">
        ✅ Complete <span class="count-pill pill-green" id="completeCount">…</span>
      </button>
    </div>
    <div id="tab-pending" class="tab-panel active">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input id="pendingSearch" placeholder="Search patient name or admission no…" oninput="renderPending()"/>
      </div>
      <div id="pendingGrid" class="patient-grid"><div class="page-loading">Loading admissions…</div></div>
    </div>
    <div id="tab-complete" class="tab-panel">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input id="completeSearch" placeholder="Search patient name or admission no…" oninput="renderComplete()"/>
      </div>
      <div id="completeGrid" class="patient-grid"><div class="page-loading">Loading…</div></div>
    </div>
  </div>
</div>

<!-- PATIENT MODAL -->
<div class="ipd-modal-overlay" id="patientModal">
  <div class="ipd-modal">
    <div class="ipd-modal-hdr">
      <div style="flex:1;min-width:0">
        <h2 id="modalTitle">Patient Documents</h2>
        <div class="modal-patient-meta" id="modalMeta"></div>
      </div>
      <button class="ipd-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="ipd-modal-body">
    <div class="completion-strip" id="completionStrip"></div>
    <hr class="divider"/>

    <div class="upload-row-box">
      <div class="upload-section-hdr">
        <span class="sec-label">
          <span class="type-pill tp-admission">📋 Admission Form</span>
          <span style="font-size:.75rem;color:#888;font-weight:400;">(1 file · required)</span>
        </span>
        <button class="btn-open-upload" id="btnOpenAdmission" onclick="openUploadPopup('admission')">⬆ Upload</button>
      </div>
      <div id="admissionDocsMini" style="margin-top:.4rem;"></div>
    </div>

    <div class="upload-row-box">
      <div class="upload-section-hdr">
        <span class="sec-label">
          <span class="type-pill tp-report">🔬 Reports</span>
          <span style="font-size:.75rem;color:#888;font-weight:400;">(multiple allowed)</span>
        </span>
        <button class="btn-open-upload" id="btnOpenReport" onclick="openUploadPopup('report')">⬆ Upload</button>
      </div>
      <div id="reportDocsMini" style="margin-top:.4rem;"></div>
    </div>

    <div class="upload-row-box">
      <div class="upload-section-hdr">
        <span class="sec-label">
          <span class="type-pill tp-consent">✍️ Consent Forms</span>
          <span style="font-size:.75rem;color:#888;font-weight:400;">(multiple allowed)</span>
        </span>
        <button class="btn-open-upload" id="btnOpenConsent" onclick="openUploadPopup('consent')">⬆ Upload</button>
      </div>
      <div id="consentDocsMini" style="margin-top:.4rem;"></div>
    </div>

    <p class="err" id="modalErr" style="margin-top:.7rem;"></p>
    <p class="info" id="modalOk" style="display:none;margin-top:.7rem;"></p>
    </div><!-- /ipd-modal-body -->
  </div>
</div>

<!-- UPLOAD POPUP -->
<div class="upload-popup-overlay" id="uploadPopup">
  <div class="upload-popup">
    <div class="up-header">
      <h3 id="upPopupTitle">Upload Document</h3>
      <button class="ipd-modal-close" onclick="closeUploadPopup()">✕</button>
    </div>
    <div class="up-body">
      <div id="upLockedNote" class="up-locked-note hidden"></div>
      <div class="up-field">
        <label id="upFileLabel">Select file(s)</label>
        <input type="file" id="upFileInput" accept=".pdf,.jpg,.jpeg,.png"/>
        <div class="up-hint" id="upFileHint"></div>
      </div>
      <div class="up-field">
        <label>Label <span style="font-weight:400;color:#999;">(optional)</span></label>
        <input type="text" id="upLabelInput" placeholder="e.g. Blood Test, Surgery Consent…"/>
      </div>
      <div id="upProg" class="prog-wrap hidden">
        <div class="prog-bar-bg"><div class="prog-bar-fill" id="upProgBar"></div></div>
        <div class="prog-status" id="upProgStatus"></div>
      </div>
      <p class="err" id="upErr" style="margin-top:.5rem;font-size:.82rem;"></p>
    </div>
    <div class="up-footer">
      <button class="btn-cancel" onclick="closeUploadPopup()">Cancel</button>
      <button class="btn-upload-go" id="upSubmitBtn" onclick="doUpload()">⬆ Upload</button>
    </div>
  </div>
</div>

<!-- VIEW POPUP -->
<div class="view-popup-overlay" id="viewPopup">
  <div class="view-popup">
    <div class="vp-header">
      <h3 id="vpTitle">Document</h3>
      <div class="vp-actions">
        <a class="vp-dl" id="vpDownload" href="#" target="_blank">⬇ Download</a>
        <button class="ipd-modal-close" onclick="closeViewPopup()">✕</button>
      </div>
    </div>
    <div class="vp-body" id="vpBody">
      <div class="vp-fallback"><p>Loading…</p></div>
    </div>
  </div>
</div>

<!-- Hidden GAS form -->
<form id="gasForm" method="POST" target="gasFrame" style="display:none">
  <input name="action"     id="gAction"/>
  <input name="token"      id="gToken"/>
  <input name="folderId"   id="gFolderId"/>
  <input name="folderPath" id="gFolderPath"/>
  <input name="fileName"   id="gFileName"/>
  <input name="mimeType"   id="gMimeType"/>
  <input name="base64Data" id="gBase64"/>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyT-B0mfZLBJ5cHijlKmD_oYhXgVeVQyM5QTVkH9zIT3r8dwRXYucxSSsdB8w5eAiY/exec";
const DRIVE_FOLDER_ID = "1RCIR1QXik7t9vnCIJ_zmjIVQtDdtMsM7";

/* ─── RBAC ─── */
const FULL_ACCESS_ROLES    = ["admin"];
const LIMITED_ACCESS_ROLES = ["accountant","manager"];

BNH_PAGE.requireRole([...FULL_ACCESS_ROLES, ...LIMITED_ACCESS_ROLES, "reception"]);

const userRole  = BNH_PAGE.user.role;
const isAdmin   = FULL_ACCESS_ROLES.includes(userRole);
const canUpload = [...FULL_ACCESS_ROLES, ...LIMITED_ACCESS_ROLES].includes(userRole);

/* ─── State ─── */
let allAdmissions  = [];
let allDocs        = [];
let currentPatient = null;
let currentUpType  = null;

/* ─── GAS bridge ─── */
function gasFormUpload(p) {
  document.getElementById('gasForm').action    = APPS_SCRIPT_URL;
  document.getElementById('gAction').value     = 'uploadFile';
  document.getElementById('gToken').value      = p.token;
  document.getElementById('gFolderId').value   = p.folderId;
  document.getElementById('gFolderPath').value = p.folderPath;
  document.getElementById('gFileName').value   = p.fileName;
  document.getElementById('gMimeType').value   = p.mimeType;
  document.getElementById('gBase64').value     = p.base64Data;
  document.getElementById('gasForm').submit();
}
async function gasPoll(token, onStatus) {
  const url = APPS_SCRIPT_URL + '?action=poll&token=' + encodeURIComponent(token);
  for (let i=0; i<40; i++) {
    await sleep(1500);
    onStatus('Saving to Drive… (' + (i+1) + 's)');
    try {
      const r = await fetch(url); const d = await r.json();
      if (d.ready && d.success)  return d;
      if (d.ready && !d.success) throw new Error(d.error || 'Drive upload failed.');
    } catch(ex) { if (ex.message.includes('Drive upload failed')) throw ex; }
  }
  throw new Error('Timed out. Check Drive and retry.');
}
async function gasDelete(fileId) {
  const r = await fetch(APPS_SCRIPT_URL + '?action=deleteFile&fileId=' + encodeURIComponent(fileId));
  return r.json();
}
function sleep(ms)   { return new Promise(r => setTimeout(r,ms)); }
function randToken() { return Math.random().toString(36).slice(2) + Date.now(); }

/* ─── Tabs ─── */
function switchTab(tab) {
  ['pending','complete'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('tabBtn'+t[0].toUpperCase()+t.slice(1)).classList.toggle('active', t===tab);
  });
}

/* ─── Load ─── */
async function loadAll() {
  const [admRes,docRes] = await Promise.all([
    BNH_PAGE.sb.from('ipd_admissions').select('id,admission_no,patient_name,admission_date,case_mode,case_type').order('admission_date',{ascending:false}),
    BNH_PAGE.sb.from('ipd_documents').select('*').order('uploaded_at',{ascending:false})
  ]);
  allAdmissions = admRes.data || [];
  allDocs       = docRes.data || [];
  renderPending(); renderComplete(); updateCounts();
}
function updateCounts() {
  document.getElementById('pendingCount').textContent  = allAdmissions.filter(a=>!isComplete(a)).length;
  document.getElementById('completeCount').textContent = allAdmissions.filter(a=> isComplete(a)).length;
}
function isComplete(adm) { return allDocs.some(d=>d.admission_id===adm.id&&d.doc_type==='admission'); }
function docsFor(admId)  { return allDocs.filter(d=>d.admission_id===admId); }

/* ─── Cards ─── */
function makeCard(adm) {
  const docs=docsFor(adm.id);
  const aCnt=docs.filter(d=>d.doc_type==='admission').length;
  const rCnt=docs.filter(d=>d.doc_type==='report').length;
  const cCnt=docs.filter(d=>d.doc_type==='consent').length;
  const done=isComplete(adm);
  const dots=[{label:'Adm Form',filled:aCnt>0},{label:'Report',filled:rCnt>0},{label:'Consent',filled:cCnt>0}];
  return `<div class="patient-card" onclick="openPatient('${adm.id}')">
    <div class="pname">👤 ${esc(adm.patient_name)}</div>
    <div class="pmeta">📋 ${esc(adm.admission_no)}<br>📅 ${adm.admission_date} &nbsp;|&nbsp; 💊 ${esc(adm.case_mode)}</div>
    <span class="badge ${done?'badge-complete':'badge-pending'}">${done?'✅ Complete':'⏳ Admission Form Pending'}</span>
    <div class="dot-row">${dots.map(d=>`<span class="dot ${d.filled?'dot-filled':'dot-empty'}" title="${d.label}"></span><span class="dot-label">${d.label}</span>`).join('')}</div>
    <div class="doc-tally">📋 ${aCnt} &nbsp; 🔬 ${rCnt} &nbsp; ✍️ ${cCnt}</div>
  </div>`;
}
function renderPending() {
  const q=norm(document.getElementById('pendingSearch').value);
  const list=allAdmissions.filter(a=>!isComplete(a)&&matchAdm(a,q));
  document.getElementById('pendingGrid').innerHTML=list.length?list.map(makeCard).join(''):'<div class="empty-msg">🎉 No pending patients!</div>';
}
function renderComplete() {
  const q=norm(document.getElementById('completeSearch').value);
  const list=allAdmissions.filter(a=>isComplete(a)&&matchAdm(a,q));
  document.getElementById('completeGrid').innerHTML=list.length?list.map(makeCard).join(''):'<div class="empty-msg">No completed patients yet.</div>';
}
function matchAdm(adm,q) { if(!q)return true; return norm(adm.patient_name).includes(q)||norm(adm.admission_no).includes(q); }

/* ─── Patient modal ─── */
function openPatient(admId) {
  currentPatient=allAdmissions.find(a=>a.id===admId);
  if(!currentPatient) return;
  clearStatus();
  document.getElementById('modalTitle').textContent='📁 '+currentPatient.patient_name;
  const metaParts=[
    '📋 '+currentPatient.admission_no,
    '📅 '+currentPatient.admission_date,
    '💊 '+currentPatient.case_mode,
    ...(currentPatient.case_type?['🏷️ '+currentPatient.case_type]:[])
  ];
  document.getElementById('modalMeta').innerHTML=metaParts.map(p=>`<span>${esc(p)}</span>`).join('');
  document.getElementById('patientModal').classList.add('open');
  refreshUploadButtons();
  renderCompletionStrip();
  renderModalDocs();
}
function closeModal() {
  document.getElementById('patientModal').classList.remove('open');
  currentPatient=null;
}

function refreshUploadButtons() {
  const hasAdm=docsFor(currentPatient.id).some(d=>d.doc_type==='admission');
  const btnAdm=document.getElementById('btnOpenAdmission');
  // Hide all upload buttons if no upload permission
  ['btnOpenAdmission','btnOpenReport','btnOpenConsent'].forEach(id=>{
    const b=document.getElementById(id);
    b.style.display=canUpload?'':'none';
  });
  if(canUpload) {
    if(hasAdm && !isAdmin) {
      btnAdm.disabled=true;
      btnAdm.title='Admission form already uploaded. Admin only can replace.';
    } else {
      btnAdm.disabled=false;
      btnAdm.title=hasAdm?'Admin: will add another admission file':'';
    }
  }
}

/* ─── Completion strip ─── */
function renderCompletionStrip() {
  const docs=docsFor(currentPatient.id);
  const items=[
    {label:'Admission Form',icon:'📋',filled:docs.some(d=>d.doc_type==='admission')},
    {label:'Report',icon:'🔬',filled:docs.some(d=>d.doc_type==='report')},
    {label:'Consent Form',icon:'✍️',filled:docs.some(d=>d.doc_type==='consent')},
  ];
  document.getElementById('completionStrip').innerHTML=items.map(it=>`
    <div class="cs-item">
      <span class="cs-dot" style="background:${it.filled?'#43a047':'#ddd'};${it.filled?'':'border:1px solid #bbb'}"></span>
      ${it.icon} ${it.label}${it.filled?' ✓':''}
    </div>`).join('');
}

/* ─── Doc mini list ─── */
function renderModalDocs() {
  const docs=docsFor(currentPatient.id);
  const sections=[
    {type:'admission',containerId:'admissionDocsMini',pill:'tp-admission'},
    {type:'report',   containerId:'reportDocsMini',   pill:'tp-report'},
    {type:'consent',  containerId:'consentDocsMini',  pill:'tp-consent'},
  ];
  sections.forEach(sec=>{
    const items=docs.filter(d=>d.doc_type===sec.type);
    const c=document.getElementById(sec.containerId);
    if(!items.length){
      c.innerHTML='<div style="font-size:.78rem;color:#bbb;padding:.2rem 0;">No files uploaded yet.</div>';
      return;
    }
    c.innerHTML=items.map(doc=>{
      const date=(doc.uploaded_at||'').slice(0,10);
      const by=esc(doc.recorded_by_name||doc.recorded_by||'—');
      const name=esc(doc.label||doc.file_name);
      const safeDoc=JSON.stringify({id:doc.id,label:doc.label,file_name:doc.file_name,drive_view_url:doc.drive_view_url,drive_download_url:doc.drive_download_url,drive_file_id:doc.drive_file_id});
      const delBtn=isAdmin
        ?`<button class="btn-del" title="Delete (admin only)" onclick='deleteDoc(${JSON.stringify(doc.id)},${JSON.stringify(doc.drive_file_id)})'>🗑</button>`
        :'';
      return `<div class="doc-item">
        <button class="doc-name-btn" onclick='openViewPopup(${safeDoc})'>📄 ${name}</button>
        <span class="doc-by">👤 ${by}</span>
        <span class="doc-date">${date}</span>
        <a class="btn-dl" href="${esc(doc.drive_download_url)}" target="_blank" title="Download">⬇</a>
        ${delBtn}
      </div>`;
    }).join('');
  });
}

/* ─── Upload popup ─── */
const TYPE_META={
  admission:{title:'Upload Admission Form',hint:'PDF, JPG or PNG · max 15 MB · 1 file only',multiple:false},
  report:   {title:'Upload Report',        hint:'PDF, JPG or PNG · max 15 MB · multiple OK', multiple:true},
  consent:  {title:'Upload Consent Form',  hint:'PDF, JPG or PNG · max 15 MB · multiple OK', multiple:true},
};

function openUploadPopup(type) {
  if(!canUpload){showErr('You do not have permission to upload documents.');return;}
  currentUpType=type;
  const meta=TYPE_META[type];
  const hasAdm=type==='admission'&&docsFor(currentPatient.id).some(d=>d.doc_type==='admission');
  const lockNote=document.getElementById('upLockedNote');
  const submitBtn=document.getElementById('upSubmitBtn');
  const fileInp=document.getElementById('upFileInput');

  if(hasAdm&&!isAdmin){
    lockNote.textContent='🔒 Admission form already uploaded. Only admin can delete and replace it.';
    lockNote.classList.remove('hidden');
    submitBtn.disabled=true; fileInp.disabled=true;
  } else if(hasAdm&&isAdmin){
    lockNote.textContent='⚠️ Admin: uploading will add another admission file. Delete the existing one below if replacing.';
    lockNote.classList.remove('hidden');
    submitBtn.disabled=false; fileInp.disabled=false;
  } else {
    lockNote.classList.add('hidden');
    submitBtn.disabled=false; fileInp.disabled=false;
  }

  document.getElementById('upPopupTitle').textContent=meta.title;
  document.getElementById('upFileLabel').textContent=meta.multiple?'Select file(s)':'Select file';
  document.getElementById('upFileHint').textContent=meta.hint;
  document.getElementById('upFileInput').multiple=meta.multiple;
  document.getElementById('upFileInput').value='';
  document.getElementById('upLabelInput').value='';
  document.getElementById('upErr').textContent='';
  document.getElementById('upProg').classList.add('hidden');
  document.getElementById('upProgBar').style.width='0%';
  document.getElementById('upProgStatus').innerHTML='';
  document.getElementById('uploadPopup').classList.add('open');
}
function closeUploadPopup() {
  document.getElementById('uploadPopup').classList.remove('open');
  currentUpType=null;
}

/* ─── Upload flow ─── */
const MAX_MB=15;
async function doUpload() {
  const type=currentUpType;
  if(!type||!currentPatient) return;
  const finp=document.getElementById('upFileInput');
  const linp=document.getElementById('upLabelInput');
  const progW=document.getElementById('upProg');
  const progB=document.getElementById('upProgBar');
  const progS=document.getElementById('upProgStatus');
  const btn=document.getElementById('upSubmitBtn');
  const errEl=document.getElementById('upErr');
  const files=finp.files;
  errEl.textContent='';

  if(!files||!files.length){errEl.textContent='⚠️ Please select a file first.';return;}
  for(const f of files){
    if(f.size>MAX_MB*1024*1024){errEl.textContent=`⚠️ "${f.name}" exceeds ${MAX_MB} MB.`;return;}
  }
  if(type==='admission'&&files.length>1){errEl.textContent='⚠️ Only 1 file allowed for Admission Form.';return;}

  btn.disabled=true;
  progW.classList.remove('hidden');
  const total=files.length;

  for(let i=0;i<total;i++){
    const file=files[i];
    const label=linp.value.trim()||file.name.replace(/\.[^/.]+$/,'');
    progB.style.width=Math.round((i/total)*100)+'%';
    progS.innerHTML=`<span class="spin-sm"></span> (${i+1}/${total}) Encoding ${esc(file.name)}…`;
    try {
      const base64=await toBase64(file);
      const token=randToken();
      const safeName=currentPatient.patient_name.replace(/[\/\\:*?"<>|]/g,'_');
      const safeNo=currentPatient.admission_no.replace(/[\/\\:*?"<>|]/g,'-');
      const folderPath=`${safeNo}_${safeName}/${type}`;
      progS.innerHTML=`<span class="spin-sm"></span> (${i+1}/${total}) Uploading to Drive…`;
      gasFormUpload({token,folderId:DRIVE_FOLDER_ID,folderPath,fileName:file.name,mimeType:file.type||'application/octet-stream',base64Data:base64});
      const result=await gasPoll(token,(msg)=>{progS.innerHTML=`<span class="spin-sm"></span> (${i+1}/${total}) ${msg}`;});
      progS.innerHTML=`<span class="spin-sm"></span> Saving record…`;
      const {error:dbErr}=await BNH_PAGE.sb.from('ipd_documents').insert(BNH_PAGE.stamp({
        admission_id:currentPatient.id,admission_no:currentPatient.admission_no,
        patient_name:currentPatient.patient_name,doc_type:type,label,
        file_name:file.name,file_size_bytes:file.size,
        drive_file_id:result.fileId,drive_view_url:result.viewUrl,drive_download_url:result.downloadUrl,
        uploaded_at:new Date().toISOString()
      }));
      if(dbErr) throw dbErr;
    } catch(ex){
      errEl.textContent='⚠️ Error on "'+file.name+'": '+ex.message;
      btn.disabled=false; return;
    }
    progB.style.width=Math.round(((i+1)/total)*100)+'%';
  }

  progS.textContent='✅ Upload complete!';
  btn.disabled=false;
  await refreshDocs();
  showOk(total+' file'+(total>1?'s':'')+' uploaded successfully!');
  setTimeout(()=>{progW.classList.add('hidden');progB.style.width='0%';closeUploadPopup();},1600);
}

/* ─── View popup ─── */
function openViewPopup(doc) {
  const title=doc.label||doc.file_name||'Document';
  const viewUrl=doc.drive_view_url||'';
  const dlUrl=doc.drive_download_url||'';
  const isImage=/\.(jpg|jpeg|png|gif|webp)$/i.test(doc.file_name||'');
  document.getElementById('vpTitle').textContent='📄 '+title;
  document.getElementById('vpDownload').href=dlUrl;
  const body=document.getElementById('vpBody');
  if(isImage){
    body.innerHTML=`<img src="${esc(viewUrl)}" alt="${esc(title)}" onerror="this.outerHTML='<div class=vp-fallback><p>Could not load image preview.</p><a class=vp-dl href=\\'${esc(dlUrl)}\\' target=\\'_blank\\'>⬇ Download to view</a></div>'" />`;
  } else {
    const embedUrl=viewUrl?viewUrl.replace('/view','/preview'):'';
    body.innerHTML=embedUrl
      ?`<iframe src="${esc(embedUrl)}" allowfullscreen></iframe>`
      :`<div class="vp-fallback"><p>Preview not available for this file type.</p><a class="vp-dl" href="${esc(dlUrl)}" target="_blank">⬇ Download to view</a></div>`;
  }
  document.getElementById('viewPopup').classList.add('open');
}
function closeViewPopup() {
  document.getElementById('viewPopup').classList.remove('open');
  document.getElementById('vpBody').innerHTML='<div class="vp-fallback"><p>Loading…</p></div>';
}

/* ─── Delete (admin / FULL_ACCESS only) ─── */
async function deleteDoc(docId, driveFileId) {
  if(!isAdmin){showErr('Only admins can delete documents.');return;}
  if(!confirm('Permanently delete this document?\nIt will be removed from Drive and the database.\nThis cannot be undone.')) return;
  document.getElementById('spinner').classList.remove('hidden');
  try {
    if(driveFileId) await gasDelete(driveFileId);
    const {error}=await BNH_PAGE.sb.from('ipd_documents').delete().eq('id',docId);
    if(error) throw error;
    await refreshDocs();
    showOk('Document deleted.');
  } catch(ex){showErr('Delete failed: '+ex.message);}
  finally{document.getElementById('spinner').classList.add('hidden');}
}

/* ─── Refresh ─── */
async function refreshDocs() {
  const {data}=await BNH_PAGE.sb.from('ipd_documents').select('*').order('uploaded_at',{ascending:false});
  allDocs=data||[];
  if(currentPatient){refreshUploadButtons();renderCompletionStrip();renderModalDocs();}
  renderPending();renderComplete();updateCounts();
}

/* ─── Helpers ─── */
function toBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
function norm(s){return(s||'').toLowerCase().trim();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showErr(msg){const el=document.getElementById('modalErr');el.textContent='⚠️ '+msg;document.getElementById('modalOk').style.display='none';el.scrollIntoView({behavior:'smooth',block:'nearest'});}
function showOk(msg){const el=document.getElementById('modalOk');el.textContent='✅ '+msg;el.style.display='block';document.getElementById('modalErr').textContent='';setTimeout(()=>{el.style.display='none';},4500);}
function clearStatus(){document.getElementById('modalErr').textContent='';document.getElementById('modalOk').style.display='none';}

/* ─── Backdrop close ─── */
document.getElementById('patientModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('uploadPopup').addEventListener('click',function(e){if(e.target===this)closeUploadPopup();});
document.getElementById('viewPopup').addEventListener('click',function(e){if(e.target===this)closeViewPopup();});

loadAll();
</script>
