<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sale Add – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:180px; }
    .mode-row { display:flex; gap:1rem; flex-wrap:wrap; margin-top:.5rem; }
    .mode-row > * { flex:1; min-width:130px; }
    .mode-title { font-size:.85rem; font-weight:700; color:#312e81; margin:.75rem 0 .25rem; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; font-size:.82rem; }
    td { padding:7px 8px; border-bottom:1px solid #eee; font-size:.82rem; }
    .r { text-align:right; }
    .info-note { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px;
                 padding:.6rem .9rem; font-size:.82rem; margin-bottom:.75rem; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>💊 Dispensary Sale Add</h1>
  <div class="info-note">All sales here are <strong>Dispensary sales</strong>.
    For IPD medicine, use the IPD Medicine Sale page.</div>

  <div class="page-card">
    <form id="saleForm">
      <label>Recorded By</label>
      <input id="recBy" readonly/>

      <div class="form-row">
        <div>
          <label>Date <span style="color:red">*</span></label>
          <input id="saleDate" type="date" required/>
        </div>
        <div>
          <label>Customer Name</label>
          <input id="customerName" placeholder="Optional"/>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Cost Price (₹) <span style="color:red">*</span></label>
          <input id="costPrice" type="number" min="0" step="0.01" required placeholder="0.00"/>
        </div>
        <div>
          <label>Sale Price (₹) <span style="color:red">*</span></label>
          <input id="salePrice" type="number" min="0" step="0.01" required placeholder="0.00"
            oninput="updateModeSplit()"/>
        </div>
      </div>

      <div class="mode-title">💳 Payment Mode Split <span style="color:red">*</span></div>
      <p style="font-size:.78rem;color:#6b7280;margin:0 0 .5rem">
        Enter amounts per mode. Total must equal Sale Price.</p>
      <div class="mode-row">
        <div>
          <label>Cash (₹)</label>
          <input id="modeCash" type="number" min="0" step="0.01" value="0" oninput="checkSplit()"/>
        </div>
        <div>
          <label>Bank (₹)</label>
          <input id="modeBank" type="number" min="0" step="0.01" value="0" oninput="checkSplit()"/>
        </div>
        <div>
          <label>PhonePe (₹)</label>
          <input id="modePP" type="number" min="0" step="0.01" value="0" oninput="checkSplit()"/>
        </div>
      </div>
      <p id="splitWarn" style="font-size:.8rem;color:#dc2626;margin-top:.25rem"></p>

      <label>Remark</label>
      <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Sale</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 Recent Dispensary Sales</h2>
    <div id="recentList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","pharmacy","manager"]);
  const fmt = n => '₹' + parseFloat(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});

  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
  document.getElementById('saleDate').value = new Date().toISOString().slice(0,10);

  function updateModeSplit() {
    // Auto-fill cash with full sale price for convenience
    const sale = parseFloat(document.getElementById('salePrice').value||0);
    const bank = parseFloat(document.getElementById('modeBank').value||0);
    const pp   = parseFloat(document.getElementById('modePP').value||0);
    document.getElementById('modeCash').value = Math.max(0, sale - bank - pp).toFixed(2);
    checkSplit();
  }

  function checkSplit() {
    const sale = parseFloat(document.getElementById('salePrice').value||0);
    const cash = parseFloat(document.getElementById('modeCash').value||0);
    const bank = parseFloat(document.getElementById('modeBank').value||0);
    const pp   = parseFloat(document.getElementById('modePP').value||0);
    const total = cash + bank + pp;
    const warn = document.getElementById('splitWarn');
    if (Math.abs(total - sale) > 0.01) {
      warn.textContent = `⚠ Mode split total ${fmt(total)} ≠ Sale price ${fmt(sale)}`;
    } else {
      warn.textContent = '';
    }
  }

  async function loadRecent() {
    const { data, error } = await BNH_PAGE.sb.from('pharmacy_sales')
      .select('*').eq('sale_type','Dispensary').order('recorded_at',{ascending:false}).limit(15);
    const div = document.getElementById('recentList');
    if (error || !data || data.length === 0) { div.textContent = 'No recent dispensary sales.'; return; }
    const total = data.reduce((a,r)=>a+parseFloat(r.sale_price||0),0);
    div.innerHTML = `<table>
      <thead><tr>
        <th>Date</th><th>Customer</th><th class="r">Cost</th><th class="r">Sale</th>
        <th class="r">Cash</th><th class="r">Bank</th><th class="r">PhonePe</th><th>By</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.sale_date}</td>
        <td>${r.remark||'-'}</td>
        <td class="r">${fmt(r.cost_price)}</td>
        <td class="r">${fmt(r.sale_price)}</td>
        <td class="r">${fmt(r.mode_cash)}</td>
        <td class="r">${fmt(r.mode_bank)}</td>
        <td class="r">${fmt(r.mode_phonepe)}</td>
        <td>${r.recorded_by_name||r.recorded_by}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  loadRecent();

  document.getElementById('saleForm').onsubmit = async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';

    const sale = parseFloat(document.getElementById('salePrice').value||0);
    const cash = parseFloat(document.getElementById('modeCash').value||0);
    const bank = parseFloat(document.getElementById('modeBank').value||0);
    const pp   = parseFloat(document.getElementById('modePP').value||0);
    if (Math.abs((cash+bank+pp) - sale) > 0.01) {
      err.textContent = 'Payment mode split must equal the sale price.'; return;
    }

    const spinner = document.getElementById('spinner');
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        sale_date:       document.getElementById('saleDate').value,
        sale_type:       'Dispensary',
        admission_no:    null,
        cost_price:      parseFloat(document.getElementById('costPrice').value||0),
        sale_price:      sale,
        mode_of_payment: cash>0&&bank===0&&pp===0 ? 'Cash' : bank>0&&cash===0&&pp===0 ? 'Bank' : pp>0&&cash===0&&bank===0 ? 'PhonePe' : 'Mixed',
        mode_cash:       cash,
        mode_bank:       bank,
        mode_phonepe:    pp,
        remark:          document.getElementById('customerName').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('pharmacy_sales').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Sale saved successfully!';
      e.target.reset();
      document.getElementById('saleDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      loadRecent();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
