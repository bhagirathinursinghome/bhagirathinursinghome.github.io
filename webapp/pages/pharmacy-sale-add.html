<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sale Add – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:180px; }
    .hidden { display:none!important; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>💊 Sale / Medicine Use Add</h1>

  <div class="page-card">
    <form id="saleForm">
      <label>Recorded By</label>
      <input id="recBy" readonly />

      <div class="form-row">
        <div>
          <label>Date <span style="color:red">*</span></label>
          <input id="saleDate" type="date" required />
        </div>
        <div>
          <label>Type <span style="color:red">*</span></label>
          <select id="saleType" required>
            <option value="">-- Select Type --</option>
            <option value="IPD">IPD</option>
            <option value="Dispensary">Dispensary</option>
          </select>
        </div>
      </div>

      <!-- IPD only -->
      <div id="ipdRow" class="hidden">
        <label>Admission No. <span style="color:red">*</span></label>
        <input id="admissionNo" type="text" placeholder="e.g. IPD-2024-001" />
      </div>

      <div class="form-row">
        <div>
          <label>Cost Price <span style="color:red">*</span></label>
          <input id="costPrice" type="number" min="0" step="0.01" required />
        </div>
        <div>
          <label>Sale Price <span style="color:red">*</span></label>
          <input id="salePrice" type="number" min="0" step="0.01" required />
        </div>
      </div>

      <!-- Dispensary only: Mode of Payment -->
      <div id="mopRow">
        <label>Mode of Payment <span style="color:red">*</span></label>
        <select id="modeOfPayment">
          <option value="">-- Select Mode --</option>
          <option value="Cash">Cash</option>
          <option value="Bank">Bank</option>
          <option value="PhonePe">PhonePe</option>
        </select>
      </div>

      <label>Remark</label>
      <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Sale</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 Recent Sales</h2>
    <div id="recentList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","pharmacy","manager"]);
  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
  document.getElementById('saleDate').value = new Date().toISOString().slice(0,10);

  const typeEl = document.getElementById('saleType');
  const ipdRow = document.getElementById('ipdRow');
  const mopRow = document.getElementById('mopRow');
  const admNo  = document.getElementById('admissionNo');
  const mop    = document.getElementById('modeOfPayment');

  typeEl.addEventListener('change', () => {
    if (typeEl.value === 'IPD') {
      ipdRow.classList.remove('hidden');
      admNo.required = true;
      mopRow.classList.add('hidden');
      mop.required = false;
      mop.value = '';
    } else if (typeEl.value === 'Dispensary') {
      ipdRow.classList.add('hidden');
      admNo.required = false;
      admNo.value = '';
      mopRow.classList.remove('hidden');
      mop.required = true;
    } else {
      ipdRow.classList.add('hidden');
      mopRow.classList.remove('hidden');
      admNo.required = false;
      mop.required = false;
    }
  });

  async function loadRecent() {
    const { data, error } = await BNH_PAGE.sb.from('pharmacy_sales')
      .select('*').order('recorded_at', { ascending: false }).limit(10);
    const div = document.getElementById('recentList');
    if (error || !data || data.length === 0) { div.textContent = 'No recent entries.'; return; }
    div.innerHTML = `<table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f0f0f0">
        <th style="padding:6px;text-align:left">Date</th>
        <th style="padding:6px;text-align:left">Type</th>
        <th style="padding:6px;text-align:left">Adm No.</th>
        <th style="padding:6px;text-align:right">Cost</th>
        <th style="padding:6px;text-align:right">Sale</th>
        <th style="padding:6px;text-align:left">Mode</th>
        <th style="padding:6px;text-align:left">By</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr style="border-bottom:1px solid #eee">
        <td style="padding:6px">${r.sale_date}</td>
        <td style="padding:6px">${r.sale_type}</td>
        <td style="padding:6px">${r.admission_no || '-'}</td>
        <td style="padding:6px;text-align:right">₹${parseFloat(r.cost_price).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td style="padding:6px;text-align:right">₹${parseFloat(r.sale_price).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td style="padding:6px">${r.mode_of_payment || '-'}</td>
        <td style="padding:6px">${r.recorded_by_name || r.recorded_by}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }
  loadRecent();

  document.getElementById('saleForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';

    const sType = document.getElementById('saleType').value;
    if (sType === 'Dispensary' && !mop.value) {
      err.textContent = 'Please select mode of payment for Dispensary sale.';
      return;
    }

    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        sale_date: document.getElementById('saleDate').value,
        sale_type: sType,
        admission_no: sType === 'IPD' ? admNo.value.trim() : null,
        cost_price: parseFloat(document.getElementById('costPrice').value),
        sale_price: parseFloat(document.getElementById('salePrice').value),
        mode_of_payment: sType === 'IPD' ? null : mop.value,
        remark: document.getElementById('remark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('pharmacy_sales').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Sale saved successfully!';
      e.target.reset();
      document.getElementById('saleDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      ipdRow.classList.add('hidden');
      mopRow.classList.remove('hidden');
      admNo.required = false;
      mop.required = false;
      loadRecent();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
