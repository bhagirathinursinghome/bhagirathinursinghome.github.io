<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OT Entry – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:200px; }
    .hidden { display:none!important; }
    table { width:100%; border-collapse:collapse; margin-top:.75rem; }
    th { background:#f0f0f0; padding:7px 8px; text-align:left; font-size:.82rem; }
    td { padding:7px 8px; border-bottom:1px solid #eee; font-size:.82rem; }
    .patient-card { background:#f8f9ff; border:1px solid #c7d2fe; border-radius:8px;
                    padding:.75rem 1rem; margin-bottom:.6rem; cursor:pointer; transition:all .2s; }
    .patient-card:hover { background:#e0e7ff; border-color:#818cf8; }
    .patient-card .pname { font-weight:600; color:#1e1b4b; }
    .patient-card .pmeta { font-size:.82rem; color:#6b7280; margin-top:2px; }
    .back-btn { background:none; border:none; color:#6366f1; font-weight:600;
                cursor:pointer; font-size:.9rem; margin-bottom:1rem; padding:0; }
    .date-filter { display:flex; gap:.75rem; flex-wrap:wrap; align-items:flex-end; margin-bottom:1rem; }
    .date-filter > * { flex:1; min-width:140px; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>🔬 OT Entry – IPD</h1>

  <!-- PATIENT LIST VIEW -->
  <div id="listView">
    <div class="page-card">
      <h2 style="font-size:1rem;margin-bottom:.75rem">🏥 Patients Pending OT Entry</h2>
      <div id="pendingList">Loading…</div>
    </div>

    <div class="page-card" style="margin-top:1.5rem">
      <h2 style="font-size:1rem;margin-bottom:.75rem">✅ OT Entries Done – Filter by Date</h2>
      <div class="date-filter">
        <div><label>From</label><input id="histFrom" type="date"/></div>
        <div><label>To</label><input id="histTo" type="date"/></div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn-primary" style="width:auto" onclick="loadHistory()">Show</button>
        </div>
      </div>
      <div id="histList" style="font-size:.85rem;color:#555">Select date range and click Show.</div>
    </div>
  </div>

  <!-- OT ENTRY FORM VIEW -->
  <div id="formView" class="hidden">
    <div class="page-card">
      <button class="back-btn" onclick="showList()">← Back to Patient List</button>
      <h2 style="font-size:1rem;margin-bottom:.75rem" id="formTitle">OT Entry</h2>

      <form id="otForm">
        <label>Recorded By</label>
        <input id="recBy" readonly/>

        <div class="form-row">
          <div>
            <label>Patient</label>
            <input id="dispPatient" readonly/>
          </div>
          <div>
            <label>Admission No.</label>
            <input id="dispAdmNo" readonly/>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label>OT Date <span style="color:red">*</span></label>
            <input id="otDate" type="date" required/>
          </div>
          <div></div>
        </div>

        <label>Case Detail <span style="color:red">*</span></label>
        <textarea id="caseDetail" rows="3" required placeholder="Describe the surgical case…"></textarea>

        <div class="form-row">
          <div>
            <label>Surgent <span style="color:red">*</span></label>
            <select id="surgent">
              <option value="">Loading…</option>
            </select>
          </div>
          <div>
            <label>Anaesthesia</label>
            <select id="anaesthesia">
              <option value="">Not Applicable</option>
            </select>
          </div>
        </div>

        <label>Remark</label>
        <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

        <input type="hidden" id="admissionId"/>

        <div style="margin-top:1rem">
          <button type="submit" class="btn-primary" style="width:auto">💾 Save OT Entry</button>
        </div>
        <p class="err" id="err"></p>
        <p class="info" id="ok" style="display:none"></p>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","ot","manager"]);

  async function loadDoctors() {
    const { data } = await BNH_PAGE.sb.from('ipd_doctors')
      .select('id,doctor_name,doctor_type').eq('is_active',true).order('doctor_name');
    if (!data) return;
    const surgents     = data.filter(d => d.doctor_type === 'Surgent');
    const anaesthesias = data.filter(d => d.doctor_type === 'Anaesthesia');
    document.getElementById('surgent').innerHTML =
      '<option value="">-- Select Surgent --</option>' +
      surgents.map(d=>`<option value="${d.id}" data-name="${d.doctor_name}">${d.doctor_name}</option>`).join('');
    document.getElementById('anaesthesia').innerHTML =
      '<option value="">Not Applicable</option>' +
      anaesthesias.map(d=>`<option value="${d.id}" data-name="${d.doctor_name}">${d.doctor_name}</option>`).join('');
  }

  async function loadPending() {
    const div = document.getElementById('pendingList');
    const { data: otDone } = await BNH_PAGE.sb.from('ipd_ot_entries').select('admission_id');
    const doneIds = (otDone||[]).map(r=>r.admission_id);
    const { data, error } = await BNH_PAGE.sb.from('ipd_admissions')
      .select('id,admission_date,admission_no,patient_name')
      .eq('is_discharged', false)
      .order('admission_date', { ascending: false });
    if (error || !data || data.length === 0) { div.textContent = 'No active patients.'; return; }
    const pending = data.filter(r => !doneIds.includes(r.id));
    if (pending.length === 0) { div.textContent = 'All admitted patients have OT entries done.'; return; }
    div.innerHTML = pending.map(r=>`
      <div class="patient-card" onclick="openForm('${r.id}','${r.admission_no}','${r.patient_name.replace(/'/g,"\\'")}','${r.admission_date}')">
        <div class="pname">${r.patient_name}</div>
        <div class="pmeta">📅 ${r.admission_date} &nbsp;|&nbsp; Adm: ${r.admission_no}</div>
      </div>`).join('');
  }

  async function loadHistory() {
    const from = document.getElementById('histFrom').value;
    const to   = document.getElementById('histTo').value;
    if (!from || !to) { document.getElementById('histList').textContent='Please select both dates.'; return; }
    const div = document.getElementById('histList');
    div.textContent = 'Loading…';
    const { data, error } = await BNH_PAGE.sb.from('ipd_ot_entries')
      .select('*').gte('ot_date',from).lte('ot_date',to).order('ot_date',{ascending:false});
    if (error||!data||data.length===0){div.textContent='No OT entries in this range.';return;}
    div.innerHTML=`<table>
      <thead><tr><th>Date</th><th>Adm No.</th><th>Patient</th><th>Surgent</th><th>Anaesthesia</th><th>Case Detail</th></tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.ot_date}</td><td>${r.admission_no}</td><td>${r.patient_name}</td>
        <td>${r.surgent_name||'-'}</td><td>${r.anaesthesia_name||'N/A'}</td><td>${r.case_detail}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  function openForm(admId, admNo, patName, admDate) {
    document.getElementById('listView').classList.add('hidden');
    document.getElementById('formView').classList.remove('hidden');
    document.getElementById('admissionId').value = admId;
    document.getElementById('dispAdmNo').value   = admNo;
    document.getElementById('dispPatient').value = patName;
    document.getElementById('otDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('formTitle').textContent = `OT Entry – ${patName} (${admNo})`;
    document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
    document.getElementById('caseDetail').value = '';
    document.getElementById('remark').value = '';
    document.getElementById('err').textContent = '';
    document.getElementById('ok').style.display = 'none';
  }

  function showList() {
    document.getElementById('formView').classList.add('hidden');
    document.getElementById('listView').classList.remove('hidden');
  }

  document.getElementById('otForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';

    const sSel = document.getElementById('surgent');
    const aSel = document.getElementById('anaesthesia');
    const surgentId   = sSel.value || null;
    const surgentName = surgentId ? sSel.options[sSel.selectedIndex].dataset.name : null;
    const aneId       = aSel.value || null;
    const aneName     = aneId ? aSel.options[aSel.selectedIndex].dataset.name : null;

    if (!surgentId) { err.textContent='Please select a Surgent.'; return; }
    if (!document.getElementById('caseDetail').value.trim()) { err.textContent='Please enter case detail.'; return; }

    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        admission_id:     document.getElementById('admissionId').value,
        admission_no:     document.getElementById('dispAdmNo').value,
        patient_name:     document.getElementById('dispPatient').value,
        ot_date:          document.getElementById('otDate').value,
        case_detail:      document.getElementById('caseDetail').value.trim(),
        surgent_id:       surgentId,
        surgent_name:     surgentName,
        anaesthesia_id:   aneId,
        anaesthesia_name: aneName,
        remark:           document.getElementById('remark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('ipd_ot_entries').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ OT Entry saved successfully!';
      setTimeout(() => { showList(); loadPending(); }, 1500);
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };

  // Init
  loadDoctors();
  loadPending();
</script>
</body>
</html>
