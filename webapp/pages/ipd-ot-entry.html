<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OT Entry – IPD</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:200px; }
    .hidden { display:none!important; }
    .back-btn { background:none; border:none; color:#6366f1; font-weight:600;
                cursor:pointer; font-size:.9rem; margin-bottom:1rem; padding:0; }

    /* ── Side-by-side panels ── */
    .dual-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .dual-panel { grid-template-columns: 1fr; }
    }

    .panel-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .65rem 1rem;
      border-bottom: 1px solid #e5e7eb;
    }
    .pending-panel .panel-header { background: #f8f9ff; }
    .completed-panel .panel-header { background: #f0fdf4; }

    .panel-title { font-weight: 700; font-size: .9rem; color: #1e1b4b; }
    .completed-panel .panel-title { color: #14532d; }

    .badge {
      font-size: .72rem; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
    }
    .badge-pending { background: #e0e7ff; color: #4338ca; }
    .badge-done    { background: #dcfce7; color: #166534; }

    .search-input {
      display: block;
      width: 100%; box-sizing: border-box;
      padding: .4rem .75rem;
      border: none;
      border-bottom: 1px solid #e5e7eb;
      font-size: .83rem;
      outline: none;
      background: #fafafa;
    }
    .search-input:focus { background: #fff; border-bottom-color: #818cf8; }

    .panel-body {
      padding: .6rem .75rem;
      max-height: 68vh;
      overflow-y: auto;
    }

    /* Pending cards */
    .patient-card {
      background: #f8f9ff; border: 1px solid #c7d2fe; border-radius: 8px;
      padding: .6rem .85rem; margin-bottom: .5rem; cursor: pointer; transition: all .18s;
    }
    .patient-card:hover { background: #e0e7ff; border-color: #818cf8; }
    .patient-card .pname { font-weight: 600; color: #1e1b4b; font-size: .88rem; }
    .patient-card .pmeta { font-size: .78rem; color: #6b7280; margin-top: 2px; }

    /* Completed table */
    .completed-table { width: 100%; border-collapse: collapse; }
    .completed-table th {
      background: #f0fdf4; padding: 6px 8px;
      text-align: left; font-size: .78rem; color: #166534;
      position: sticky; top: 0;
    }
    .completed-table td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; font-size: .78rem; }
    .completed-table tr:hover td { background: #f7fef9; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>🔬 OT Entry – IPD</h1>

  <!-- PATIENT LIST VIEW -->
  <div id="listView">
    <div class="dual-panel">

      <!-- LEFT: PENDING -->
      <div class="panel-card pending-panel">
        <div class="panel-header">
          <span class="panel-title">🏥 Pending OT</span>
          <span class="badge badge-pending" id="pendingCount">…</span>
        </div>
        <input id="pendingSearch" type="text" class="search-input"
          placeholder="🔍 Search name / adm no…"
          oninput="filterPending()"/>
        <div id="pendingList" class="panel-body">Loading…</div>
      </div>

      <!-- RIGHT: COMPLETED -->
      <div class="panel-card completed-panel">
        <div class="panel-header">
          <span class="panel-title">✅ Completed OT</span>
          <span class="badge badge-done" id="completedCount">…</span>
        </div>
        <input id="searchBox" type="text" class="search-input"
          placeholder="🔍 Search name / adm no…"
          oninput="filterCompleted()"/>
        <div id="histList" class="panel-body">Loading…</div>
      </div>

    </div>
  </div>

  <!-- OT ENTRY FORM VIEW -->
  <div id="formView" class="hidden">
    <div class="page-card">
      <button class="back-btn" onclick="showList()">← Back to Patient List</button>
      <h2 style="font-size:1rem;margin-bottom:.75rem" id="formTitle">OT Entry</h2>

      <form id="otForm">
        <label>Recorded By</label>
        <input id="recBy" readonly/>

        <div class="form-row">
          <div>
            <label>Patient</label>
            <input id="dispPatient" readonly/>
          </div>
          <div>
            <label>Admission No.</label>
            <input id="dispAdmNo" readonly/>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label>OT Date <span style="color:red">*</span></label>
            <input id="otDate" type="date" required/>
          </div>
          <div></div>
        </div>

        <label>Case Detail <span style="color:red">*</span></label>
        <textarea id="caseDetail" rows="3" required placeholder="Describe the surgical case…"></textarea>

        <div class="form-row">
          <div>
            <label>Surgent <span style="color:red">*</span></label>
            <select id="surgent">
              <option value="">Loading…</option>
            </select>
          </div>
          <div>
            <label>Anaesthesia</label>
            <select id="anaesthesia">
              <option value="">Not Applicable</option>
            </select>
          </div>
        </div>

        <label>Remark</label>
        <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

        <input type="hidden" id="admissionId"/>

        <div style="margin-top:1rem">
          <button type="submit" class="btn-primary" style="width:auto">💾 Save OT Entry</button>
        </div>
        <p class="err" id="err"></p>
        <p class="info" id="ok" style="display:none"></p>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","ot","manager"]);

  let _pendingData   = [];
  let _completedData = [];

  async function loadDoctors() {
    const { data } = await BNH_PAGE.sb.from('ipd_doctors')
      .select('id,doctor_name,doctor_type').eq('is_active',true).order('doctor_name');
    if (!data) return;
    const surgents     = data.filter(d => d.doctor_type === 'Surgent');
    const anaesthesias = data.filter(d => d.doctor_type === 'Anaesthesia');
    document.getElementById('surgent').innerHTML =
      '<option value="">-- Select Surgent --</option>' +
      surgents.map(d=>`<option value="${d.id}" data-name="${d.doctor_name}">${d.doctor_name}</option>`).join('');
    document.getElementById('anaesthesia').innerHTML =
      '<option value="">Not Applicable</option>' +
      anaesthesias.map(d=>`<option value="${d.id}" data-name="${d.doctor_name}">${d.doctor_name}</option>`).join('');
  }

  async function loadPending() {
    const div = document.getElementById('pendingList');
    const { data: otDone } = await BNH_PAGE.sb.from('ipd_ot_entries').select('admission_id');
    const doneIds = (otDone||[]).map(r=>r.admission_id);
    const { data, error } = await BNH_PAGE.sb.from('ipd_admissions')
      .select('id,admission_date,admission_no,patient_name')
      .eq('is_discharged', false)
      .eq('is_cancelled', false)
      .order('admission_date', { ascending: false });
    if (error || !data) { div.textContent = 'No active patients.'; return; }
    _pendingData = data.filter(r => !doneIds.includes(r.id));
    renderPending(_pendingData);
  }

  function renderPending(rows) {
    const div = document.getElementById('pendingList');
    document.getElementById('pendingCount').textContent = rows.length;
    if (rows.length === 0) {
      div.innerHTML = '<p style="color:#6b7280;font-size:.83rem;padding:.5rem 0">No pending patients.</p>';
      return;
    }
    div.innerHTML = rows.map(r=>`
      <div class="patient-card" onclick="openForm('${r.id}','${r.admission_no}','${r.patient_name.replace(/'/g,"\\'")}','${r.admission_date}')">
        <div class="pname">${r.patient_name}</div>
        <div class="pmeta">📅 ${r.admission_date} &nbsp;|&nbsp; Adm: ${r.admission_no}</div>
      </div>`).join('');
  }

  function filterPending() {
    const q = document.getElementById('pendingSearch').value.trim().toLowerCase();
    if (!q) { renderPending(_pendingData); return; }
    renderPending(_pendingData.filter(r =>
      r.patient_name.toLowerCase().includes(q) ||
      r.admission_no.toLowerCase().includes(q)
    ));
  }

  async function loadCompleted() {
    const div = document.getElementById('histList');
    div.textContent = 'Loading…';
    const { data, error } = await BNH_PAGE.sb.from('ipd_ot_entries')
      .select('*').order('ot_date', { ascending: false });
    if (error) { div.textContent = 'Error loading entries.'; return; }
    _completedData = data || [];
    renderCompleted(_completedData);
  }

  function renderCompleted(rows) {
    const div = document.getElementById('histList');
    document.getElementById('completedCount').textContent = rows.length;
    if (rows.length === 0) {
      div.innerHTML = '<p style="color:#6b7280;font-size:.83rem;padding:.5rem 0">No completed OT entries.</p>';
      return;
    }
    div.innerHTML = `<table class="completed-table">
      <thead><tr><th>Date</th><th>Adm No.</th><th>Patient</th><th>Surgent</th><th>Anaesthesia</th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td>${r.ot_date}</td>
        <td>${r.admission_no}</td>
        <td>${r.patient_name}</td>
        <td>${r.surgent_name||'-'}</td>
        <td>${r.anaesthesia_name||'N/A'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  function filterCompleted() {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    if (!q) { renderCompleted(_completedData); return; }
    renderCompleted(_completedData.filter(r =>
      r.patient_name.toLowerCase().includes(q) ||
      r.admission_no.toLowerCase().includes(q)
    ));
  }

  function openForm(admId, admNo, patName, admDate) {
    document.getElementById('listView').classList.add('hidden');
    document.getElementById('formView').classList.remove('hidden');
    document.getElementById('admissionId').value = admId;
    document.getElementById('dispAdmNo').value   = admNo;
    document.getElementById('dispPatient').value = patName;
    document.getElementById('otDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('formTitle').textContent = `OT Entry – ${patName} (${admNo})`;
    document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
    document.getElementById('caseDetail').value = '';
    document.getElementById('remark').value = '';
    document.getElementById('err').textContent = '';
    document.getElementById('ok').style.display = 'none';
  }

  function showList() {
    document.getElementById('formView').classList.add('hidden');
    document.getElementById('listView').classList.remove('hidden');
  }

  document.getElementById('otForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';

    const sSel = document.getElementById('surgent');
    const aSel = document.getElementById('anaesthesia');
    const surgentId   = sSel.value || null;
    const surgentName = surgentId ? sSel.options[sSel.selectedIndex].dataset.name : null;
    const aneId       = aSel.value || null;
    const aneName     = aneId ? aSel.options[aSel.selectedIndex].dataset.name : null;

    if (!surgentId) { err.textContent='Please select a Surgent.'; return; }
    if (!document.getElementById('caseDetail').value.trim()) { err.textContent='Please enter case detail.'; return; }

    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        admission_id:     document.getElementById('admissionId').value,
        admission_no:     document.getElementById('dispAdmNo').value,
        patient_name:     document.getElementById('dispPatient').value,
        ot_date:          document.getElementById('otDate').value,
        case_detail:      document.getElementById('caseDetail').value.trim(),
        surgent_id:       surgentId,
        surgent_name:     surgentName,
        anaesthesia_id:   aneId,
        anaesthesia_name: aneName,
        remark:           document.getElementById('remark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('ipd_ot_entries').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ OT Entry saved successfully!';
      setTimeout(() => { showList(); loadPending(); loadCompleted(); }, 1500);
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };

  // Init
  loadDoctors();
  loadPending();
  loadCompleted();
</script>
</body>
</html>
