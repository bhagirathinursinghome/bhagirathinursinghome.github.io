<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OPD Records</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
    .filter-group label { font-size: 0.85rem; color: #666; margin-bottom: 0.25rem; }
    .filter-group input, .filter-group select { padding: 0.5rem; border: 1px solid #ccc; border-radius: 3px; font-size: 0.9rem; }
    .records-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .records-table th { background: #f0f0f0; padding: 10px; text-align: left; font-weight: 500; border-bottom: 2px solid #ddd; }
    .records-table td { padding: 10px; border-bottom: 1px solid #eee; }
    .records-table tbody tr:hover { background: #f9f9f9; }
    .records-table tbody tr { cursor: pointer; }
    .case-no { color: #007bff; font-weight: bold; }
    .status-badge { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 500; }
    .status-paid { background: #d4edda; color: #155724; }
    .status-due { background: #f8d7da; color: #721c24; }
    .status-partial { background: #fff3cd; color: #856404; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); overflow-y: auto; }
    .modal.active { display: block; }
    .modal-content { background-color: white; margin: 5% auto; padding: 0; border-radius: 8px; max-width: 90%; max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 1.5rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; }
    .modal-close { font-size: 1.5rem; cursor: pointer; color: #999; }
    .modal-close:hover { color: #333; }
    .modal-body { padding: 1.5rem; }
    .detail-section { margin-bottom: 1.5rem; }
    .detail-section h3 { font-size: 1rem; color: #007bff; margin-bottom: 0.75rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .detail-item { }
    .detail-label { font-size: 0.8rem; color: #999; text-transform: uppercase; }
    .detail-value { font-size: 0.95rem; color: #333; font-weight: 500; margin-top: 0.25rem; }
    .tests-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .tests-table th { background: #f9f9f9; padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    .tests-table td { padding: 8px; border-bottom: 1px solid #eee; }
    .amount-summary { background: #f8f9fa; padding: 1rem; border-radius: 4px; border-left: 4px solid #007bff; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
    .amount-item { }
    .amount-label { font-size: 0.75rem; color: #666; text-transform: uppercase; }
    .amount-value { font-size: 1.2rem; font-weight: bold; color: #007bff; margin-top: 0.25rem; }
    .refer-section { background: #e7f3ff; padding: 1rem; border-radius: 4px; border-left: 3px solid #007bff; }
    .refer-section h4 { margin: 0 0 0.5rem 0; color: #007bff; }
    .refer-payment-note { background: #fff3cd; border: 1px solid #ffc107; padding: 0.75rem; border-radius: 3px; margin-top: 0.5rem; font-size: 0.85rem; }
    .empty-state { text-align: center; padding: 3rem; color: #999; }
    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .pagination { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
    .pagination button { padding: 0.5rem 0.75rem; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 3px; }
    .pagination button.active { background: #007bff; color: white; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>
<div class="page">
  <h1>📋 OPD Records</h1>

  <div class="page-card">
    <div class="filters">
      <div class="filter-group">
        <label>Search Patient</label>
        <input type="text" id="searchInput" placeholder="Patient name or Case No..."/>
      </div>
      <div class="filter-group">
        <label>Date From</label>
        <input type="date" id="dateFromInput"/>
      </div>
      <div class="filter-group">
        <label>Date To</label>
        <input type="date" id="dateToInput"/>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="statusFilter">
          <option value="">All Status</option>
          <option value="paid">Paid</option>
          <option value="partial">Partial</option>
          <option value="due">Due</option>
        </select>
      </div>
      <div class="filter-group">
        <label>&nbsp;</label>
        <button class="btn-primary" style="width: 100%;" onclick="applyFilters()">🔍 Filter</button>
      </div>
    </div>

    <div id="recordsContainer">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <p>Loading OPD records...</p>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <p class="err" id="err"></p>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">OPD Case Details</h2>
      <span class="modal-close" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>

<script>
  BNH_PAGE.requireRole(["manager", "admin", "accountant", "viewer"]);

  let allRecords = [];
  let filteredRecords = [];
  const itemsPerPage = 20;
  let currentPage = 1;

  // Load all OPD records
  async function loadRecords() {
    const spinner = document.getElementById('spinner');
    spinner.classList.remove('hidden');
    try {
      const { data, error } = await BNH_PAGE.sb.from('opd_cases')
        .select('*').eq('status', 'completed').order('case_date', { ascending: false });
      
      if (error) throw error;
      if (data) {
        allRecords = data;
        filteredRecords = [...allRecords];
        currentPage = 1;
        renderRecords();
      }
    } catch (e) {
      document.getElementById('err').textContent = 'Error loading records: ' + e.message;
    } finally {
      spinner.classList.add('hidden');
    }
  }

  // Apply filters
  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const dateFrom = document.getElementById('dateFromInput').value;
    const dateTo = document.getElementById('dateToInput').value;
    const status = document.getElementById('statusFilter').value;

    filteredRecords = allRecords.filter(record => {
      // Search filter
      if (search && !record.patient_name.toLowerCase().includes(search) && !record.case_no.includes(search)) {
        return false;
      }

      // Date filter
      if (dateFrom && record.case_date < dateFrom) return false;
      if (dateTo && record.case_date > dateTo) return false;

      // Status filter
      if (status) {
        const due = record.bill_amount - record.paid_amount;
        let recordStatus = 'paid';
        if (due > 0 && record.paid_amount > 0) recordStatus = 'partial';
        if (due === record.bill_amount) recordStatus = 'due';
        
        if (recordStatus !== status) return false;
      }

      return true;
    });

    currentPage = 1;
    renderRecords();
  }

  // Determine payment status
  function getPaymentStatus(record) {
    const due = record.bill_amount - record.paid_amount;
    if (due === 0) return { status: 'paid', text: '✅ Paid' };
    if (due === record.bill_amount) return { status: 'due', text: '⏳ Due' };
    return { status: 'partial', text: '⚠️ Partial' };
  }

  // Render records table
  function renderRecords() {
    const container = document.getElementById('recordsContainer');

    if (filteredRecords.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>No OPD records found</p>
        </div>
      `;
      renderPagination();
      return;
    }

    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageRecords = filteredRecords.slice(start, end);

    container.innerHTML = `
      <table class="records-table">
        <thead>
          <tr>
            <th>Case No</th>
            <th>Date</th>
            <th>Patient Name</th>
            <th>Bill Amount</th>
            <th>Paid</th>
            <th>Due</th>
            <th>Refer</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${pageRecords.map(record => {
            const paymentStatus = getPaymentStatus(record);
            const due = record.bill_amount - record.paid_amount;
            return `
              <tr onclick="openDetail('${record.id}')">
                <td class="case-no">${record.case_no}</td>
                <td>${record.case_date}</td>
                <td>${record.patient_name}</td>
                <td>₹${record.bill_amount}</td>
                <td>₹${record.paid_amount}</td>
                <td>₹${due}</td>
                <td>${record.refer_name || '-'}</td>
                <td><span class="status-badge status-${paymentStatus.status}">${paymentStatus.text}</span></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;

    renderPagination();
  }

  // Render pagination
  function renderPagination() {
    const totalPages = Math.ceil(filteredRecords.length / itemsPerPage);
    const container = document.getElementById('pagination');

    if (totalPages <= 1) {
      container.innerHTML = '';
      return;
    }

    let html = '';
    if (currentPage > 1) {
      html += `<button onclick="currentPage = 1; renderRecords();">« First</button>`;
      html += `<button onclick="currentPage--; renderRecords();">‹ Prev</button>`;
    }

    for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
      html += `<button ${i === currentPage ? 'class="active"' : ''} onclick="currentPage = ${i}; renderRecords();">${i}</button>`;
    }

    if (currentPage < totalPages) {
      html += `<button onclick="currentPage++; renderRecords();">Next ›</button>`;
      html += `<button onclick="currentPage = ${totalPages}; renderRecords();">Last »</button>`;
    }

    container.innerHTML = html;
  }

  // Open detail modal
  async function openDetail(recordId) {
    const spinner = document.getElementById('spinner');
    spinner.classList.remove('hidden');

    try {
      const record = allRecords.find(r => r.id === recordId);
      if (!record) throw new Error('Record not found');

      // Parse tests if stored as JSON string
      let tests = [];
      if (typeof record.tests === 'string') {
        tests = record.tests.split(',').map(t => t.trim());
      }

      const due = record.bill_amount - record.paid_amount;
      const paymentStatus = getPaymentStatus(record);

      let ipdInfo = '';
      if (record.ipd_admission_id) {
        const { data: ipdData } = await BNH_PAGE.sb.from('ipd_admissions')
          .select('*').eq('id', record.ipd_admission_id).single();
        
        if (ipdData) {
          ipdInfo = `
            <div class="detail-section">
              <h3>🏥 Linked IPD Case</h3>
              <div class="detail-grid">
                <div class="detail-item">
                  <div class="detail-label">Admission No</div>
                  <div class="detail-value">${ipdData.admission_no}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Admission Date</div>
                  <div class="detail-value">${ipdData.admission_date}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Case Mode</div>
                  <div class="detail-value">${ipdData.case_mode}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Status</div>
                  <div class="detail-value">${ipdData.is_discharged ? 'Discharged' : 'Active'}</div>
                </div>
              </div>
            </div>
          `;
        }
      }

      let referInfo = '';
      if (record.refer_name) {
        referInfo = `
          <div class="detail-section">
            <h3>👥 Referral Information</h3>
            <div class="refer-section">
              <h4>${record.refer_name}</h4>
              <p style="margin: 0.5rem 0 0 0; color: #666; font-size: 0.9rem;">
                Case Type: <strong>${record.case_type === 'lab_sample' ? 'Lab Sample' : 'Sport Sample'}</strong>
              </p>
              <div class="refer-payment-note">
                <strong>📌 Refer Payment Status:</strong> This information will be available in the Refer Payment module (future feature).
                <br><a href="#" style="color: #007bff; text-decoration: none; font-size: 0.85rem;">Learn how to add refer payment tracking →</a>
              </div>
            </div>
          </div>
        `;
      }

      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="detail-section">
          <h3>📝 Patient & Case Information</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-label">Case No</div>
              <div class="detail-value">${record.case_no}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Case Date</div>
              <div class="detail-value">${record.case_date}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Patient Name</div>
              <div class="detail-value">${record.patient_name}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Entered By</div>
              <div class="detail-value">${record.entered_by || 'N/A'}</div>
            </div>
          </div>
        </div>

        <div class="detail-section">
          <h3>🧪 Tests Performed</h3>
          <p style="color: #666; font-size: 0.9rem; white-space: pre-wrap;">${record.tests}</p>
        </div>

        <div class="detail-section">
          <h3>💰 Payment Details</h3>
          <div class="amount-summary">
            <div class="amount-item">
              <div class="amount-label">Bill Amount</div>
              <div class="amount-value">₹${record.bill_amount}</div>
            </div>
            <div class="amount-item">
              <div class="amount-label">Paid Amount</div>
              <div class="amount-value" style="color: #28a745;">₹${record.paid_amount}</div>
            </div>
            <div class="amount-item">
              <div class="amount-label">Due Amount</div>
              <div class="amount-value" style="color: ${due > 0 ? '#dc3545' : '#28a745'};">₹${due}</div>
            </div>
            <div class="amount-item">
              <div class="amount-label">Discount</div>
              <div class="amount-value">₹${record.discount}</div>
            </div>
            <div class="amount-item">
              <div class="amount-label">Status</div>
              <div class="amount-value" style="color: ${paymentStatus.status === 'paid' ? '#28a745' : paymentStatus.status === 'due' ? '#dc3545' : '#ff9800'};">
                ${paymentStatus.text}
              </div>
            </div>
          </div>
        </div>

        ${ipdInfo}
        ${referInfo}

        <div class="detail-section" style="border-top: 1px solid #eee; padding-top: 1rem; margin-top: 1rem;">
          <p style="font-size: 0.85rem; color: #999; margin: 0;">
            📅 Created: ${record.recorded_at || 'N/A'} | By: ${record.recorded_by_name || 'N/A'}
          </p>
        </div>
      `;

      document.getElementById('detailModal').classList.add('active');
      document.getElementById('modalTitle').textContent = `Case ${record.case_no} - ${record.patient_name}`;
    } catch (e) {
      document.getElementById('err').textContent = 'Error loading details: ' + e.message;
    } finally {
      spinner.classList.add('hidden');
    }
  }

  // Close modal
  function closeModal() {
    document.getElementById('detailModal').classList.remove('active');
  }

  // Close modal when clicking outside
  window.onclick = (event) => {
    const modal = document.getElementById('detailModal');
    if (event.target === modal) {
      closeModal();
    }
  };

  // Apply filter on Enter key
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') applyFilters();
  });

  // Initialize
  loadRecords();
</script>
</body>
</html>
