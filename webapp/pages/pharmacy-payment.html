<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Supplier Payment – Pharmacy</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .form-row > * { flex:1; min-width:180px; }
  </style>
</head>
<body>
<div id="spinner" class="spinner-overlay hidden"><div class="spinner"></div></div>

<div class="page">
  <h1>💳 Supplier Payment</h1>

  <div class="page-card">
    <form id="paymentForm">
      <label>Recorded By</label>
      <input id="recBy" readonly />

      <div class="form-row">
        <div>
          <label>Date <span style="color:red">*</span></label>
          <input id="payDate" type="date" required />
        </div>
        <div>
          <label>Supplier Name <span style="color:red">*</span></label>
          <select id="supplierName" required>
            <option value="">-- Select Supplier --</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Amount (₹) <span style="color:red">*</span></label>
          <input id="amount" type="number" min="0.01" step="0.01" required />
        </div>
        <div>
          <label>Mode <span style="color:red">*</span></label>
          <select id="mode" required>
            <option value="">-- Select Mode --</option>
            <option value="Cash">Cash</option>
            <option value="Bank">Bank</option>
            <option value="PhonePe">PhonePe</option>
          </select>
        </div>
      </div>

      <label>Remark</label>
      <textarea id="remark" rows="2" placeholder="Optional…"></textarea>

      <div style="margin-top:1rem">
        <button type="submit" class="btn-primary" style="width:auto">💾 Save Payment</button>
      </div>
      <p class="err" id="err"></p>
      <p class="info" id="ok" style="display:none"></p>
    </form>
  </div>

  <div class="page-card" style="margin-top:1.5rem">
    <h2 style="font-size:1rem;margin-bottom:.75rem">📋 Recent Payments</h2>
    <div id="recentList" style="font-size:.85rem;color:#555">Loading…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/config.js"></script>
<script src="../assets/page.js"></script>
<script>
  BNH_PAGE.requireRole(["admin","accountant","pharmacy","manager"]);
  document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
  document.getElementById('payDate').value = new Date().toISOString().slice(0,10);

  async function loadSuppliers() {
    const { data } = await BNH_PAGE.sb.from('pharmacy_suppliers')
      .select('supplier_name').eq('is_active', true).order('supplier_name');
    const sel = document.getElementById('supplierName');
    (data || []).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.supplier_name;
      opt.textContent = s.supplier_name;
      sel.appendChild(opt);
    });
  }

  async function loadRecent() {
    const { data } = await BNH_PAGE.sb.from('pharmacy_supplier_payments')
      .select('*').order('recorded_at', { ascending: false }).limit(10);
    const div = document.getElementById('recentList');
    if (!data || data.length === 0) { div.textContent = 'No recent payments.'; return; }
    div.innerHTML = `<table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f0f0f0">
        <th style="padding:6px;text-align:left">Date</th>
        <th style="padding:6px;text-align:left">Supplier</th>
        <th style="padding:6px;text-align:right">Amount</th>
        <th style="padding:6px;text-align:left">Mode</th>
        <th style="padding:6px;text-align:left">By</th>
      </tr></thead>
      <tbody>${data.map(r=>`<tr style="border-bottom:1px solid #eee">
        <td style="padding:6px">${r.pay_date}</td>
        <td style="padding:6px">${r.supplier_name}</td>
        <td style="padding:6px;text-align:right">₹${parseFloat(r.amount).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
        <td style="padding:6px">${r.mode}</td>
        <td style="padding:6px">${r.recorded_by_name || r.recorded_by}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  loadSuppliers();
  loadRecent();

  document.getElementById('paymentForm').onsubmit = async (e) => {
    e.preventDefault();
    const spinner = document.getElementById('spinner');
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.style.display = 'none';
    spinner.classList.remove('hidden');
    try {
      const payload = BNH_PAGE.stamp({
        pay_date: document.getElementById('payDate').value,
        supplier_name: document.getElementById('supplierName').value,
        amount: parseFloat(document.getElementById('amount').value),
        mode: document.getElementById('mode').value,
        remark: document.getElementById('remark').value.trim() || null
      });
      const { error } = await BNH_PAGE.sb.from('pharmacy_supplier_payments').insert(payload);
      if (error) throw error;
      ok.style.display = 'block';
      ok.textContent = '✅ Payment recorded successfully!';
      e.target.reset();
      document.getElementById('payDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('recBy').value = BNH_PAGE.user.name + ' (' + BNH_PAGE.user.username + ')';
      loadRecent();
    } catch(ex) {
      err.textContent = ex.message;
    } finally {
      spinner.classList.add('hidden');
    }
  };
</script>
</body>
</html>
