<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocVault — Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="layout.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger-btn" onclick="toggleSidebar()" title="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Browse Documents
        </div>
      </div>
      <div class="topbar-actions">
        <span class="badge badge-viewer" style="padding:6px 14px">View Only</span>
      </div>
    </header>
    <main class="page-content" id="page-content">
      <div class="empty-state"><div class="spinner-ring" style="margin:0 auto"></div></div>
    </main>
  </div>
</div>

<div id="toast-container"></div>
<div id="global-spinner"></div>

<script>
let allDocs = [];

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('active');
}

window.addEventListener('DOMContentLoaded', async () => {
  const session = Auth.requireAuth(['viewer']);
  if (!session) return;
  renderSidebar('viewer', 'browse');
  await loadDocs();
});

async function loadDocs() {
  UI.showSpinner('Loading documents…');
  try {
    const { data } = await db()
      .from('dv_documents')
      .select('*, dv_categories(name,color)')
      .eq('is_latest_version', true)
      .order('created_at', { ascending: false });
    allDocs = data || [];
    renderPage();
  } catch(e) {
    UI.toast('Error loading documents: ' + e.message, 'error');
  } finally {
    UI.hideSpinner();
  }
}

function renderPage() {
  document.getElementById('page-content').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:16px">
      <div id="filter-bar"></div>
      <div id="doc-table-wrap"></div>
    </div>`;
  buildFilters('filter-bar', renderFilteredDocs);
  renderFilteredDocs();
}

function renderFilteredDocs() {
  const filtered = applyLocalFilters(allDocs);
  document.getElementById('doc-table-wrap').innerHTML =
    renderDocTable(filtered, { canEdit: false, canDelete: false, canStopAlert: false });
}
</script>
</body>
</html>
