<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Nursing Home</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-user-shield"></i>
      <h2>Admin</h2>
    </div>
    <nav>
      <a href="#" class="nav-item active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="#" class="nav-item" data-tab="add-staff"><i class="fas fa-user-plus"></i> Add Staff</a>
      <a href="#" class="nav-item" data-tab="staff-list"><i class="fas fa-users"></i> All Staff</a>
      <a href="#" class="nav-item" data-tab="patients"><i class="fas fa-user-injured"></i> Patients</a>
      <a href="#" class="nav-item" data-tab="reviews"><i class="fas fa-star"></i> Reviews</a>
      <a href="#" onclick="adminLogout()" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Main content -->
  <main class="main-content">
    <header class="top-bar">
      <button class="hamburger-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
      <h1 id="pageTitle">Dashboard</h1>
      <div class="admin-info">
        <i class="fas fa-user-circle"></i>
        <span id="adminName">Admin</span>
      </div>
    </header>

    <!-- Dashboard -->
    <section id="dashboard" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-users"></i><div><h3 id="totalStaff">0</h3><p>Total Staff</p></div></div>
        <div class="stat-card"><i class="fas fa-user-injured"></i><div><h3 id="totalPatients">0</h3><p>Patients</p></div></div>
        <div class="stat-card"><i class="fas fa-star"></i><div><h3 id="totalReviews">0</h3><p>Reviews</p></div></div>
        <div class="stat-card"><i class="fas fa-user-check"></i><div><h3 id="activeStaff">0</h3><p>Active Staff</p></div></div>
      </div>
    </section>

    <!-- Add Staff -->
    <section id="add-staff" class="tab-content">
      <div class="form-card">
        <h2><i class="fas fa-user-plus"></i> নতুন Staff যোগ করুন</h2>
        <form id="addStaffForm">
          <div class="form-grid">
            <input type="text" id="newName" placeholder="নাম" required />
            <input type="email" id="newEmail" placeholder="ইমেইল" required />
            <input type="tel" id="newMobile" placeholder="মোবাইল নম্বর" required />
            <input type="password" id="newPassword" placeholder="পাসওয়ার্ড" required minlength="6" />
            <select id="newRole" required>
              <option value="">-- Role --</option>
              <option value="marketing">Marketing</option>
              <option value="reception">Reception</option>
              <option value="ot">OT Staff</option>
              <option value="ward">Ward Staff</option>
              <option value="manager">Manager</option>
              <option value="accountant">Accountant</option>
              <option value="doctor">Doctor</option>
            </select>
          </div>
          <button type="submit" class="auth-btn"><i class="fas fa-plus"></i> Staff যোগ করুন</button>
        </form>
      </div>
    </section>

    <!-- Staff List -->
    <section id="staff-list" class="tab-content">
      <div class="form-card">
        <h2><i class="fas fa-users"></i> সকল Staff</h2>
        <div class="table-container">
          <table id="staffTable">
            <thead>
              <tr><th>নাম</th><th>Role</th><th>মোবাইল</th><th>ইমেইল</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Patients -->
    <section id="patients" class="tab-content">
      <div class="form-card">
        <h2><i class="fas fa-user-injured"></i> রোগীর তালিকা</h2>
        <div class="table-container">
          <table id="patientTable">
            <thead>
              <tr><th>নাম</th><th>মোবাইল</th><th>সমস্যা</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Reviews -->
    <section id="reviews" class="tab-content">
      <div class="form-card">
        <h2><i class="fas fa-star"></i> রিভিউ সমূহ</h2>
        <div id="reviewList" class="review-list"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
  <script>
    function openSidebar() {
      document.querySelector('.sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('show');
    }
    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    }
    document.querySelectorAll('.sidebar .nav-item').forEach(function(item) {
      item.addEventListener('click', function() {
        if (window.innerWidth <= 768) closeSidebar();
      });
    });
  </script>
</body>
</html>
